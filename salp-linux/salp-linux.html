<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07110b">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<title>salp Linux v0.2</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
<style>
:root{--bg:#030604;--panel:#08100b;--line:#21402b;--text:#ebf7ee;--muted:#90aa98;--green:#79f39d;--cyan:#76dce6;--yellow:#ffd66b;--red:#ff7f8a}
*{box-sizing:border-box}html,body{height:100%;margin:0;background:var(--bg);color:var(--text)}body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;overflow:hidden;overscroll-behavior:none}.app{height:100%;display:grid;grid-template-rows:auto auto 1fr auto auto}header{display:flex;align-items:center;gap:11px;padding:10px 12px;padding-top:calc(10px + env(safe-area-inset-top));border-bottom:1px solid var(--line);background:var(--panel)}.logo{width:42px;height:42px;display:grid;place-items:center;border-radius:13px;color:#07110b;background:linear-gradient(135deg,var(--green),var(--cyan));font-size:24px}.title{flex:1}.title strong{display:block}.title small{display:block;color:var(--muted);font-size:10px}.badge{padding:5px 9px;border:1px solid var(--line);border-radius:999px;color:var(--green);font:800 10px ui-monospace,monospace}.toolbar{display:flex;gap:7px;padding:8px 10px;border-bottom:1px solid var(--line);background:#07100a;overflow-x:auto}button{min-height:40px;border:1px solid var(--line);border-radius:10px;padding:8px 13px;background:#122018;color:var(--text);font-weight:800;white-space:nowrap}button.primary{border:0;background:linear-gradient(135deg,var(--green),var(--cyan));color:#061009}button:disabled{opacity:.4}.status{display:flex;align-items:center;gap:8px;margin-left:auto;padding:0 8px;color:var(--muted);font-size:11px;white-space:nowrap}.dot{width:9px;height:9px;border-radius:50%;background:#667}.dot.ok{background:var(--green)}.dot.error{background:var(--red)}.dot.busy{background:var(--yellow)}.terminalWrap{position:relative;min-height:0;background:#010201;overflow:hidden}#terminal{position:absolute;inset:0;padding:10px 7px 6px 10px;touch-action:manipulation}#terminal .xterm{height:100%}.bootScreen{position:absolute;inset:0;display:grid;place-items:center;padding:24px;z-index:5;text-align:center;background:radial-gradient(circle at 50% 30%,rgba(121,243,157,.13),transparent 35%),#010201}.bootCard{max-width:620px}.bootCard h1{margin:0;font-size:clamp(30px,8vw,54px)}.bootCard p{color:var(--muted)}.steps{margin:20px auto;text-align:left;max-width:430px;padding:15px 18px;border:1px solid var(--line);border-radius:15px;background:#09110c;font:12px/1.75 ui-monospace,monospace}.quickKeys{display:flex;gap:7px;padding:7px 9px;background:#07100a;border-top:1px solid var(--line);overflow-x:auto}.quickKeys button{min-height:36px;padding:6px 11px;font-family:ui-monospace,monospace}.keyboardBtn{background:#183721;border-color:#3d8050}footer{padding:7px 11px;padding-bottom:calc(7px + env(safe-area-inset-bottom));border-top:1px solid var(--line);color:var(--muted);background:var(--panel);font-size:10px;text-align:center}.hidden{display:none!important}@media(max-width:650px){.badge{display:none}.toolbar{flex-wrap:wrap}.status{width:100%;margin-left:0}}
</style>
</head>
<body>
<div class="app">
<header><div class="logo">🐧</div><div class="title"><strong>salp Linux</strong><small>Interactive Debian Terminal / CheerpX + xterm.js</small></div><div class="badge">v0.2 INTERACTIVE</div></header>
<div class="toolbar"><button id="bootBtn" class="primary">▶ Linuxを起動</button><button id="keyboardBtn" class="keyboardBtn" disabled>⌨️ キーボード</button><button id="clearBtn" disabled>画面クリア</button><button id="reloadBtn">再起動</button><div class="status"><span id="dot" class="dot"></span><span id="statusText">起動待ち</span></div></div>
<main class="terminalWrap"><div id="terminal"></div><section id="bootScreen" class="bootScreen"><div class="bootCard"><h1>salp Linux v0.2</h1><p>今度は入力できる、本物のDebianターミナル。</p><div class="steps">1. 「BOOT SALP LINUX」を押す<br>2. <b>salp-linux:~$</b> が出るまで待つ<br>3. 黒い画面か「⌨️キーボード」をタップ<br>4. <b>uname -a</b> を入力してEnter</div><button id="bigBootBtn" class="primary">🐧 BOOT SALP LINUX</button><p id="supportText"></p></div></section></main>
<div class="quickKeys"><button data-command="uname -a">uname -a</button><button data-command="pwd">pwd</button><button data-command="ls -la">ls -la</button><button data-command="python3 --version">python3</button><button data-key="9">TAB</button><button data-key="3">Ctrl+C</button></div>
<footer>端末をタップするとiPhoneのキーボードが開きます。変更内容はIndexedDBへ保存されます。</footer>
</div>
<script>
(async()=>{if(!crossOriginIsolated&&"serviceWorker" in navigator){try{const r=await navigator.serviceWorker.register("./coi-serviceworker.js?v=02");if(!navigator.serviceWorker.controller){await new Promise(ok=>{navigator.serviceWorker.addEventListener("controllerchange",ok,{once:true});r.update()});location.reload()}}catch(e){console.warn(e)}}})();
</script>
<script type="module">
import * as CheerpX from "https://cxrtnc.leaningtech.com/1.2.8/cx.esm.js";
import {Terminal} from "https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/+esm";
import {FitAddon} from "https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/+esm";
const $=id=>document.getElementById(id),enc=new TextEncoder(),dec=new TextDecoder("utf-8");
let cx=null,sendByte=null,booting=false,ready=false;
const term=new Terminal({cursorBlink:true,scrollback:3000,fontFamily:'ui-monospace,SFMono-Regular,Menlo,Consolas,monospace',fontSize:14,lineHeight:1.18,theme:{background:'#010201',foreground:'#b7ffc7',cursor:'#79f39d',selectionBackground:'#315c3d'}});
const fit=new FitAddon();term.loadAddon(fit);term.open($("terminal"));
const fitNow=()=>{try{fit.fit()}catch(e){}};requestAnimationFrame(fitNow);window.addEventListener("resize",()=>setTimeout(fitNow,100));window.visualViewport?.addEventListener("resize",()=>setTimeout(fitNow,100));
function status(t,s=''){$("statusText").textContent=t;$("dot").className='dot'+(s?' '+s:'')}
function focusTerm(){term.focus();const ta=$("terminal").querySelector('textarea');if(ta){ta.setAttribute('autocapitalize','none');ta.setAttribute('autocorrect','off');ta.focus({preventScroll:true});ta.click()}}
function sendString(s){if(!sendByte)return;for(const b of enc.encode(s))sendByte(b)}
term.onData(sendString);
$("supportText").textContent=[crossOriginIsolated?'✓ Cross-origin isolated':'✗ Cross-origin isolation',typeof SharedArrayBuffer!=="undefined"?'✓ SharedArrayBuffer':'✗ SharedArrayBuffer','WebAssembly' in window?'✓ WebAssembly':'✗ WebAssembly','✓ xterm.js'].join('  ');
async function boot(){if(booting||cx)return;booting=true;$("bootBtn").disabled=true;$("bigBootBtn").disabled=true;$("bootScreen").classList.add('hidden');fitNow();term.clear();term.writeln('\x1b[1;32msalp Virtual PC BIOS\x1b[0m');term.writeln('CheerpX 1.2.8 / Debian / xterm.js');term.writeln('----------------------------------------');if(!crossOriginIsolated||typeof SharedArrayBuffer==='undefined'){term.writeln('\x1b[31mERROR: SharedArrayBufferが利用できません。\x1b[0m');status('再読み込みが必要','error');booting=false;return}try{status('仮想ディスク接続中…','busy');term.writeln('[1/5] Connecting virtual disk...');const cloud=await CheerpX.CloudDevice.create('wss://disks.webvm.io/debian_large_20230522_5044875331.ext2');term.writeln('[2/5] Opening persistent storage...');const idb=await CheerpX.IDBDevice.create('salp-linux-v02-disk');term.writeln('[3/5] Creating writable overlay...');const overlay=await CheerpX.OverlayDevice.create(cloud,idb);term.writeln('[4/5] Mounting virtual filesystem...');const web=await CheerpX.WebDevice.create('');const data=await CheerpX.DataDevice.create();cx=await CheerpX.Linux.create({mounts:[{type:'ext2',path:'/',dev:overlay},{type:'dir',path:'/app',dev:web},{type:'dir',path:'/data',dev:data},{type:'devs',path:'/dev'}]});fitNow();sendByte=cx.setCustomConsole(buf=>term.write(dec.decode(buf,{stream:true})),Math.max(20,term.cols),Math.max(10,term.rows));$("keyboardBtn").disabled=false;$("clearBtn").disabled=false;term.writeln('[5/5] Starting interactive bash...');status('Linux起動中…','busy');ready=true;setTimeout(focusTerm,250);await cx.run('/bin/bash',['--login'],{env:['HOME=/home/user','USER=user','LOGNAME=user','HOSTNAME=salp-linux','SHELL=/bin/bash','TERM=xterm-256color','EDITOR=vim','LANG=en_US.UTF-8','LC_ALL=C','PS1=\\[\\e[1;32m\\]salp-linux\\[\\e[0m\\]:\\w$ '],cwd:'/home/user',uid:1000,gid:1000});ready=false;status('Linux終了','ok')}catch(e){console.error(e);term.writeln('');term.writeln('\x1b[31mBOOT ERROR: '+(e?.message||String(e))+'\x1b[0m');status('起動エラー','error');cx=null;sendByte=null;ready=false;$("bootBtn").disabled=false;$("bigBootBtn").disabled=false}finally{booting=false}}
$("bootBtn").onclick=boot;$("bigBootBtn").onclick=boot;$("keyboardBtn").onclick=focusTerm;$("terminal").addEventListener('pointerdown',()=>setTimeout(focusTerm,0));$("clearBtn").onclick=()=>{term.clear();focusTerm()};$("reloadBtn").onclick=()=>location.reload();
document.querySelectorAll('[data-command]').forEach(b=>b.onclick=()=>{if(ready){sendString(b.dataset.command+'\r');focusTerm()}});document.querySelectorAll('[data-key]').forEach(b=>b.onclick=()=>{if(ready){sendByte(Number(b.dataset.key));focusTerm()}});
</script>
</body></html>
