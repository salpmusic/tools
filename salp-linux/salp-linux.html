<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07110b">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<title>salp Linux v0.3.1</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
<style>
:root{--bg:#030604;--panel:#08100b;--line:#21402b;--text:#ebf7ee;--muted:#90aa98;--green:#79f39d;--cyan:#76dce6;--yellow:#ffd66b;--red:#ff7f8a}
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:var(--bg);color:var(--text)}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;overflow:hidden;overscroll-behavior:none}
.app{height:100%;display:grid;grid-template-rows:auto auto 1fr auto auto auto}
header{display:flex;align-items:center;gap:11px;padding:10px 12px;padding-top:calc(10px + env(safe-area-inset-top));border-bottom:1px solid var(--line);background:var(--panel)}
.logo{width:42px;height:42px;display:grid;place-items:center;border-radius:13px;color:#07110b;background:linear-gradient(135deg,var(--green),var(--cyan));font-size:24px;flex:0 0 auto}
.title{flex:1;min-width:0}.title strong{display:block;font-size:16px}.title small{display:block;color:var(--muted);font-size:10px}
.badge{padding:5px 9px;border:1px solid var(--line);border-radius:999px;color:var(--green);font:800 10px ui-monospace,monospace}
.toolbar{display:flex;gap:7px;padding:8px 10px;border-bottom:1px solid var(--line);background:#07100a;overflow-x:auto}
button{min-height:40px;border:1px solid var(--line);border-radius:10px;padding:8px 13px;background:#122018;color:var(--text);font-weight:800;white-space:nowrap}
button.primary{border:0;background:linear-gradient(135deg,var(--green),var(--cyan));color:#061009}
button:disabled{opacity:.4}
.status{display:flex;align-items:center;gap:8px;margin-left:auto;padding:0 8px;color:var(--muted);font-size:11px;white-space:nowrap}
.dot{width:9px;height:9px;border-radius:50%;background:#667}.dot.ok{background:var(--green)}.dot.error{background:var(--red)}.dot.busy{background:var(--yellow)}
.terminalWrap{position:relative;min-height:0;background:#010201;overflow:hidden}
#terminal{position:absolute;inset:0;padding:10px 7px 6px 10px;touch-action:manipulation}
#terminal .xterm{height:100%}
.bootScreen{position:absolute;inset:0;display:grid;place-items:center;padding:24px;z-index:5;text-align:center;background:radial-gradient(circle at 50% 30%,rgba(121,243,157,.13),transparent 35%),#010201}
.bootCard{max-width:620px}.bootCard h1{margin:0;font-size:clamp(30px,8vw,54px)}.bootCard p{color:var(--muted)}
.steps{margin:20px auto;text-align:left;max-width:430px;padding:15px 18px;border:1px solid var(--line);border-radius:15px;background:#09110c;font:12px/1.75 ui-monospace,monospace}
.quickKeys,.controlKeys{display:flex;gap:7px;padding:7px 9px;background:#07100a;border-top:1px solid var(--line);overflow-x:auto}
.quickKeys button,.controlKeys button{min-height:36px;padding:6px 11px;font-family:ui-monospace,monospace}
.controlKeys button{min-width:58px}
.controlKeys .space{min-width:115px}
.controlKeys .enter{min-width:100px;background:#183721;border-color:#3d8050}
.keyboardBtn{background:#183721;border-color:#3d8050}
footer{padding:7px 11px;padding-bottom:calc(7px + env(safe-area-inset-bottom));border-top:1px solid var(--line);color:var(--muted);background:var(--panel);font-size:10px;text-align:center}
.hidden{display:none!important}
@media(max-width:650px){.badge{display:none}.toolbar{flex-wrap:wrap}.status{width:100%;margin-left:0}}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="logo">🐧</div>
  <div class="title"><strong>salp Linux</strong><small>iPhone Key Fix / CheerpX + xterm.js</small></div>
  <div class="badge">v0.3.1 MOBILE KEYS</div>
</header>

<div class="toolbar">
  <button id="bootBtn" class="primary">▶ Linuxを起動</button>
  <button id="keyboardBtn" class="keyboardBtn" disabled>⌨️ キーボード</button>
  <button id="clearBtn" disabled>画面クリア</button>
  <button id="reloadBtn">再起動</button>
  <div class="status"><span id="dot" class="dot"></span><span id="statusText">起動待ち</span></div>
</div>

<main class="terminalWrap">
  <div id="terminal"></div>
  <section id="bootScreen" class="bootScreen">
    <div class="bootCard">
      <h1>salp Linux v0.3.1</h1>
      <p>iPhone用SPACE・ENTERキー搭載版。</p>
      <div class="steps">
        1. BOOT SALP LINUXを押す<br>
        2. プロンプトが出るまで待つ<br>
        3. 文字はiPhoneキーボードで入力<br>
        4. SPACEとENTERは下の専用ボタンを使用
      </div>
      <button id="bigBootBtn" class="primary">🐧 BOOT SALP LINUX</button>
      <p id="supportText"></p>
    </div>
  </section>
</main>

<div class="quickKeys">
  <button data-command="uname -a">uname -a</button>
  <button data-command="pwd">pwd</button>
  <button data-command="ls -la">ls -la</button>
  <button data-command="python3 --version">python3</button>
  <button data-command="whoami">whoami</button>
</div>

<div class="controlKeys">
  <button class="space" data-code="32">SPACE</button>
  <button class="enter" data-code="10">ENTER</button>
  <button data-code="127">⌫</button>
  <button data-text="&#27;[D">←</button>
  <button data-text="&#27;[A">↑</button>
  <button data-text="&#27;[B">↓</button>
  <button data-text="&#27;[C">→</button>
  <button data-code="9">TAB</button>
  <button data-code="3">Ctrl+C</button>
</div>

<footer>SPACEとENTERが効かない場合は、画面内の専用キーを使ってください。</footer>
</div>

<script>
(async()=>{
  if(!crossOriginIsolated && "serviceWorker" in navigator){
    try{
      const reg=await navigator.serviceWorker.register("./coi-serviceworker.js?v=031");
      if(!navigator.serviceWorker.controller){
        await new Promise(resolve=>{
          navigator.serviceWorker.addEventListener("controllerchange",resolve,{once:true});
          reg.update();
        });
        location.reload();
      }
    }catch(error){console.warn(error)}
  }
})();
</script>

<script type="module">
import * as CheerpX from "https://cxrtnc.leaningtech.com/1.2.8/cx.esm.js";
import { Terminal } from "https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/+esm";
import { FitAddon } from "https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/+esm";

const $=id=>document.getElementById(id);
let cx=null,send=null,booting=false,ready=false;

const term=new Terminal({
  cursorBlink:true,
  convertEol:true,
  scrollback:3000,
  fontFamily:'ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace',
  fontSize:14,
  lineHeight:1.18,
  theme:{
    background:"#010201",foreground:"#b7ffc7",cursor:"#79f39d",
    selectionBackground:"#315c3d",green:"#79f39d",cyan:"#76dce6",
    red:"#ff7f8a",yellow:"#ffd66b",white:"#eaf7ed"
  }
});

const fitAddon=new FitAddon();
term.loadAddon(fitAddon);
term.open($("terminal"));

function fit(){try{fitAddon.fit()}catch(_){}}
requestAnimationFrame(fit);
window.addEventListener("resize",()=>setTimeout(fit,100));
window.visualViewport?.addEventListener("resize",()=>setTimeout(fit,120));

function setStatus(text,state=""){
  $("statusText").textContent=text;
  $("dot").className="dot"+(state?" "+state:"");
}

function focusTerminal(){
  term.focus();
  const ta=$("terminal").querySelector("textarea");
  if(ta){
    ta.setAttribute("inputmode","text");
    ta.setAttribute("enterkeyhint","enter");
    ta.setAttribute("autocapitalize","none");
    ta.setAttribute("autocomplete","off");
    ta.setAttribute("autocorrect","off");
    ta.setAttribute("spellcheck","false");
    ta.focus({preventScroll:true});
  }
}

function sendCode(code){
  if(send)send(code);
}

function sendText(str){
  if(!send)return;
  for(let i=0;i<str.length;i++)send(str.charCodeAt(i));
}

term.onData(str=>sendText(str));

async function boot(){
  if(booting||cx)return;
  booting=true;
  $("bootBtn").disabled=true;
  $("bigBootBtn").disabled=true;
  $("bootScreen").classList.add("hidden");

  term.clear();
  term.writeln("\x1b[1;32msalp Virtual PC BIOS\x1b[0m");
  term.writeln("CheerpX 1.2.8 / Debian / mobile key bridge");
  term.writeln("-----------------------------------------");

  try{
    setStatus("仮想ディスク接続中…","busy");
    term.writeln("[1/5] Connecting virtual disk...");
    const cloud=await CheerpX.CloudDevice.create(
      "wss://disks.webvm.io/debian_large_20230522_5044875331.ext2"
    );

    term.writeln("[2/5] Opening persistent storage...");
    const idb=await CheerpX.IDBDevice.create("salp-linux-v031-disk");

    term.writeln("[3/5] Creating writable overlay...");
    const overlay=await CheerpX.OverlayDevice.create(cloud,idb);

    term.writeln("[4/5] Mounting virtual filesystem...");
    const web=await CheerpX.WebDevice.create("");
    const data=await CheerpX.DataDevice.create();

    cx=await CheerpX.Linux.create({
      mounts:[
        {type:"ext2",path:"/",dev:overlay},
        {type:"dir",path:"/app",dev:web},
        {type:"dir",path:"/data",dev:data},
        {type:"devs",path:"/dev"}
      ]
    });

    fit();

    send=cx.setCustomConsole(
      buf=>term.write(new Uint8Array(buf)),
      term.cols,
      term.rows
    );

    $("keyboardBtn").disabled=false;
    $("clearBtn").disabled=false;

    term.writeln("[5/5] Starting interactive bash...");
    setStatus("Linux起動中…","busy");
    ready=true;
    setTimeout(focusTerminal,250);

    await cx.run("/bin/bash",["--login"],{
      env:[
        "HOME=/home/user",
        "USER=user",
        "LOGNAME=user",
        "SHELL=/bin/bash",
        "TERM=xterm-256color",
        "EDITOR=vim",
        "LANG=en_US.UTF-8",
        "LC_ALL=C",
        "PS1=\\[\\e[1;32m\\]salp-linux\\[\\e[0m\\]:\\w$ "
      ],
      cwd:"/home/user",
      uid:1000,
      gid:1000
    });

    ready=false;
    setStatus("Linux終了","ok");

  }catch(error){
    console.error(error);
    term.writeln("");
    term.writeln("\x1b[31mBOOT ERROR: "+(error?.message||String(error))+"\x1b[0m");
    setStatus("起動エラー","error");
    cx=null;send=null;ready=false;
    $("bootBtn").disabled=false;
    $("bigBootBtn").disabled=false;
  }finally{
    booting=false;
  }
}

$("bootBtn").addEventListener("click",boot);
$("bigBootBtn").addEventListener("click",boot);
$("keyboardBtn").addEventListener("click",focusTerminal);
$("terminal").addEventListener("pointerdown",()=>setTimeout(focusTerminal,0));
$("clearBtn").addEventListener("click",()=>{term.clear();focusTerminal()});
$("reloadBtn").addEventListener("click",()=>location.reload());

document.querySelectorAll("[data-command]").forEach(btn=>{
  btn.addEventListener("click",()=>{
    if(!ready)return;
    sendText(btn.dataset.command);
    sendCode(10);
    focusTerminal();
  });
});

document.querySelectorAll("[data-code]").forEach(btn=>{
  btn.addEventListener("click",()=>{
    if(!ready)return;
    sendCode(Number(btn.dataset.code));
    focusTerminal();
  });
});

document.querySelectorAll("[data-text]").forEach(btn=>{
  btn.addEventListener("click",()=>{
    if(!ready)return;
    sendText(btn.dataset.text);
    focusTerminal();
  });
});

$("supportText").textContent=[
  crossOriginIsolated?"✓ Cross-origin isolated":"✗ Cross-origin isolation",
  typeof SharedArrayBuffer!=="undefined"?"✓ SharedArrayBuffer":"✗ SharedArrayBuffer",
  "✓ WebAssembly","✓ xterm.js","✓ Mobile keys"
].join("  ");
</script>
</body>
</html>
