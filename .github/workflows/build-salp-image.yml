name: Build salp Linux Browser Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-salp-image.yml"
      - "image/**"

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm workflow works
        run: |
          echo "salp Linux workflow started"
          echo "Repository files:"
          find . -maxdepth 3 -type f | sort
