<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f7f3ea">
<title>salp Color v4.1</title>
<style>
:root{
  --bg:#f7f3ea;
  --panel:#fff;
  --text:#222;
  --muted:#777;
  --line:#ded8ce;
  --button:#222;
  --accent:#ff8fbd;
  --accent2:#72dce8;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  min-height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Sans",sans-serif;
}
button,input,select{font:inherit}
button{cursor:pointer}
.app{
  width:min(100%,1000px);
  margin:auto;
  padding:calc(env(safe-area-inset-top) + 12px) 12px calc(env(safe-area-inset-bottom) + 28px);
}
header{text-align:center;padding:14px 8px 16px}
h1{margin:0;font-size:32px;letter-spacing:-1px}
.sub{margin-top:6px;color:var(--muted);font-size:14px}
.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:20px;
  box-shadow:0 8px 24px rgba(0,0,0,.07);
}
.creator{padding:14px;margin-bottom:14px}
.label{
  margin:0 0 8px;
  color:var(--muted);
  font-size:12px;
  font-weight:900;
  letter-spacing:.08em;
}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.section{padding:12px 0;border-bottom:1px solid #eee9e2}
.section:first-child{padding-top:0}
.section:last-child{border-bottom:0;padding-bottom:0}
button,select,.fileLabel{
  min-height:46px;
  padding:9px 12px;
  border:1px solid var(--line);
  border-radius:12px;
  background:#fff;
  color:var(--text);
}
button.primary,.fileLabel.primary{
  background:var(--button);
  color:#fff;
  border-color:var(--button);
  font-weight:900;
}
button.accent{
  border:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#111;
  font-weight:900;
}
button:disabled{opacity:.4;cursor:not-allowed}
.fileLabel{
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
input[type="file"]{display:none}
.previewRow{
  display:grid;
  grid-template-columns:180px 1fr;
  gap:12px;
  align-items:start;
}
#sourcePreview{
  width:100%;
  aspect-ratio:1;
  object-fit:cover;
  border-radius:14px;
  background:#ece7df;
  border:1px solid var(--line);
}
.hint{color:var(--muted);font-size:12px;line-height:1.6}
.game{padding:14px}
.gameTop{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}
.progress{
  height:10px;
  background:#ece7df;
  border-radius:999px;
  overflow:hidden;
  margin-bottom:12px;
}
#progressBar{
  width:0;height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
}
.selected{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:10px;
  margin-bottom:12px;
  border-radius:12px;
  background:#f3efe8;
  font-weight:900;
}
.selectedSwatch{
  width:34px;height:34px;border-radius:50%;
  border:3px solid #222;
}
.zoomRow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.canvasWrap{
  overflow:auto;
  max-height:68vh;
  border-radius:14px;
  background:#cfc7bc;
  padding:4px;
  touch-action:pan-x pan-y;
}
#gameCanvas{
  display:block;
  background:#faf8f4;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  transform-origin:top left;
}
.palette{
  display:grid;
  grid-template-columns:repeat(8,minmax(0,1fr));
  gap:7px;
  margin-top:12px;
  max-height:250px;
  overflow:auto;
  padding:2px;
}
.colorBtn{
  min-height:62px;
  background:#fff;
  border:3px solid var(--line);
  padding:5px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
  font-weight:900;
  font-size:11px;
}
.colorBtn.active{
  border-color:#222;
  transform:translateY(-2px);
}
.swatch{
  width:32px;height:32px;border-radius:50%;
  border:2px solid rgba(0,0,0,.35);
}
.actions{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:12px;
}
.message{
  min-height:26px;
  padding-top:10px;
  text-align:center;
  font-weight:900;
}
.overlay{
  position:fixed;
  inset:0;
  display:none;
  place-items:center;
  background:rgba(0,0,0,.65);
  padding:20px;
  z-index:20;
}
.overlay.show{display:grid}
.dialog{
  width:min(100%,360px);
  background:#fff;
  border-radius:22px;
  padding:24px;
  text-align:center;
}
@media(max-width:700px){
  .grid3{grid-template-columns:1fr}
  .previewRow{grid-template-columns:1fr}
  #sourcePreview{max-width:220px;margin:auto}
  .palette{grid-template-columns:repeat(4,minmax(0,1fr))}
  .actions{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="app">

<header>
  <h1>🎨 salp Color v4.1</h1>
  <div class="sub">最大128×128・64色対応</div>
</header>

<section class="panel creator">
  <div class="section">
    <div class="label">画像を読み込む</div>
    <div class="grid2">
      <label class="fileLabel primary">
        写真・イラストを選ぶ
        <input id="imageInput" type="file" accept="image/*">
      </label>
      <label class="fileLabel">
        問題JSONを読み込む
        <input id="jsonInput" type="file" accept=".json,application/json">
      </label>
    </div>
  </div>

  <div class="section previewRow">
    <img id="sourcePreview" alt="読み込んだ画像のプレビュー">
    <div>
      <div class="label">変換設定</div>
      <div class="grid3">
        <select id="gridSize">
          <option value="16">16 × 16</option>
          <option value="24">24 × 24</option>
          <option value="32" selected>32 × 32</option>
          <option value="64">64 × 64</option>
          <option value="96">96 × 96</option>
          <option value="128">128 × 128</option>
        </select>

        <select id="colorCount">
          <option value="4">4色</option>
          <option value="6">6色</option>
          <option value="8" selected>8色</option>
          <option value="12">12色</option>
          <option value="16">16色</option>
          <option value="24">24色</option>
          <option value="32">32色</option>
          <option value="48">48色</option>
          <option value="64">64色</option>
        </select>

        <button id="generateBtn" class="accent" disabled>ぬりえを作る</button>
      </div>

      <div class="hint" style="margin-top:10px">
        128×128・64色は処理に少し時間がかかります。
        大きい盤面はCanvasで描画するため、スマホでも軽く操作できます。
      </div>
    </div>
  </div>

  <div class="section">
    <div class="grid2">
      <button id="saveJsonBtn" disabled>問題JSONを保存</button>
      <button id="savePngBtn" disabled>完成画像をPNG保存</button>
    </div>
  </div>
</section>

<section class="panel game">
  <div class="gameTop">
    <span id="remainingText">まだ問題がありません</span>
    <span id="percentText">0%</span>
  </div>

  <div class="progress"><div id="progressBar"></div></div>

  <div class="selected">
    <div id="selectedSwatch" class="selectedSwatch"></div>
    <span id="selectedText">色を選んでください</span>
  </div>

  <div class="zoomRow">
    <button id="zoomOutBtn">− 縮小</button>
    <button id="zoomResetBtn">100%</button>
    <button id="zoomInBtn">＋ 拡大</button>
    <button id="numbersBtn">番号表示 ON</button>
  </div>

  <div class="canvasWrap" id="canvasWrap">
    <canvas id="gameCanvas"></canvas>
  </div>

  <div id="palette" class="palette"></div>

  <div class="actions">
    <button id="hintBtn" disabled>💡 ヒント</button>
    <button id="fillColorBtn" disabled>🎯 選択色を全部</button>
    <button id="resetBtn" disabled>↺ リセット</button>
  </div>

  <div id="message" class="message">画像を読み込んでください</div>
</section>
</div>

<div id="completeOverlay" class="overlay">
  <div class="dialog">
    <div style="font-size:64px">🎉</div>
    <h2>完成！</h2>
    <p>自分だけのぬりえが完成しました。</p>
    <button id="closeCompleteBtn" class="primary" style="width:100%">閉じる</button>
  </div>
</div>

<script>
(() => {
  "use strict";

  const SAVE_KEY = "salpColorV41_autosave";
  const $ = id => document.getElementById(id);

  const imageInput = $("imageInput");
  const jsonInput = $("jsonInput");
  const sourcePreview = $("sourcePreview");
  const gridSizeSelect = $("gridSize");
  const colorCountSelect = $("colorCount");
  const generateBtn = $("generateBtn");
  const saveJsonBtn = $("saveJsonBtn");
  const savePngBtn = $("savePngBtn");

  const canvas = $("gameCanvas");
  const ctx = canvas.getContext("2d");
  const canvasWrap = $("canvasWrap");
  const palette = $("palette");
  const remainingText = $("remainingText");
  const percentText = $("percentText");
  const progressBar = $("progressBar");
  const selectedSwatch = $("selectedSwatch");
  const selectedText = $("selectedText");
  const message = $("message");

  const hintBtn = $("hintBtn");
  const fillColorBtn = $("fillColorBtn");
  const resetBtn = $("resetBtn");

  const zoomOutBtn = $("zoomOutBtn");
  const zoomResetBtn = $("zoomResetBtn");
  const zoomInBtn = $("zoomInBtn");
  const numbersBtn = $("numbersBtn");

  const completeOverlay = $("completeOverlay");
  const closeCompleteBtn = $("closeCompleteBtn");

  let sourceImage = null;
  let puzzle = null;
  let filled = [];
  let selectedColor = 1;
  let zoom = 1;
  let showNumbers = true;
  let hintIndex = -1;

  function rgbToHex(r,g,b){
    return "#" + [r,g,b]
      .map(v => Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,"0"))
      .join("");
  }

  function dist(a,b){
    const dr=a.r-b.r, dg=a.g-b.g, db=a.b-b.b;
    return dr*dr+dg*dg+db*db;
  }

  function buildPalette(samplePixels,k,iterations=8){
    const centers = [];
    const stride = Math.max(1, Math.floor(samplePixels.length / k));

    for(let i=0;i<k;i++){
      const p = samplePixels[Math.min(i*stride,samplePixels.length-1)];
      centers.push({r:p.r,g:p.g,b:p.b});
    }

    for(let iter=0;iter<iterations;iter++){
      const sums = Array.from({length:k},()=>({r:0,g:0,b:0,n:0}));

      for(const p of samplePixels){
        let best=0, bestDist=Infinity;
        for(let i=0;i<centers.length;i++){
          const d=dist(p,centers[i]);
          if(d<bestDist){bestDist=d;best=i}
        }
        const s=sums[best];
        s.r+=p.r;s.g+=p.g;s.b+=p.b;s.n++;
      }

      for(let i=0;i<k;i++){
        const s=sums[i];
        if(s.n){
          centers[i]={r:s.r/s.n,g:s.g/s.n,b:s.b/s.n};
        }
      }
    }

    return centers;
  }

  function assignPixels(pixels,centers){
    const result = new Uint8Array(pixels.length);

    for(let pIndex=0;pIndex<pixels.length;pIndex++){
      const p=pixels[pIndex];
      let best=0,bestDist=Infinity;

      for(let i=0;i<centers.length;i++){
        const d=dist(p,centers[i]);
        if(d<bestDist){bestDist=d;best=i}
      }

      result[pIndex]=best+1;
    }

    return Array.from(result);
  }

  imageInput.addEventListener("change",()=>{
    const file=imageInput.files[0];
    if(!file)return;

    const url=URL.createObjectURL(file);
    const img=new Image();

    img.onload=()=>{
      sourceImage=img;
      sourcePreview.src=url;
      generateBtn.disabled=false;
      message.textContent="設定を選んで「ぬりえを作る」を押してください";
    };

    img.onerror=()=>{
      URL.revokeObjectURL(url);
      alert("画像を読み込めませんでした");
    };

    img.src=url;
  });

  generateBtn.addEventListener("click",async()=>{
    if(!sourceImage)return;

    generateBtn.disabled=true;
    message.textContent="画像を解析しています…";
    await new Promise(r=>setTimeout(r,50));

    try{
      const size=Number(gridSizeSelect.value);
      const colorCount=Number(colorCountSelect.value);

      const work=document.createElement("canvas");
      work.width=size;
      work.height=size;
      const wctx=work.getContext("2d",{willReadFrequently:true});

      const scale=Math.max(size/sourceImage.width,size/sourceImage.height);
      const dw=sourceImage.width*scale;
      const dh=sourceImage.height*scale;

      wctx.drawImage(sourceImage,(size-dw)/2,(size-dh)/2,dw,dh);

      const data=wctx.getImageData(0,0,size,size).data;
      const pixels=[];

      for(let i=0;i<data.length;i+=4){
        pixels.push({r:data[i],g:data[i+1],b:data[i+2]});
      }

      const sampleLimit=4096;
      const step=Math.max(1,Math.floor(pixels.length/sampleLimit));
      const sample=[];

      for(let i=0;i<pixels.length;i+=step){
        sample.push(pixels[i]);
      }

      const centers=buildPalette(sample,colorCount,8);
      const assignments=assignPixels(pixels,centers);
      const colors={};

      centers.forEach((c,i)=>{
        colors[i+1]=rgbToHex(c.r,c.g,c.b);
      });

      puzzle={version:"4.1",size,colors,data:assignments};
      filled=new Array(assignments.length).fill(false);
      selectedColor=1;
      zoom=1;
      hintIndex=-1;

      enableGame(true);
      saveProgress();
      render();
      message.textContent=`${size}×${size}・${colorCount}色のぬりえができました！`;
    }catch(error){
      alert("生成に失敗しました: "+error.message);
      message.textContent="生成に失敗しました";
    }finally{
      generateBtn.disabled=false;
    }
  });

  function enableGame(enabled){
    hintBtn.disabled=!enabled;
    fillColorBtn.disabled=!enabled;
    resetBtn.disabled=!enabled;
    saveJsonBtn.disabled=!enabled;
    savePngBtn.disabled=!enabled;
  }

  function render(){
    if(!puzzle)return;
    renderCanvas();
    renderPalette();
    updateSelected();
    updateProgress();
    applyZoom();
  }

  function renderCanvas(){
    const size=puzzle.size;
    const cellSize=size<=32?24:size<=64?12:size<=96?8:6;

    canvas.width=size*cellSize;
    canvas.height=size*cellSize;
    canvas.style.width=canvas.width+"px";
    canvas.style.height=canvas.height+"px";

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.textAlign="center";
    ctx.textBaseline="middle";

    const fontSize=Math.max(5,Math.floor(cellSize*0.55));
    ctx.font=`700 ${fontSize}px -apple-system,sans-serif`;

    for(let index=0;index<puzzle.data.length;index++){
      const value=puzzle.data[index];
      const x=(index%size)*cellSize;
      const y=Math.floor(index/size)*cellSize;

      if(filled[index]){
        ctx.fillStyle=puzzle.colors[value];
        ctx.fillRect(x,y,cellSize,cellSize);
      }else{
        ctx.fillStyle="#faf8f4";
        ctx.fillRect(x,y,cellSize,cellSize);

        if(showNumbers && cellSize>=8){
          ctx.fillStyle="#666";
          ctx.fillText(String(value),x+cellSize/2,y+cellSize/2);
        }
      }

      if(hintIndex===index){
        ctx.strokeStyle="#ffd33d";
        ctx.lineWidth=Math.max(2,cellSize*0.15);
        ctx.strokeRect(x+1,y+1,cellSize-2,cellSize-2);
      }

      if(cellSize>=8){
        ctx.strokeStyle="rgba(0,0,0,.13)";
        ctx.lineWidth=1;
        ctx.strokeRect(x,y,cellSize,cellSize);
      }
    }
  }

  canvas.addEventListener("pointerdown",(event)=>{
    if(!puzzle)return;

    const rect=canvas.getBoundingClientRect();
    const realX=(event.clientX-rect.left)/zoom;
    const realY=(event.clientY-rect.top)/zoom;
    const cellSize=canvas.width/puzzle.size;
    const col=Math.floor(realX/cellSize);
    const row=Math.floor(realY/cellSize);

    if(col<0||row<0||col>=puzzle.size||row>=puzzle.size)return;

    const index=row*puzzle.size+col;
    paintCell(index);
  });

  function paintCell(index){
    if(filled[index])return;

    const correct=puzzle.data[index];

    if(correct!==selectedColor){
      message.textContent=`ここは ${correct}番です`;
      hintIndex=index;
      renderCanvas();
      setTimeout(()=>{
        if(hintIndex===index){
          hintIndex=-1;
          renderCanvas();
        }
      },700);
      return;
    }

    filled[index]=true;
    saveProgress();
    renderCanvas();
    renderPalette();
    updateProgress();
    message.textContent="正解！";
    checkComplete();
  }

  function renderPalette(){
    palette.innerHTML="";

    Object.entries(puzzle.colors).forEach(([number,color])=>{
      const n=Number(number);
      const button=document.createElement("button");
      button.className="colorBtn";
      if(n===selectedColor)button.classList.add("active");

      const swatch=document.createElement("span");
      swatch.className="swatch";
      swatch.style.backgroundColor=color;

      let left=0;
      for(let i=0;i<puzzle.data.length;i++){
        if(puzzle.data[i]===n&&!filled[i])left++;
      }

      const label=document.createElement("span");
      label.textContent=`${n}番 ${left===0?"完了":left}`;

      button.append(swatch,label);
      button.addEventListener("click",()=>{
        selectedColor=n;
        renderPalette();
        updateSelected();
        message.textContent=`${n}番を選びました`;
      });

      palette.appendChild(button);
    });
  }

  function updateSelected(){
    selectedSwatch.style.backgroundColor=puzzle.colors[selectedColor];
    selectedText.textContent=`${selectedColor}番の色を選択中`;
  }

  function updateProgress(){
    const total=puzzle.data.length;
    let done=0;
    for(const value of filled)if(value)done++;

    const left=total-done;
    const percent=Math.round(done/total*100);

    remainingText.textContent=`残り ${left} マス`;
    percentText.textContent=`${percent}%`;
    progressBar.style.width=`${percent}%`;
  }

  function checkComplete(){
    if(filled.every(Boolean)){
      setTimeout(()=>completeOverlay.classList.add("show"),200);
    }
  }

  hintBtn.addEventListener("click",()=>{
    const index=puzzle.data.findIndex((value,i)=>value===selectedColor&&!filled[i]);

    if(index<0){
      message.textContent=`${selectedColor}番は全部塗れています`;
      return;
    }

    hintIndex=index;
    renderCanvas();
    message.textContent="黄色い枠を塗ってみよう";

    const size=puzzle.size;
    const cellSize=canvas.width/size;
    const x=(index%size)*cellSize*zoom;
    const y=Math.floor(index/size)*cellSize*zoom;

    canvasWrap.scrollTo({
      left:Math.max(0,x-canvasWrap.clientWidth/2),
      top:Math.max(0,y-canvasWrap.clientHeight/2),
      behavior:"smooth"
    });

    setTimeout(()=>{
      hintIndex=-1;
      renderCanvas();
    },1800);
  });

  fillColorBtn.addEventListener("click",()=>{
    let count=0;

    for(let i=0;i<puzzle.data.length;i++){
      if(puzzle.data[i]===selectedColor&&!filled[i]){
        filled[i]=true;
        count++;
      }
    }

    saveProgress();
    render();
    message.textContent=count
      ? `${selectedColor}番を ${count}マス塗りました`
      : `${selectedColor}番は完成しています`;

    checkComplete();
  });

  resetBtn.addEventListener("click",()=>{
    if(!confirm("最初からやり直しますか？"))return;
    filled=new Array(puzzle.data.length).fill(false);
    selectedColor=1;
    saveProgress();
    render();
    message.textContent="最初からやり直しました";
  });

  zoomInBtn.addEventListener("click",()=>{
    zoom=Math.min(3,zoom+0.25);
    applyZoom();
  });

  zoomOutBtn.addEventListener("click",()=>{
    zoom=Math.max(0.5,zoom-0.25);
    applyZoom();
  });

  zoomResetBtn.addEventListener("click",()=>{
    zoom=1;
    applyZoom();
  });

  function applyZoom(){
    canvas.style.transform=`scale(${zoom})`;
    canvasWrap.style.minHeight=Math.min(canvas.height*zoom,600)+"px";
    zoomResetBtn.textContent=`${Math.round(zoom*100)}%`;
  }

  numbersBtn.addEventListener("click",()=>{
    showNumbers=!showNumbers;
    numbersBtn.textContent=`番号表示 ${showNumbers?"ON":"OFF"}`;
    renderCanvas();
  });

  closeCompleteBtn.addEventListener("click",()=>{
    completeOverlay.classList.remove("show");
  });

  saveJsonBtn.addEventListener("click",()=>{
    if(!puzzle)return;

    const data={app:"salp Color",version:"4.1",puzzle,filled};
    downloadBlob(
      "salp-color-puzzle.json",
      new Blob([JSON.stringify(data)],{type:"application/json"})
    );
  });

  jsonInput.addEventListener("change",async()=>{
    const file=jsonInput.files[0];
    if(!file)return;

    try{
      const data=JSON.parse(await file.text());
      const loaded=data.puzzle||data;

      if(!loaded.size||!loaded.colors||!loaded.data){
        throw new Error("対応していないデータです");
      }

      puzzle=loaded;
      filled=Array.isArray(data.filled)
        ? data.filled
        : new Array(puzzle.data.length).fill(false);

      selectedColor=Number(Object.keys(puzzle.colors)[0]);
      zoom=1;
      enableGame(true);
      saveProgress();
      render();
      message.textContent="問題を読み込みました";
    }catch(error){
      alert("読み込めませんでした: "+error.message);
    }

    jsonInput.value="";
  });

  savePngBtn.addEventListener("click",()=>{
    if(!puzzle)return;

    const out=document.createElement("canvas");
    const cellSize=8;
    out.width=puzzle.size*cellSize;
    out.height=puzzle.size*cellSize;
    const octx=out.getContext("2d");

    for(let index=0;index<puzzle.data.length;index++){
      const value=puzzle.data[index];
      const x=(index%puzzle.size)*cellSize;
      const y=Math.floor(index/puzzle.size)*cellSize;
      octx.fillStyle=puzzle.colors[value];
      octx.fillRect(x,y,cellSize,cellSize);
    }

    out.toBlob(blob=>{
      if(blob)downloadBlob("salp-color-complete.png",blob);
    },"image/png");
  });

  function downloadBlob(filename,blob){
    const url=URL.createObjectURL(blob);
    const link=document.createElement("a");
    link.href=url;
    link.download=filename;
    document.body.appendChild(link);
    link.click();

    setTimeout(()=>{
      URL.revokeObjectURL(url);
      link.remove();
    },1000);
  }

  function saveProgress(){
    if(!puzzle)return;
    try{
      localStorage.setItem(SAVE_KEY,JSON.stringify({puzzle,filled,selectedColor}));
    }catch{}
  }

  function loadProgress(){
    try{
      const raw=localStorage.getItem(SAVE_KEY);
      if(!raw)return;

      const data=JSON.parse(raw);
      if(!data.puzzle)return;

      puzzle=data.puzzle;
      filled=data.filled||new Array(puzzle.data.length).fill(false);
      selectedColor=data.selectedColor||1;
      enableGame(true);
      render();
      message.textContent="前回の続きから再開しました";
    }catch{}
  }

  loadProgress();
})();
</script>
</body>
</html>
