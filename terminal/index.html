<style>

body.light{--bg:#e9edf2;--panel:#fff;--panel2:#eef2f6;--line:#cbd4df;--text:#1d2630;--muted:#6f7c8c;--taskbar:rgba(238,243,248,.94)}

.desktop{position:absolute;inset:0 0 58px 0;padding:18px;display:grid;grid-template-columns:repeat(auto-fill,92px);grid-auto-rows:104px;align-content:start;gap:10px}.desktopIcon{width:88px;height:98px;border:0;background:transparent;color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;border-radius:13px;text-shadow:0 2px 5px #000}.desktopIcon:hover,.desktopIcon:focus{background:rgba(255,255,255,.1)}.desktopIcon .emoji{font-size:38px}.desktopIcon .label{font-size:11px;text-align:center;line-height:1.25}
.taskbar{position:absolute;left:0;right:0;bottom:0;height:58px;z-index:1000;display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--taskbar);border-top:1px solid var(--line);backdrop-filter:blur(18px)}
.startBtn,.taskBtn,.trayBtn{min-height:42px;border:1px solid var(--line);border-radius:11px;background:var(--panel2);color:var(--text);padding:7px 11px}.startBtn{font-weight:900;background:linear-gradient(135deg,var(--green),var(--blue));color:#101418;border:0}.quickLaunch{display:flex;gap:5px}.quickBtn{width:42px;height:42px;border:1px solid var(--line);border-radius:10px;background:var(--panel2);color:var(--text);font-size:20px}.quickBtn:hover{outline:2px solid var(--blue)}.taskItems{display:flex;gap:6px;flex:1;overflow:auto}.taskBtn{max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}.taskBtn.active{outline:2px solid var(--green)}.clock{min-width:72px;text-align:center;font-size:11px;color:var(--muted)}
.startMenu{position:absolute;left:10px;bottom:66px;width:min(92vw,380px);z-index:1100;display:none;padding:13px;border:1px solid var(--line);border-radius:18px;background:var(--taskbar);box-shadow:0 20px 55px rgba(0,0,0,.45);backdrop-filter:blur(20px)}.startMenu.show{display:block}.startHead{display:flex;align-items:center;gap:10px;padding:6px 4px 12px}.startLogo{width:44px;height:44px;display:grid;place-items:center;border-radius:13px;background:linear-gradient(135deg,var(--green),var(--blue));color:#111;font-weight:900}.startGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.startApp{min-height:76px;border:1px solid var(--line);border-radius:13px;background:var(--panel2);color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}.startApp span:first-child{font-size:28px}.startApp span:last-child{font-size:10px}.startFoot{display:flex;gap:7px;margin-top:11px}.startFoot button{flex:1}
.window{position:absolute;left:80px;top:54px;width:min(820px,calc(100vw - 30px));height:min(610px,calc(100vh - 92px));min-width:280px;min-height:220px;z-index:50;display:flex;flex-direction:column;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--panel);box-shadow:0 18px 55px rgba(0,0,0,.45)}.window.hidden{display:none}.window.maximized{left:0!important;top:0!important;width:100%!important;height:calc(100% - 58px)!important;border-radius:0}.titlebar{height:44px;flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:7px 8px 7px 12px;background:var(--panel2);border-bottom:1px solid var(--line);user-select:none;touch-action:none}.windowTitle{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:900}.winControls{display:flex;gap:5px}.winControls button{width:34px;height:30px;border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--text);padding:0}.windowBody{position:relative;flex:1;min-height:0;overflow:auto;background:var(--panel)}.resizeHandle{position:absolute;right:0;bottom:0;width:20px;height:20px;cursor:nwse-resize;touch-action:none}.appFrame{width:100%;height:100%;border:0;background:#fff}
.terminalApp{height:100%;display:flex;flex-direction:column;background:#050708}.termToolbar{display:flex;gap:7px;padding:8px;background:#10151b;border-bottom:1px solid #27303a}.termToolbar select,.termToolbar button{min-height:34px;border:1px solid #35404d;border-radius:8px;background:#18202a;color:#edf3fa;padding:5px 8px}.output{flex:1;overflow:auto;padding:13px;white-space:pre-wrap;word-break:break-word;color:var(--green);line-height:1.55;font-size:13px}.commandRow{display:flex;gap:8px;padding:10px 12px;border-top:1px solid #27303a;background:#0b0f14}.prompt{color:var(--blue);font-weight:900}.commandInput{flex:1;min-width:0;border:0;outline:0;background:transparent;color:#fff;font-size:16px}
.fileApp{height:100%;display:grid;grid-template-columns:190px 1fr}.fileSide{padding:10px;border-right:1px solid var(--line);background:var(--panel2);overflow:auto}.fileSide button{width:100%;margin-bottom:5px;text-align:left;min-height:38px;border:0;border-radius:8px;background:transparent;color:var(--text)}.fileMain{display:flex;flex-direction:column;min-width:0}.fileToolbar{display:flex;gap:6px;flex-wrap:wrap;padding:9px;border-bottom:1px solid var(--line)}.fileToolbar button{min-height:37px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);color:var(--text)}.filePath{padding:8px 11px;color:var(--blue);border-bottom:1px solid var(--line);font-size:12px}.fileGrid{padding:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;overflow:auto}.fileItem{min-height:94px;border:1px solid var(--line);border-radius:12px;background:var(--panel2);color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}.fileItem.selected{outline:3px solid var(--green)}.fileItem .ico{font-size:30px}.fileItem .nm{max-width:95%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}
.editorApp{height:100%;display:flex;flex-direction:column}.editorToolbar{display:flex;gap:7px;padding:9px;border-bottom:1px solid var(--line)}.editorToolbar button{min-height:38px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);color:var(--text)}.editorPath{flex:1;padding:9px;color:var(--blue);font-size:12px}.editorText{flex:1;width:100%;resize:none;border:0;outline:0;background:#080c11;color:#fff;padding:14px;font:14px/1.55 ui-monospace,monospace}.settings,.aboutApp{padding:20px}.settingGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.themeCard{min-height:100px;border:1px solid var(--line);border-radius:13px;background:var(--panel2);color:var(--text)}.commandPalette{position:absolute;left:50%;top:13%;transform:translateX(-50%);width:min(92vw,620px);z-index:2000;display:none;padding:12px;border:1px solid var(--line);border-radius:18px;background:var(--taskbar);box-shadow:0 25px 70px rgba(0,0,0,.55);backdrop-filter:blur(22px)}
.commandPalette.show{display:block}.paletteInput{width:100%;height:48px;border:1px solid var(--line);border-radius:12px;background:var(--panel);color:var(--text);padding:0 14px;outline:0}.paletteList{max-height:50vh;overflow:auto;margin-top:9px}.paletteItem{width:100%;min-height:48px;margin-bottom:5px;border:1px solid transparent;border-radius:10px;background:transparent;color:var(--text);display:flex;align-items:center;gap:10px;text-align:left;padding:8px 10px}.paletteItem:hover,.paletteItem.active{border-color:var(--line);background:var(--panel2)}.recentTitle{margin:12px 3px 6px;color:var(--muted);font-size:10px}.recentRow{display:flex;gap:6px;overflow:auto}.recentApp{min-width:92px;min-height:54px;border:1px solid var(--line);border-radius:10px;background:var(--panel2);color:var(--text);font-size:10px}.hiddenInput{display:none}
@media(max-width:700px){.desktop{grid-template-columns:repeat(3,88px);padding:10px}.window{left:8px!important;top:8px!important;width:calc(100% - 16px)!important;height:calc(100% - 74px)!important}.fileApp{grid-template-columns:1fr}.fileSide{display:none}.settingGrid{grid-template-columns:1fr}.clock{display:none}.taskItems{display:none}.quickLaunch{overflow:auto}.startBtn{padding:7px 9px}}
</style>

<body>
<div class="os" id="os">
<div class="wallpaperText">salp OS 6</div>
<div id="desktop" class="desktop"></div><div id="windows"></div>

<script>
(()=>{"use strict";
const $=id=>document.getElementById(id),FS_KEY="salpTerminalFS_v7",HIST_KEY="salpTerminalHistory_v7",THEME_KEY="salpOSTheme_v7",WINDOW_KEY="salpOSWindowState_v7",RECENT_KEY="salpOSRecentApps_v7";
const APPS={
 terminal:{name:"Terminal",icon:"⌨️",type:"terminal"},
 basic:{name:"N88 BASIC",icon:"💾",type:"iframe",url:"../salp-n88-basic.html"},
 files:{name:"Files",icon:"📁",type:"files"},
 editor:{name:"Editor",icon:"📝",type:"editor"},
 runner:{name:"HTML Runner",icon:"💻",type:"iframe",url:"../html-runner.html"},
 pixel:{name:"Pixel",icon:"🎨",type:"iframe",url:"../Pixel.html"},
 frame:{name:"Frame",icon:"🖼️",type:"iframe",url:"../Frame.html"},
 qr:{name:"QR Maker",icon:"🔲",type:"iframe",url:"../qrcode.html"},
 color:{name:"Color",icon:"🎮",type:"iframe",url:"../color/index.html"},
 video:{name:"Video",icon:"🎬",type:"iframe",url:"../video.html"},
 music:{name:"Music",icon:"🎵",type:"iframe",url:"https://linktr.ee/salp"},
 settings:{name:"Settings",icon:"⚙️",type:"settings"},
 about:{name:"About salp OS",icon:"ℹ️",type:"about"}
};
const desktopApps=["terminal","basic","files","editor","runner","video","qr","color","pixel","frame","music"];
const quickApps=["terminal","basic","files","runner","qr"];
function defaultFS(){return {type:"dir",children:{Desktop:{type:"dir",children:{}},Documents:{type:"dir",children:{"welcome.txt":{type:"file",content:"Welcome to salp OS v6.0"}}},Projects:{type:"dir",children:{BASIC:{type:"dir",children:{
"hello.bas":{type:"file",content:'10 CLS\n20 PRINT "HELLO FROM SALP OS 6"\n30 END'},
"arpeggio.bas":{type:"file",content:'10 CLS\n20 PRINT "SALP ARPEGGIO"\n30 PLAY "T95 O5 L16 CEG>CEG<C"\n40 END'},
"number-game.bas":{type:"file",content:'10 CLS\n20 N=INT(RND(1)*10)+1\n30 INPUT "1-10";A\n40 IF A=N THEN PRINT "CORRECT!":END\n50 IF A<N THEN PRINT "HIGHER"\n60 IF A>N THEN PRINT "LOWER"\n70 GOTO 30'}
}},WEB:{type:"dir",children:{"hello.html":{type:"file",content:"<!doctype html><h1>Hello salp OS 6</h1>"}}}}},Pictures:{type:"dir",children:{}},Music:{type:"dir",children:{}},Videos:{type:"dir",children:{}},Downloads:{type:"dir",children:{}},System:{type:"dir",children:{"version.txt":{type:"file",content:"salp Terminal v6.0\nsalp OS Desktop"}}}}}}
let fs;try{fs=JSON.parse(localStorage.getItem(FS_KEY))||defaultFS()}catch{fs=defaultFS()}
let cwd="/Projects/BASIC",fileCwd="/Projects/BASIC",selectedPath=null,editingPath="",history=JSON.parse(localStorage.getItem(HIST_KEY)||"[]"),historyIndex=history.length,topZ=60,windowCount=0,recentApps=JSON.parse(localStorage.getItem(RECENT_KEY)||"[]"),windowStates=JSON.parse(localStorage.getItem(WINDOW_KEY)||"{}");
const saveFS=()=>{localStorage.setItem(FS_KEY,JSON.stringify(fs));renderFiles()};
function norm(path,base=cwd){if(!path)return base;const full=path.startsWith("/")?path:(base==="/"?"/"+path:base+"/"+path),stack=[];full.split("/").forEach(p=>{if(!p||p===".")return;p===".."?stack.pop():stack.push(p)});return "/"+stack.join("/")}
const parts=p=>{const n=norm(p,"/");return n==="/"?[]:n.slice(1).split("/")};
function node(path){let n=fs;for(const p of parts(path)){if(!n||n.type!=="dir"||!n.children[p])return null;n=n.children[p]}return n}
function parent(path){const a=parts(path),name=a.pop();return {parent:node("/"+a.join("/")||"/"),name}}
function fileIcon(name){return /\.bas$/i.test(name)?"💾":/\.html?$/i.test(name)?"🌐":"📄"}
function renderDesktop(){const d=$("desktop");d.innerHTML="";desktopApps.forEach(key=>{const a=APPS[key],b=document.createElement("button");b.className="desktopIcon";b.innerHTML=`<span class="emoji">${a.icon}</span><span class="label">${a.name}</span>`;b.ondblclick=()=>openApp(key);b.onclick=()=>{if(innerWidth<700)openApp(key)};d.appendChild(b)})}
function renderQuick(){const q=$("quickLaunch");q.innerHTML="";quickApps.forEach(key=>{const a=APPS[key],b=document.createElement("button");b.className="quickBtn";b.title=a.name;b.textContent=a.icon;b.onclick=()=>openApp(key);q.appendChild(b)})}
function renderRecent(){const r=$("recentRow");if(!r)return;r.innerHTML="";recentApps.slice(0,5).forEach(k=>{const a=APPS[k];if(!a)return;const b=document.createElement("button");b.className="recentApp";b.innerHTML=`${a.icon}<br>${a.name}`;b.onclick=()=>{openApp(k);toggleStart(false)};r.appendChild(b)});if(!r.children.length)r.innerHTML='<small style="color:var(--muted)">まだありません</small>'}
function addRecent(k){recentApps=[k,...recentApps.filter(x=>x!==k)].slice(0,8);localStorage.setItem(RECENT_KEY,JSON.stringify(recentApps));renderRecent()}
function renderStart(){const g=$("startGrid");g.innerHTML="";Object.entries(APPS).filter(([k])=>!["settings","about"].includes(k)).forEach(([k,a])=>{const b=document.createElement("button");b.className="startApp";b.innerHTML=`<span>${a.icon}</span><span>${a.name}</span>`;b.onclick=()=>{openApp(k);toggleStart(false)};g.appendChild(b)})}
function toggleStart(force){$("startMenu").classList.toggle("show",force??!$("startMenu").classList.contains("show"))}
$("startBtn").onclick=()=>toggleStart();document.addEventListener("pointerdown",e=>{if(!$("startMenu").contains(e.target)&&e.target!==$("startBtn"))toggleStart(false)});
function createWindow(key,title,icon){const id="win-"+(++windowCount),w=document.createElement("section");w.className="window";w.id=id;w.dataset.app=key;const o=(windowCount%7)*24,state=windowStates[key];w.style.left=(state?.left??55+o)+"px";w.style.top=(state?.top??28+o)+"px";if(state?.width)w.style.width=state.width+"px";if(state?.height)w.style.height=state.height+"px";w.innerHTML=`<div class="titlebar"><div class="windowTitle"><span>${icon}</span><span>${title}</span></div><div class="winControls"><button data-act="snapL">◧</button><button data-act="snapR">◨</button><button data-act="min">—</button><button data-act="max">□</button><button data-act="close">×</button></div></div><div class="windowBody"></div><div class="resizeHandle"></div>`;$("windows").appendChild(w);makeWindowInteractive(w);createTaskButton(w,title,icon);focusWindow(w);return w}
function createTaskButton(w,title,icon){const b=document.createElement("button");b.className="taskBtn active";b.dataset.win=w.id;b.textContent=icon+" "+title;b.onclick=()=>{if(w.classList.contains("hidden"))w.classList.remove("hidden");else if(+w.style.zIndex===topZ)w.classList.add("hidden");focusWindow(w)};$("taskItems").appendChild(b)}
function focusWindow(w){topZ++;w.style.zIndex=topZ;document.querySelectorAll(".taskBtn").forEach(b=>b.classList.toggle("active",b.dataset.win===w.id&&!w.classList.contains("hidden")))}
function saveWindowState(w){if(w.classList.contains("maximized"))return;windowStates[w.dataset.app]={left:w.offsetLeft,top:w.offsetTop,width:w.offsetWidth,height:w.offsetHeight};localStorage.setItem(WINDOW_KEY,JSON.stringify(windowStates))}
function closeWindow(w){saveWindowState(w);document.querySelector(`.taskBtn[data-win="${w.id}"]`)?.remove();w.remove()}
function makeWindowInteractive(w){const bar=w.querySelector(".titlebar");let drag=false,sx=0,sy=0,sl=0,st=0;bar.onpointerdown=e=>{if(e.target.closest("button")||w.classList.contains("maximized"))return;drag=true;sx=e.clientX;sy=e.clientY;sl=w.offsetLeft;st=w.offsetTop;bar.setPointerCapture(e.pointerId);focusWindow(w)};bar.onpointermove=e=>{if(drag){w.style.left=Math.max(0,sl+e.clientX-sx)+"px";w.style.top=Math.max(0,st+e.clientY-sy)+"px"}};bar.onpointerup=()=>{drag=false;saveWindowState(w)};w.onpointerdown=()=>focusWindow(w);w.querySelector('[data-act="close"]').onclick=()=>closeWindow(w);w.querySelector('[data-act="min"]').onclick=()=>w.classList.add("hidden");w.querySelector('[data-act="max"]').onclick=()=>w.classList.toggle("maximized");
w.querySelector('[data-act="snapL"]').onclick=()=>{w.classList.remove("maximized");w.style.left="0";w.style.top="0";w.style.width="50%";w.style.height="calc(100% - 58px)";saveWindowState(w)};
w.querySelector('[data-act="snapR"]').onclick=()=>{w.classList.remove("maximized");w.style.left="50%";w.style.top="0";w.style.width="50%";w.style.height="calc(100% - 58px)";saveWindowState(w)}
}
$("showDesktop").onclick=()=>document.querySelectorAll(".window").forEach(w=>w.classList.add("hidden"));
function findOpen(k){return [...document.querySelectorAll(".window")].find(w=>w.dataset.app===k)}
function openApp(k){const a=APPS[k];if(!a)return;addRecent(k);const old=findOpen(k);if(old){old.classList.remove("hidden");focusWindow(old);return}const w=createWindow(k,a.name,a.icon),body=w.querySelector(".windowBody");if(a.type==="iframe"){const f=document.createElement("iframe");f.className="appFrame";f.src=a.url;body.appendChild(f)}else if(a.type==="terminal")buildTerminal(body);else if(a.type==="files")buildFiles(body);else if(a.type==="editor")buildEditor(body);else if(a.type==="settings")buildSettings(body);else buildAbout(body)}
function openBasicCode(path,autoRun=false){const n=node(path);if(!n||n.type!=="file")throw Error("BASIC file not found");let w=findOpen("basic");if(!w){openApp("basic");w=findOpen("basic")}focusWindow(w);const f=w.querySelector("iframe");f.onload=()=>{try{const d=f.contentDocument,ed=d.getElementById("editor");if(ed){ed.value=n.content;ed.dispatchEvent(new Event("input",{bubbles:true}))}if(autoRun)d.getElementById("runBtn")?.click()}catch(e){}};f.src=APPS.basic.url+"?v6="+Date.now()}
function buildTerminal(body){body.innerHTML=`<div class="terminalApp"><div class="termToolbar"><button data-cmd="help">help</button><button data-cmd="ls">ls</button><button data-cmd="basic list">basic list</button><button data-cmd="clear">clear</button></div><div class="output"></div><div class="commandRow"><span class="prompt">salp&gt;</span><input class="commandInput" autocomplete="off" autocapitalize="off" spellcheck="false"></div></div>`;const out=body.querySelector(".output"),input=body.querySelector(".commandInput");const print=(t="")=>{const d=document.createElement("div");d.textContent=t;out.appendChild(d);out.scrollTop=out.scrollHeight};function run(raw){const line=raw.trim();if(!line)return;print("salp> "+line);history.push(line);localStorage.setItem(HIST_KEY,JSON.stringify(history.slice(-100)));const a=line.match(/(?:[^\s"]+|"[^"]*")+/g)||[],cmd=(a.shift()||"").toLowerCase(),args=a.map(x=>x.replace(/^"|"$/g,""));try{exec(cmd,args,print,out)}catch(e){print("? "+e.message)}}input.onkeydown=e=>{if(e.key==="Enter"){const v=input.value;input.value="";run(v)}else if(e.key==="ArrowUp"){e.preventDefault();if(historyIndex>0)input.value=history[--historyIndex]||""}};body.querySelectorAll("[data-cmd]").forEach(b=>b.onclick=()=>run(b.dataset.cmd));print("salp Terminal v7.0");print("Evolution Edition / BASIC Link");print('Type "help" for commands.\n');input.focus()}
function exec(cmd,args,print,out){if(cmd==="help"){print("ls cd pwd cat edit files apps open <app> ps kill <app> recent\nbasic | basic list | basic new <name> | basic load <name> | basic run <name>\nrunbasic <file.bas> clear history theme version resetdesktop");return}if(cmd==="ls"){const n=node(args[0]||cwd);print(Object.entries(n.children||{}).map(([k,v])=>k+(v.type==="dir"?"/":"")).join("  "));return}if(cmd==="cd"){const p=norm(args[0]||"/"),n=node(p);if(!n||n.type!=="dir")throw Error("directory not found");cwd=p;return}if(cmd==="pwd"){print(cwd);return}if(cmd==="cat"){const n=node(norm(args[0]));if(!n||n.type!=="file")throw Error("file not found");print(n.content);return}if(cmd==="files"){openApp("files");return}if(cmd==="apps"){Object.entries(APPS).forEach(([k,a])=>print(k+" - "+a.name));return}
if(cmd==="ps"){[...document.querySelectorAll(".window")].forEach(w=>print(w.dataset.app+(w.classList.contains("hidden")?" [minimized]":" [running]")));return}
if(cmd==="kill"){const w=findOpen((args[0]||"").toLowerCase());if(!w)throw Error("app is not running");closeWindow(w);return}
if(cmd==="recent"){recentApps.forEach((k,i)=>print((i+1)+" "+k));return}if(cmd==="open"){openApp((args[0]||"").toLowerCase());return}if(cmd==="edit"){openEditorPath(norm(args[0]));return}if(cmd==="basic"){const sub=(args.shift()||"").toLowerCase();if(!sub){openApp("basic");return}if(sub==="list"){Object.keys(node("/Projects/BASIC").children).forEach(x=>print(x));return}if(sub==="new"){const name=(args[0]||"new").replace(/\.bas$/i,"")+".bas";node("/Projects/BASIC").children[name]={type:"file",content:'10 CLS\n20 PRINT "NEW PROGRAM"\n30 END'};saveFS();openEditorPath("/Projects/BASIC/"+name);return}if(sub==="load"){let name=args[0]||"";if(!/\.bas$/i.test(name))name+=".bas";openEditorPath("/Projects/BASIC/"+name);return}if(sub==="run"){let name=args[0]||"";if(!/\.bas$/i.test(name))name+=".bas";openBasicCode("/Projects/BASIC/"+name,true);return}throw Error("basic command error")}if(cmd==="runbasic"){openBasicCode(norm(args[0]),true);return}if(cmd==="clear"){out.innerHTML="";return}if(cmd==="history"){history.forEach((x,i)=>print((i+1)+" "+x));return}if(cmd==="theme"){applyTheme(args[0]||"dark");return}if(cmd==="version"){print("salp Terminal v7.0\nEvolution Edition");return}if(cmd==="resetdesktop"){windowStates={};localStorage.removeItem(WINDOW_KEY);print("Desktop window positions reset.");return}throw Error("command not found")}
function buildFiles(body){body.innerHTML=`<div class="fileApp"><aside class="fileSide">${["/","/Documents","/Projects","/Projects/BASIC","/Downloads"].map(p=>`<button data-path="${p}">${p}</button>`).join("")}</aside><main class="fileMain"><div class="fileToolbar"><button id="fileUp">⬆</button><button id="newFile">＋ File</button><button id="openFile">Open</button><button id="deleteFile">Delete</button></div><div id="filePath" class="filePath"></div><div id="fileGrid" class="fileGrid"></div></main></div>`;body.querySelectorAll("[data-path]").forEach(b=>b.onclick=()=>{fileCwd=b.dataset.path;selectedPath=null;renderFiles()});body.querySelector("#fileUp").onclick=()=>{fileCwd=norm("..",fileCwd);renderFiles()};body.querySelector("#newFile").onclick=()=>{const name=prompt("File name");if(name){node(fileCwd).children[name]={type:"file",content:""};saveFS()}};body.querySelector("#openFile").onclick=openSelectedFile;body.querySelector("#deleteFile").onclick=()=>{if(selectedPath&&confirm("Delete?")){const q=parent(selectedPath);delete q.parent.children[q.name];selectedPath=null;saveFS()}};renderFiles()}
function renderFiles(){const grid=document.querySelector("#fileGrid"),path=document.querySelector("#filePath");if(!grid||!path)return;path.textContent=fileCwd;grid.innerHTML="";Object.entries(node(fileCwd)?.children||{}).forEach(([name,item])=>{const p=norm(name,fileCwd),b=document.createElement("button");b.className="fileItem"+(selectedPath===p?" selected":"");b.innerHTML=`<span class="ico">${item.type==="dir"?"📁":fileIcon(name)}</span><span class="nm">${name}</span>`;b.onclick=()=>{selectedPath=p;renderFiles()};b.ondblclick=()=>{selectedPath=p;openSelectedFile()};grid.appendChild(b)})}
function openSelectedFile(){if(!selectedPath)return;const n=node(selectedPath);if(n.type==="dir"){fileCwd=selectedPath;selectedPath=null;renderFiles()}else if(/\.bas$/i.test(selectedPath))openEditorPath(selectedPath);else openEditorPath(selectedPath)}
function buildEditor(body){body.innerHTML=`<div class="editorApp"><div class="editorToolbar"><button id="editorOpen">Open path</button><button id="editorSave">Save</button><button id="editorRun">Run</button><span id="editorPath" class="editorPath">No file</span></div><textarea id="editorText" class="editorText" spellcheck="false"></textarea></div>`;body.querySelector("#editorOpen").onclick=()=>{const p=prompt("Path",editingPath||"/Projects/BASIC/hello.bas");if(p)openEditorIn(body,norm(p,"/"))};body.querySelector("#editorSave").onclick=()=>saveEditorBody(body);body.querySelector("#editorRun").onclick=()=>{saveEditorBody(body);if(/\.bas$/i.test(editingPath))openBasicCode(editingPath,true)};if(editingPath)openEditorIn(body,editingPath)}
function openEditorPath(path){editingPath=path;let w=findOpen("editor");if(!w){openApp("editor");w=findOpen("editor")}focusWindow(w);openEditorIn(w.querySelector(".windowBody"),path)}
function openEditorIn(body,path){let n=node(path);if(!n){const q=parent(path);q.parent.children[q.name]={type:"file",content:""};saveFS();n=node(path)}editingPath=path;body.querySelector("#editorPath").textContent=path;body.querySelector("#editorText").value=n.content||""}
function saveEditorBody(body){if(editingPath){node(editingPath).content=body.querySelector("#editorText").value;saveFS()}}
function buildSettings(body){body.innerHTML=`<div class="settings"><h2>Appearance</h2><div class="settingGrid"><button class="themeCard" data-theme="dark">🌙<br>Dark</button><button class="themeCard" data-theme="light">☀️<br>Light</button><button class="themeCard" data-theme="hacker">🟢<br>Hacker</button></div></div>`;body.querySelectorAll("[data-theme]").forEach(b=>b.onclick=()=>applyTheme(b.dataset.theme))}
function buildAbout(body){body.innerHTML=`<div class="aboutApp"><h2>salp OS Desktop</h2><p><strong>salp Terminal v7.0 Evolution Edition</strong></p><p>ウィンドウ位置保存、左右スナップ、最近使ったアプリ、コマンドパレット、ターミナルのプロセス管理を追加しました。</p></div>`}
function applyTheme(t){document.body.className=t==="light"?"light":t==="hacker"?"hacker":"";localStorage.setItem(THEME_KEY,t)}
$("openSettings").onclick=()=>{openApp("settings");toggleStart(false)};$("openAbout").onclick=()=>{openApp("about");toggleStart(false)};
function paletteItems(query=""){
 const q=query.toLowerCase();
 const appItems=Object.entries(APPS).map(([k,a])=>({
  label:a.name+" — open "+k,
  icon:a.icon,
  run:()=>openApp(k)
 }));
 const cmds=["help","apps","ps","basic list","basic run hello","files","theme hacker","version"].map(c=>({
  label:c,
  icon:"⌨️",
  run:()=>{
   openApp("terminal");
   setTimeout(()=>{
    const i=findOpen("terminal")?.querySelector(".commandInput");
    if(i){
     i.value=c;
     i.dispatchEvent(new KeyboardEvent("keydown",{key:"Enter",bubbles:true}));
    }
   },50);
  }
 }));
 return [...appItems,...cmds].filter(x=>x.label.toLowerCase().includes(q));
}
function renderPalette(q=""){const list=$("paletteList");list.innerHTML="";paletteItems(q).forEach((x,i)=>{const b=document.createElement("button");b.className="paletteItem"+(i===0?" active":"");b.innerHTML=`<span>${x.icon}</span><span>${x.label}</span>`;b.onclick=()=>{x.run();togglePalette(false)};list.appendChild(b)})}
function togglePalette(force){const p=$("commandPalette"),show=force??!p.classList.contains("show");p.classList.toggle("show",show);if(show){renderPalette("");setTimeout(()=>$("paletteInput").focus(),10)}}
$("searchBtn").onclick=()=>togglePalette();$("paletteInput").oninput=e=>renderPalette(e.target.value);$("paletteInput").onkeydown=e=>{if(e.key==="Escape")togglePalette(false);if(e.key==="Enter")$("paletteList").querySelector(".paletteItem")?.click()};document.addEventListener("keydown",e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="k"){e.preventDefault();togglePalette()}});
function updateClock(){const d=new Date();$("clock").innerHTML=d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})+"<br>"+d.toLocaleDateString()}setInterval(updateClock,1000);updateClock();applyTheme(localStorage.getItem(THEME_KEY)||"dark");renderDesktop();renderQuick();renderStart();renderRecent();openApp("terminal");
})();
</script>
</body></html>
