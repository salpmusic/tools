<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#071019">
<title>salp Terminal v5.0｜BASIC Link</title>
<style>
:root{--bg:#071019;--panel:#0e1926;--panel2:#142337;--line:#29405b;--text:#edf7ff;--muted:#91a7ba;--green:#72f29a;--cyan:#6ee7f2;--pink:#ff8fbd;--red:#ff7f7f}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
button,input,textarea{font:inherit}button{cursor:pointer}
body.light{--bg:#e9eef4;--panel:#fff;--panel2:#edf3f8;--line:#c4d1dc;--text:#182431;--muted:#657687}
body.hacker{--bg:#010702;--panel:#061309;--panel2:#0a1e0f;--line:#19522a;--text:#b6ffc2;--muted:#65a970;--cyan:#6cff89;--pink:#6cff89}
.os{height:100%;display:flex;flex-direction:column;background:radial-gradient(circle at 12% 0,#173c4d88,transparent 30%),radial-gradient(circle at 90% 0,#4a244188,transparent 32%),var(--bg)}
.topbar{height:54px;display:flex;align-items:center;gap:10px;padding:8px 11px;border-bottom:1px solid var(--line);background:#071019dd;backdrop-filter:blur(15px)}
.logo{width:38px;height:38px;display:grid;place-items:center;border-radius:11px;background:linear-gradient(135deg,var(--cyan),var(--pink));color:#071019;font-weight:1000}
.title{font-weight:950}.sub{font-size:10px;color:var(--muted)}.spacer{flex:1}
.topbar button{min-height:36px;border:1px solid var(--line);border-radius:9px;background:var(--panel2);color:var(--text);padding:6px 10px}
.main{flex:1;min-height:0;display:grid;grid-template-columns:260px 1fr}
.side{min-height:0;display:flex;flex-direction:column;border-right:1px solid var(--line);background:#091421}
.sideHead{padding:12px;border-bottom:1px solid var(--line)}.sideHead b{color:var(--cyan)}.sideHead small{display:block;color:var(--muted);margin-top:4px}
.path{padding:9px 12px;border-bottom:1px solid var(--line);color:var(--cyan);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fileList{flex:1;overflow:auto;padding:8px}
.file{width:100%;display:flex;align-items:center;gap:8px;text-align:left;min-height:42px;margin-bottom:5px;padding:7px 9px;border:1px solid transparent;border-radius:9px;background:transparent;color:var(--text)}
.file:hover,.file.selected{background:var(--panel2);border-color:var(--line)}.file .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.sideActions{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:8px;border-top:1px solid var(--line)}
.sideActions button{min-height:38px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);color:var(--text)}
.work{min-width:0;min-height:0;display:grid;grid-template-rows:1fr 42%}
.terminal{min-height:0;display:flex;flex-direction:column;background:#03070a}
.termToolbar{display:flex;gap:7px;padding:7px 9px;border-bottom:1px solid #22303d;background:#0b1219}
.termToolbar button,.termToolbar select{min-height:32px;border:1px solid #314151;border-radius:8px;background:#141e28;color:#eef6ff;padding:4px 8px}
.output{flex:1;overflow:auto;padding:12px;color:var(--green);white-space:pre-wrap;word-break:break-word;font-size:13px;line-height:1.55}
.inputRow{display:flex;align-items:center;gap:7px;padding:9px 11px;border-top:1px solid #22303d;background:#080d12}
.prompt{color:var(--cyan);font-weight:950}.cmd{flex:1;min-width:0;border:0;outline:0;background:transparent;color:white;font-size:16px}
.studio{min-height:0;display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--line)}
.editorPane,.basicPane{min-width:0;min-height:0;display:flex;flex-direction:column;background:var(--panel)}
.paneHead{height:42px;display:flex;align-items:center;gap:7px;padding:6px 9px;border-bottom:1px solid var(--line);background:var(--panel2);font-size:11px;font-weight:900}
.paneHead .grow{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--cyan)}
.paneHead button{min-height:30px;border:1px solid var(--line);border-radius:7px;background:var(--panel);color:var(--text)}
.code{flex:1;width:100%;resize:none;border:0;outline:0;padding:12px;background:#060b10;color:var(--green);font:13px/1.5 ui-monospace,monospace}
.basicPane{border-left:1px solid var(--line)}iframe{width:100%;height:100%;border:0;background:white}
.empty{display:grid;place-items:center;height:100%;padding:25px;text-align:center;color:var(--muted)}
.toast{position:fixed;left:50%;bottom:18px;transform:translate(-50%,15px);opacity:0;pointer-events:none;padding:10px 14px;border-radius:999px;background:#111d29;color:white;border:1px solid var(--line);transition:.2s;z-index:9}.toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:760px){
 .main{grid-template-columns:1fr}.side{display:none}.work{grid-template-rows:52% 48%}.studio{grid-template-columns:1fr}.basicPane{display:none}.editorPane{border:0}
 .topbar .optional{display:none}
}
</style>
</head>
<body>
<div class="os">
<header class="topbar">
 <div class="logo">SO</div><div><div class="title">salp Terminal v5.0</div><div class="sub">salp OS Command Center — N88-BASIC Link</div></div>
 <div class="spacer"></div>
 <button class="optional" id="basicAppBtn">⌨ BASIC</button>
 <button id="themeBtn">◐ Theme</button>
</header>

<div class="main">
<aside class="side">
 <div class="sideHead"><b>📁 salp FS</b><small>BASIC対応仮想ファイル</small></div>
 <div class="path" id="path">/Projects/BASIC</div>
 <div class="fileList" id="fileList"></div>
 <div class="sideActions"><button id="newBas">＋ BAS</button><button id="newTxt">＋ TXT</button><button id="downloadBtn">保存</button><button id="deleteBtn">削除</button></div>
</aside>

<main class="work">
<section class="terminal">
 <div class="termToolbar">
  <button id="clearBtn">CLEAR</button><button id="helpBtn">HELP</button>
  <select id="mode"><option value="linux">salp&gt;</option><option value="dos">C:\SALP&gt;</option><option value="basic">Ok</option></select>
 </div>
 <div class="output" id="output"></div>
 <div class="inputRow"><span class="prompt" id="prompt">salp&gt;</span><input class="cmd" id="cmd" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="help"></div>
</section>

<section class="studio">
 <div class="editorPane">
  <div class="paneHead"><span>EDITOR</span><span class="grow" id="editName">/Projects/BASIC/hello.bas</span><button id="saveEdit">SAVE</button><button id="runEdit">▶ RUN</button></div>
  <textarea class="code" id="code" spellcheck="false"></textarea>
 </div>
 <div class="basicPane">
  <div class="paneHead"><span>salp N88-BASIC</span><span class="grow">linked application</span><button id="reloadBasic">↻</button></div>
  <div id="basicHost" style="flex:1;min-height:0"><div class="empty">BASICを起動すると、ここに<br>salp-n88-basic.html が表示されます。</div></div>
 </div>
</section>
</main>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
(()=>{"use strict";
const $=id=>document.getElementById(id);
const FS_KEY="salpTerminalFS_v5",HIST_KEY="salpTerminalHistory_v5",THEME_KEY="salpTerminalTheme_v5";
const BASIC_URL="../salp-n88-basic.html";
const defaultFS=()=>({type:"dir",children:{
 "Projects":{type:"dir",children:{
  "BASIC":{type:"dir",children:{
   "hello.bas":{type:"file",content:'10 CLS\n20 PRINT "HELLO FROM SALP TERMINAL"\n30 FOR I=1 TO 5\n40 PRINT I;" "; \n50 NEXT I\n60 PRINT\n70 END'},
   "arpeggio.bas":{type:"file",content:'10 CLS\n20 PRINT "SALP ARPEGGIO"\n30 PLAY "T95 O5 L16 CEG>CEG<C"\n40 END'},
   "number-game.bas":{type:"file",content:'10 CLS\n20 N=INT(RND(1)*10)+1\n30 INPUT "1-10";A\n40 IF A=N THEN PRINT "CORRECT!":END\n50 IF A<N THEN PRINT "HIGHER"\n60 IF A>N THEN PRINT "LOWER"\n70 GOTO 30'}
  }},
  "WEB":{type:"dir",children:{"hello.html":{type:"file",content:"<!doctype html><h1>Hello salp OS</h1>"} }}
 }},
 "Documents":{type:"dir",children:{"readme.txt":{type:"file",content:"salp Terminal v5.0\nType help for commands."}}},
 "System":{type:"dir",children:{"version.txt":{type:"file",content:"salp Terminal v5.0\nBASIC Link Edition"}}}
}});
let fs;try{fs=JSON.parse(localStorage.getItem(FS_KEY))||defaultFS()}catch{fs=defaultFS()}
let cwd="/Projects/BASIC",selected="/Projects/BASIC/hello.bas",editing=selected;
let hist=[];try{hist=JSON.parse(localStorage.getItem(HIST_KEY))||[]}catch{}let hi=hist.length;
const out=$("output"),code=$("code"),basicHost=$("basicHost");
function saveFS(){localStorage.setItem(FS_KEY,JSON.stringify(fs));renderFiles()}
function norm(p,base=cwd){if(!p)return base;const full=p.startsWith("/")?p:(base==="/"?"/"+p:base+"/"+p),s=[];full.split("/").forEach(x=>{if(!x||x===".")return;x===".."?s.pop():s.push(x)});return"/"+s.join("/")}
function parts(p){const n=norm(p,"/");return n==="/"?[]:n.slice(1).split("/")}
function node(p){let n=fs;for(const x of parts(p)){if(!n||n.type!=="dir"||!n.children[x])return null;n=n.children[x]}return n}
function parent(p){const a=parts(p),name=a.pop();return{dir:node("/"+a.join("/")),name}}
function print(s=""){out.textContent+=String(s)+"\n";out.scrollTop=out.scrollHeight}
function toast(s){const t=$("toast");t.textContent=s;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1200)}
function promptText(){return $("mode").value==="dos"?"C:\\SALP>":$("mode").value==="basic"?"Ok":"salp>"}
function updatePrompt(){$("prompt").textContent=promptText()}
function renderFiles(){
 $("path").textContent=cwd;const box=$("fileList");box.innerHTML="";
 const n=node(cwd);if(!n||n.type!=="dir")return;
 if(cwd!=="/"){const b=document.createElement("button");b.className="file";b.innerHTML="↩ <span class=name>..</span>";b.onclick=()=>{cwd=norm("..");selected=null;renderFiles()};box.appendChild(b)}
 Object.entries(n.children).sort((a,b)=>a[1].type===b[1].type?a[0].localeCompare(b[0]):a[1].type==="dir"?-1:1).forEach(([name,v])=>{
  const p=norm(name),b=document.createElement("button");b.className="file"+(p===selected?" selected":"");
  b.innerHTML=(v.type==="dir"?"📁":"📄")+` <span class="name">${name}</span>`;
  b.onclick=()=>{if(v.type==="dir"){cwd=p;selected=null;renderFiles()}else{selected=p;openFile(p)}};
  box.appendChild(b)
 })
}
function openFile(p){const n=node(p);if(!n||n.type!=="file")throw Error("file not found");editing=p;selected=p;code.value=n.content;$("editName").textContent=p;renderFiles()}
function writeFile(p,content){const q=parent(p);if(!q.dir||q.dir.type!=="dir")throw Error("parent not found");q.dir.children[q.name]={type:"file",content};saveFS()}
function uniqueName(ext){let i=1,n=`new${ext}`;while(node(norm(n)))n=`new${i++}${ext}`;return n}
function saveEditor(){writeFile(editing,code.value);toast("保存しました")}
function openBasic(program="",autoRun=false){
 basicHost.innerHTML="";const f=document.createElement("iframe");f.src=BASIC_URL+"?terminal=v5&t="+Date.now();f.title="salp N88-BASIC";
 f.onload=()=>{try{const d=f.contentDocument,ed=d.getElementById("editor");if(ed&&program){ed.value=program;ed.dispatchEvent(new Event("input",{bubbles:true}))}if(autoRun){const run=d.getElementById("runBtn");if(run)setTimeout(()=>run.click(),120)}}catch(e){print("BASIC link error: "+e.message)}};
 basicHost.appendChild(f);return f
}
function runBas(p){const n=node(p);if(!n||n.type!=="file")throw Error("BAS file not found");if(!p.toLowerCase().endsWith(".bas"))throw Error("runbasic requires .bas");openFile(p);openBasic(n.content,true);print("Running BASIC: "+p)}
function listBasic(){const n=node("/Projects/BASIC");if(!n)return print("BASIC folder not found");Object.keys(n.children).filter(x=>x.toLowerCase().endsWith(".bas")).forEach(x=>print(x))}
function tree(n=node(cwd),pre=""){if(!n||n.type!=="dir")return"";return Object.entries(n.children).map(([k,v],i)=>{const last=i===Object.keys(n.children).length-1;return pre+(last?"└─ ":"├─ ")+k+(v.type==="dir"?"/\n"+tree(v,pre+(last?"   ":"│  ")):"")}).join("\n")}
function exec(raw){
 const a=raw.match(/(?:[^\s"]+|"[^"]*")+/g)||[],cmd=(a.shift()||"").toLowerCase(),args=a.map(x=>x.replace(/^"|"$/g,""));
 if(!cmd)return;
 if(cmd==="help"){print("FILES: ls cd pwd tree cat mkdir touch write edit rm\nBASIC: basic | basic list | basic new <name> | basic load <name> | basic run <name>\n       runbasic <file.bas> | savebasic <name>\nSYSTEM: apps open clear history theme version exportfs");return}
 if(cmd==="pwd"){print(cwd);return}
 if(cmd==="ls"){const n=node(args[0]||cwd);if(!n)throw Error("path not found");print(n.type==="file"?args[0]:Object.entries(n.children).map(([k,v])=>k+(v.type==="dir"?"/":"")).join("  ")||"(empty)");return}
 if(cmd==="cd"){const p=norm(args[0]||"/"),n=node(p);if(!n||n.type!=="dir")throw Error("directory not found");cwd=p;selected=null;renderFiles();return}
 if(cmd==="tree"){print((args[0]||cwd)+"\n"+tree(node(args[0]||cwd)));return}
 if(cmd==="cat"){const n=node(args[0]);if(!n||n.type!=="file")throw Error("file not found");print(n.content);return}
 if(cmd==="mkdir"){if(!args[0])throw Error("name required");const q=parent(norm(args[0]));if(!q.dir)throw Error("parent not found");q.dir.children[q.name]={type:"dir",children:{}};saveFS();return}
 if(cmd==="touch"){if(!args[0])throw Error("name required");writeFile(norm(args[0]),"");return}
 if(cmd==="write"){if(!args[0])throw Error("file required");writeFile(norm(args[0]),args.slice(1).join(" "));return}
 if(cmd==="edit"){openFile(norm(args[0]));return}
 if(cmd==="rm"){const p=norm(args[0]);if(p==="/")throw Error("cannot delete root");const q=parent(p);if(!q.dir||!q.dir.children[q.name])throw Error("not found");delete q.dir.children[q.name];saveFS();return}
 if(cmd==="clear"){out.textContent="";return}
 if(cmd==="history"){hist.forEach((x,i)=>print(`${i+1}  ${x}`));return}
 if(cmd==="apps"){print("terminal  files  editor  basic  runner  pixel  frame  color  qr");return}
 if(cmd==="open"){if((args[0]||"").toLowerCase()==="basic"){openBasic();return}print("open: basic is linked in this build");return}
 if(cmd==="runbasic"){runBas(norm(args[0]));return}
 if(cmd==="savebasic"){const name=(args[0]||"program").replace(/\.bas$/i,"")+".bas";writeFile("/Projects/BASIC/"+name,code.value);print("Saved: /Projects/BASIC/"+name);return}
 if(cmd==="basic"){
  const sub=(args.shift()||"").toLowerCase();
  if(!sub){openBasic(code.value,false);return}
  if(sub==="list"){listBasic();return}
  if(sub==="new"){const name=(args[0]||"new").replace(/\.bas$/i,"")+".bas",p="/Projects/BASIC/"+name;writeFile(p,'10 CLS\n20 PRINT "NEW PROGRAM"\n30 END');openFile(p);print("Created: "+p);return}
  if(sub==="load"){let name=args[0]||"";if(!name.toLowerCase().endsWith(".bas"))name+=".bas";openFile("/Projects/BASIC/"+name);print("Loaded: "+name);return}
  if(sub==="run"){let name=args[0]||"";if(!name.toLowerCase().endsWith(".bas"))name+=".bas";runBas("/Projects/BASIC/"+name);return}
  throw Error("basic command: list/new/load/run")
 }
 if(cmd==="theme"){applyTheme(args[0]||"dark");return}
 if(cmd==="version"){print("salp Terminal v5.0\nBASIC Link Edition");return}
 if(cmd==="exportfs"){const b=new Blob([JSON.stringify(fs,null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="salp-terminal-v5-filesystem.json";a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500);return}
 throw Error("command not found: "+cmd)
}
function applyTheme(t){document.body.className=t==="light"?"light":t==="hacker"?"hacker":"";localStorage.setItem(THEME_KEY,t)}
$("cmd").addEventListener("keydown",e=>{if(e.key==="Enter"){const raw=e.target.value.trim();e.target.value="";if(!raw)return;print(promptText()+" "+raw);hist.push(raw);localStorage.setItem(HIST_KEY,JSON.stringify(hist.slice(-100)));hi=hist.length;try{exec(raw)}catch(x){print("? "+x.message)}}else if(e.key==="ArrowUp"){e.preventDefault();if(hi>0)e.target.value=hist[--hi]||""}else if(e.key==="ArrowDown"){e.preventDefault();if(hi<hist.length-1)e.target.value=hist[++hi]||"";else{hi=hist.length;e.target.value=""}}});
$("mode").onchange=updatePrompt;$("clearBtn").onclick=()=>out.textContent="";$("helpBtn").onclick=()=>exec("help");
$("saveEdit").onclick=saveEditor;$("runEdit").onclick=()=>{saveEditor();runBas(editing)};
$("basicAppBtn").onclick=()=>openBasic(code.value,false);$("reloadBasic").onclick=()=>openBasic(code.value,false);
$("newBas").onclick=()=>exec("basic new "+uniqueName(".bas"));$("newTxt").onclick=()=>{const p=norm(uniqueName(".txt"));writeFile(p,"");openFile(p)};
$("deleteBtn").onclick=()=>{if(!selected)return toast("ファイルを選択");if(confirm("削除しますか？"))exec("rm "+selected)};
$("downloadBtn").onclick=()=>{if(!selected)return toast("ファイルを選択");const n=node(selected);if(!n||n.type!=="file")return;const b=new Blob([n.content],{type:"text/plain;charset=utf-8"}),a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=parts(selected).pop();a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)};
$("themeBtn").onclick=()=>{const now=localStorage.getItem(THEME_KEY)||"dark",next=now==="dark"?"light":now==="light"?"hacker":"dark";applyTheme(next)};
applyTheme(localStorage.getItem(THEME_KEY)||"dark");updatePrompt();renderFiles();openFile(editing);
print("salp Terminal v5.0 — BASIC Link Edition");print('Type "help" for commands.');print("");$("cmd").focus();
})();
</script>
</body>
</html>
