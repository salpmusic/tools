<style>

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}button,input,select,textarea{font:inherit}button{cursor:pointer}

.desktop{position:absolute;inset:0 0 58px 0;padding:18px;display:grid;grid-template-columns:repeat(auto-fill,92px);grid-auto-rows:104px;align-content:start;gap:10px}.desktopIcon{width:88px;height:98px;border:0;background:transparent;color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;border-radius:13px;text-shadow:0 2px 5px #000}.desktopIcon:hover,.desktopIcon:focus{background:rgba(255,255,255,.1)}.desktopIcon .emoji{font-size:38px}.desktopIcon .label{font-size:11px;text-align:center;line-height:1.25}
.taskbar{position:absolute;left:0;right:0;bottom:0;height:58px;z-index:1000;display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--taskbar);border-top:1px solid var(--line);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
.startBtn,.taskBtn,.trayBtn{min-height:42px;border:1px solid var(--line);border-radius:11px;background:var(--panel2);color:var(--text);padding:7px 11px}.startBtn{font-weight:900;background:linear-gradient(135deg,var(--green),var(--blue));color:#101418;border:0}.taskItems{display:flex;gap:6px;flex:1;overflow:auto}.taskBtn{max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}.taskBtn.active{outline:2px solid var(--green)}.clock{min-width:72px;text-align:center;font-size:11px;color:var(--muted)}
.startMenu{position:absolute;left:10px;bottom:66px;width:min(92vw,360px);z-index:1100;display:none;padding:13px;border:1px solid var(--line);border-radius:18px;background:var(--taskbar);box-shadow:0 20px 55px rgba(0,0,0,.45);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}.startMenu.show{display:block}.startHead{display:flex;align-items:center;gap:10px;padding:6px 4px 12px}.startLogo{width:44px;height:44px;display:grid;place-items:center;border-radius:13px;background:linear-gradient(135deg,var(--green),var(--blue));color:#111;font-weight:900}.startGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.startApp{min-height:76px;border:1px solid var(--line);border-radius:13px;background:var(--panel2);color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}.startApp span:first-child{font-size:28px}.startApp span:last-child{font-size:10px}.startFoot{display:flex;gap:7px;margin-top:11px}.startFoot button{flex:1}
.window{position:absolute;left:80px;top:54px;width:min(820px,calc(100vw - 30px));height:min(610px,calc(100vh - 92px));min-width:280px;min-height:220px;z-index:50;display:flex;flex-direction:column;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--panel);box-shadow:0 18px 55px rgba(0,0,0,.45)}.window.hidden{display:none}.window.maximized{left:0!important;top:0!important;width:100%!important;height:calc(100% - 58px)!important;border-radius:0}.titlebar{height:44px;flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:7px 8px 7px 12px;background:var(--panel2);border-bottom:1px solid var(--line);user-select:none;touch-action:none}.windowTitle{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:900}.winControls{display:flex;gap:5px}.winControls button{width:34px;height:30px;border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--text);padding:0}.windowBody{position:relative;flex:1;min-height:0;overflow:auto;background:var(--panel)}.resizeHandle{position:absolute;right:0;bottom:0;width:20px;height:20px;cursor:nwse-resize;touch-action:none}.appFrame{width:100%;height:100%;border:0;background:#fff}
.terminalApp{height:100%;display:flex;flex-direction:column;background:#050708}.termToolbar{display:flex;gap:7px;padding:8px;background:#10151b;border-bottom:1px solid #27303a}.termToolbar select,.termToolbar button{min-height:34px;border:1px solid #35404d;border-radius:8px;background:#18202a;color:#edf3fa;padding:5px 8px}.output{flex:1;overflow:auto;padding:13px;white-space:pre-wrap;word-break:break-word;color:var(--green);line-height:1.55;font-size:13px}.commandRow{display:flex;gap:8px;padding:10px 12px;border-top:1px solid #27303a;background:#0b0f14}.prompt{color:var(--blue);font-weight:900}.commandInput{flex:1;min-width:0;border:0;outline:0;background:transparent;color:#fff;font-size:16px}
.fileApp{height:100%;display:grid;grid-template-columns:190px 1fr}.fileSide{padding:10px;border-right:1px solid var(--line);background:var(--panel2);overflow:auto}.fileSide button{width:100%;margin-bottom:5px;text-align:left;min-height:38px;border:0;border-radius:8px;background:transparent;color:var(--text)}.fileMain{display:flex;flex-direction:column;min-width:0}.fileToolbar{display:flex;gap:6px;flex-wrap:wrap;padding:9px;border-bottom:1px solid var(--line)}.fileToolbar button{min-height:37px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);color:var(--text)}.filePath{padding:8px 11px;color:var(--blue);border-bottom:1px solid var(--line);font-size:12px}.fileGrid{padding:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;overflow:auto}.fileItem{min-height:94px;border:1px solid var(--line);border-radius:12px;background:var(--panel2);color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}.fileItem.selected{outline:3px solid var(--green)}.fileItem .ico{font-size:30px}.fileItem .nm{max-width:95%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}
.editorApp{height:100%;display:flex;flex-direction:column}.editorToolbar{display:flex;gap:7px;padding:9px;border-bottom:1px solid var(--line)}.editorToolbar button{min-height:38px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);color:var(--text)}.editorPath{flex:1;padding:9px;color:var(--blue);font-size:12px}.editorText{flex:1;width:100%;resize:none;border:0;outline:0;background:#080c11;color:#fff;padding:14px;font:14px/1.55 ui-monospace,monospace}.previewFrame{width:100%;height:100%;border:0;background:#fff}.settings,.aboutApp{padding:20px}.settingGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.themeCard{min-height:100px;border:1px solid var(--line);border-radius:13px;background:var(--panel2);color:var(--text)}.aboutLogo{width:72px;height:72px;display:grid;place-items:center;border-radius:20px;background:linear-gradient(135deg,var(--green),var(--blue));color:#111;font-size:24px;font-weight:900}.hiddenInput{display:none}
@media(max-width:700px){.desktop{grid-template-columns:repeat(3,88px);padding:10px}.window{left:8px!important;top:8px!important;width:calc(100% - 16px)!important;height:calc(100% - 74px)!important}.fileApp{grid-template-columns:1fr}.fileSide{display:none}.settingGrid{grid-template-columns:1fr}.clock{display:none}}
</style>

<body>
<div class="os" id="os"><div class="wallpaperText">salp OS</div><div id="desktop" class="desktop"></div><div id="windows"></div>
<div id="startMenu" class="startMenu"><div class="startHead"><div class="startLogo">SO</div><div><strong>salp OS Preview</strong><br><small style="color:var(--muted)">Terminal v4.0</small></div></div><div id="startGrid" class="startGrid"></div><div class="startFoot"><button id="openSettings">⚙ Settings</button><button id="openAbout">ℹ About</button></div></div>
<div class="taskbar"><button id="startBtn" class="startBtn">🐱 salp</button><div id="taskItems" class="taskItems"></div><button id="showDesktop" class="trayBtn">▭</button><div id="clock" class="clock"></div></div></div>
<input id="uploadInput" class="hiddenInput" type="file" multiple><input id="importInput" class="hiddenInput" type="file" accept=".json,application/json">
<script>
(()=>{"use strict";
const $=id=>document.getElementById(id),FS_KEY="salpTerminalFS_v4",OLD_FS_KEY="salpTerminalFS_v3",HIST_KEY="salpTerminalHistory_v4",MODE_KEY="salpTerminalMode_v4",THEME_KEY="salpOSTheme_v4";
const APPS={terminal:{name:"Terminal",icon:"⌨️",type:"terminal"},files:{name:"Files",icon:"📁",type:"files"},editor:{name:"Editor",icon:"📝",type:"editor"},pixel:{name:"Pixel",icon:"🎨",type:"iframe",url:"../Pixel.html"},frame:{name:"Frame",icon:"🖼️",type:"iframe",url:"../Frame.html"},resize:{name:"Resize",icon:"📐",type:"iframe",url:"../Resize.html"},qr:{name:"QR Maker",icon:"🔲",type:"iframe",url:"../qrcode.html"},color:{name:"Color",icon:"🎮",type:"iframe",url:"../color/index.html"},video:{name:"Video",icon:"🎬",type:"iframe",url:"../video.html"},runner:{name:"HTML Runner",icon:"💻",type:"iframe",url:"../html-runner.html"},salpcode:{name:"salpCode",icon:"🐱",type:"iframe",url:"../salpcode.html"},music:{name:"Music",icon:"🎵",type:"iframe",url:"https://linktr.ee/salp"},settings:{name:"Settings",icon:"⚙️",type:"settings"},about:{name:"About salp OS",icon:"ℹ️",type:"about"}};
const desktopApps=["terminal","files","editor","video","qr","color","pixel","frame","runner","music"];
function defaultFS(){return {type:"dir",children:{Desktop:{type:"dir",children:{}},Documents:{type:"dir",children:{"welcome.txt":{type:"file",content:"Welcome to salp OS Preview\n\nType help in Terminal."}}},Projects:{type:"dir",children:{"hello.html":{type:"file",content:"<!doctype html><html><body style='font-family:sans-serif;padding:30px'><h1>Hello salp OS!</h1><p>Created inside salp Terminal v4.</p></body></html>"}}},Pictures:{type:"dir",children:{}},Music:{type:"dir",children:{}},Videos:{type:"dir",children:{}},Downloads:{type:"dir",children:{}},System:{type:"dir",children:{"version.txt":{type:"file",content:"salp Terminal v4.0\nsalp OS Preview"}}}}}}
let fs;try{const v4=localStorage.getItem(FS_KEY),v3=localStorage.getItem(OLD_FS_KEY);fs=v4?JSON.parse(v4):v3?JSON.parse(v3):defaultFS()}catch{fs=defaultFS()}
let cwd="/",fileCwd="/",selectedPath=null,editingPath="",history=JSON.parse(localStorage.getItem(HIST_KEY)||"[]"),historyIndex=history.length,mode=localStorage.getItem(MODE_KEY)||"linux",topZ=60,windowCount=0;
function saveFS(){localStorage.setItem(FS_KEY,JSON.stringify(fs));renderFiles()}function norm(path,base=cwd){if(!path)return base;const full=path.startsWith("/")?path:(base==="/"?"/"+path:base+"/"+path),stack=[];full.split("/").forEach(p=>{if(!p||p===".")return;if(p==="..")stack.pop();else stack.push(p)});return "/"+stack.join("/")}function parts(path){const n=norm(path,"/");return n==="/"?[]:n.slice(1).split("/")}function node(path){let n=fs;for(const p of parts(path)){if(!n||n.type!=="dir"||!n.children[p])return null;n=n.children[p]}return n}function parent(path){const a=parts(path),name=a.pop(),pp="/"+a.join("/");return {parent:node(pp||"/"),name}}function clone(v){return JSON.parse(JSON.stringify(v))}
function fileIcon(name){const ext=(name.split(".").pop()||"").toLowerCase();if(["html","htm"].includes(ext))return "🌐";if(["png","jpg","jpeg","gif","webp"].includes(ext))return "🖼️";if(["mp3","wav","m4a","aac"].includes(ext))return "🎵";if(["mp4","mov","webm"].includes(ext))return "🎬";if(["js","css","json"].includes(ext))return "🧩";return "📄"}
function renderDesktop(){const d=$("desktop");d.innerHTML="";desktopApps.forEach(key=>{const app=APPS[key],b=document.createElement("button");b.className="desktopIcon";b.innerHTML=`<span class="emoji">${app.icon}</span><span class="label">${app.name}</span>`;b.ondblclick=()=>openApp(key);b.onclick=()=>{if(innerWidth<700)openApp(key)};d.appendChild(b)})}
function renderStart(){const g=$("startGrid");g.innerHTML="";Object.entries(APPS).filter(([k])=>!["settings","about"].includes(k)).forEach(([key,app])=>{const b=document.createElement("button");b.className="startApp";b.innerHTML=`<span>${app.icon}</span><span>${app.name}</span>`;b.onclick=()=>{openApp(key);toggleStart(false)};g.appendChild(b)})}
function toggleStart(force){$("startMenu").classList.toggle("show",force??!$("startMenu").classList.contains("show"))}$("startBtn").onclick=()=>toggleStart();$("openSettings").onclick=()=>{openApp("settings");toggleStart(false)};$("openAbout").onclick=()=>{openApp("about");toggleStart(false)};document.addEventListener("pointerdown",e=>{if(!$("startMenu").contains(e.target)&&e.target!==$("startBtn"))toggleStart(false)});
function createWindow(key,title,icon){const id="win-"+(++windowCount),w=document.createElement("section");w.className="window";w.id=id;w.dataset.app=key;const o=(windowCount%7)*24;w.style.left=(55+o)+"px";w.style.top=(28+o)+"px";w.innerHTML=`<div class="titlebar"><div class="windowTitle"><span>${icon}</span><span>${title}</span></div><div class="winControls"><button data-act="min">—</button><button data-act="max">□</button><button data-act="close">×</button></div></div><div class="windowBody"></div><div class="resizeHandle"></div>`;$("windows").appendChild(w);makeWindowInteractive(w);createTaskButton(w,title,icon);focusWindow(w);return w}
function createTaskButton(w,title,icon){const b=document.createElement("button");b.className="taskBtn active";b.dataset.win=w.id;b.textContent=icon+" "+title;b.onclick=()=>{if(w.classList.contains("hidden"))w.classList.remove("hidden");else if(+w.style.zIndex===topZ)w.classList.add("hidden");focusWindow(w)};$("taskItems").appendChild(b)}function focusWindow(w){topZ++;w.style.zIndex=topZ;document.querySelectorAll(".taskBtn").forEach(b=>b.classList.toggle("active",b.dataset.win===w.id&&!w.classList.contains("hidden")))}function closeWindow(w){document.querySelector(`.taskBtn[data-win="${w.id}"]`)?.remove();w.remove()}
function makeWindowInteractive(w){const bar=w.querySelector(".titlebar");let drag=false,sx=0,sy=0,sl=0,st=0;bar.addEventListener("pointerdown",e=>{if(e.target.closest("button")||w.classList.contains("maximized"))return;drag=true;sx=e.clientX;sy=e.clientY;sl=w.offsetLeft;st=w.offsetTop;bar.setPointerCapture(e.pointerId);focusWindow(w)});bar.addEventListener("pointermove",e=>{if(drag){w.style.left=Math.max(0,sl+e.clientX-sx)+"px";w.style.top=Math.max(0,st+e.clientY-sy)+"px"}});bar.addEventListener("pointerup",()=>drag=false);w.onpointerdown=()=>focusWindow(w);w.querySelector('[data-act="close"]').onclick=()=>closeWindow(w);w.querySelector('[data-act="min"]').onclick=()=>{w.classList.add("hidden");focusWindow(w)};w.querySelector('[data-act="max"]').onclick=()=>w.classList.toggle("maximized");const rh=w.querySelector(".resizeHandle");let resizing=false,rw=0,rh0=0,rx=0,ry=0;rh.onpointerdown=e=>{resizing=true;rw=w.offsetWidth;rh0=w.offsetHeight;rx=e.clientX;ry=e.clientY;rh.setPointerCapture(e.pointerId)};rh.onpointermove=e=>{if(resizing&&!w.classList.contains("maximized")){w.style.width=Math.max(280,rw+e.clientX-rx)+"px";w.style.height=Math.max(220,rh0+e.clientY-ry)+"px"}};rh.onpointerup=()=>resizing=false}
$("showDesktop").onclick=()=>document.querySelectorAll(".window").forEach(w=>w.classList.add("hidden"));function findOpen(key){return [...document.querySelectorAll(".window")].find(w=>w.dataset.app===key)}
function openApp(key){const app=APPS[key];if(!app)return;if(["terminal","files"].includes(key)){const old=findOpen(key);if(old){old.classList.remove("hidden");focusWindow(old);return}}const w=createWindow(key,app.name,app.icon),body=w.querySelector(".windowBody");if(app.type==="iframe"){const f=document.createElement("iframe");f.className="appFrame";f.src=app.url;f.allow="clipboard-read; clipboard-write; fullscreen";body.appendChild(f)}else if(app.type==="terminal")buildTerminal(body);else if(app.type==="files")buildFiles(body);else if(app.type==="editor")buildEditor(body);else if(app.type==="settings")buildSettings(body);else buildAbout(body)}
function promptText(){if(mode==="dos")return cwd==="/"?"C:\\>":"C:\\"+cwd.slice(1).replace(/\//g,"\\")+">";if(mode==="jp")return "端末:"+cwd+">";return "salp@"+cwd+"$"}
function buildTerminal(body){body.innerHTML=`<div class="terminalApp"><div class="termToolbar"><select id="termMode"><option value="linux">Linux</option><option value="dos">MS-DOS</option><option value="jp">日本語</option></select><button data-cmd="help">help</button><button data-cmd="ls">ls</button><button data-cmd="files">files</button><button data-cmd="clear">clear</button></div><div id="termOutput" class="output"></div><div class="commandRow"><span id="termPrompt" class="prompt"></span><input id="termInput" class="commandInput" autocomplete="off" autocapitalize="off" spellcheck="false"></div></div>`;const out=body.querySelector("#termOutput"),input=body.querySelector("#termInput"),prompt=body.querySelector("#termPrompt"),sel=body.querySelector("#termMode");function print(t="",c=""){const d=document.createElement("div");d.textContent=t;if(c)d.style.color=c;out.appendChild(d);out.scrollTop=out.scrollHeight}function update(){prompt.textContent=promptText();sel.value=mode}function run(raw){const line=raw.trim();if(!line)return;print(promptText()+" "+line,"#6fd8ff");history.push(line);localStorage.setItem(HIST_KEY,JSON.stringify(history.slice(-100)));historyIndex=history.length;const tokens=line.match(/(?:[^\s"]+|"[^"]*")+/g)||[];const cmd=(tokens.shift()||"").toLowerCase(),args=tokens.map(x=>x.replace(/^"|"$/g,""));try{exec(cmd,args,print,update,out)}catch(e){print("Error: "+e.message,"#ff7b7b")}}input.onkeydown=e=>{if(e.key==="Enter"){const v=input.value;input.value="";run(v)}else if(e.key==="ArrowUp"){e.preventDefault();if(historyIndex>0)historyIndex--;input.value=history[historyIndex]||""}else if(e.key==="ArrowDown"){e.preventDefault();if(historyIndex<history.length)historyIndex++;input.value=history[historyIndex]||""}};sel.onchange=()=>{mode=sel.value;localStorage.setItem(MODE_KEY,mode);update()};body.querySelectorAll("[data-cmd]").forEach(b=>b.onclick=()=>run(b.dataset.cmd));print("salp Terminal v4.0");print("salp OS Preview — Terminal + Files + Apps");print("Type help to see commands.\n");update();input.focus()}
function exec(cmd,args,print,update,out){if(cmd==="help"){print("ls  cd  pwd  mkdir  touch  write  edit  cat  rm  copy  move  tree\nfiles  apps  open <app>  run <file.html>\nhistory  clear  theme dark|light|hacker  exportfs  importfs  version");return}if(cmd==="ls"){const n=node(args[0]||cwd);if(!n)throw Error("path not found");print(n.type==="file"?(args[0]||"file"):Object.entries(n.children).map(([k,v])=>k+(v.type==="dir"?"/":"")).join("  ")||"(empty)");return}if(cmd==="cd"){const p=norm(args[0]||"/"),n=node(p);if(!n||n.type!=="dir")throw Error("directory not found");cwd=p;update();return}if(cmd==="pwd"){print(cwd);return}if(cmd==="mkdir"||cmd==="touch"||cmd==="write"){if(!args[0])throw Error("path required");const q=parent(args[0]);if(!q.parent)throw Error("parent not found");q.parent.children[q.name]=cmd==="mkdir"?{type:"dir",children:{}}:{type:"file",content:cmd==="write"?args.slice(1).join(" "):""};saveFS();return}if(cmd==="cat"){const n=node(args[0]);if(!n||n.type!=="file")throw Error("file not found");print(n.content);return}if(cmd==="edit"){openEditorPath(norm(args[0]));return}if(cmd==="rm"){const p=norm(args[0]);if(p==="/")throw Error("cannot delete root");const q=parent(p);delete q.parent.children[q.name];saveFS();return}if(cmd==="copy"||cmd==="move"){const s=node(args[0]),t=parent(args[1]);if(!s||!t.parent)throw Error("path error");t.parent.children[t.name]=clone(s);if(cmd==="move"){const q=parent(args[0]);delete q.parent.children[q.name]}saveFS();return}if(cmd==="tree"){print((args[0]||cwd)+"\n"+treeText(node(args[0]||cwd)));return}if(cmd==="files"){openApp("files");return}if(cmd==="apps"){Object.entries(APPS).forEach(([k,a])=>print(k+" - "+a.name));return}if(cmd==="open"){openApp((args[0]||"").toLowerCase());return}if(cmd==="run"){const p=norm(args[0]),n=node(p);if(!n||n.type!=="file")throw Error("file not found");openPreview(p,n.content);return}if(cmd==="history"){history.forEach((x,i)=>print((i+1)+"  "+x));return}if(cmd==="clear"){out.innerHTML="";return}if(cmd==="theme"){applyTheme(args[0]||"dark");return}if(cmd==="exportfs"){downloadBlob("salp-os-filesystem.json",JSON.stringify({app:"salp OS",version:4,fs},null,2),"application/json");return}if(cmd==="importfs"){$("importInput").click();return}if(cmd==="version"){print("salp Terminal v4.0\nsalp OS Preview");return}print("command not found: "+cmd,"#ff7b7b")}
function treeText(n,p=""){if(!n)return "";let s="";Object.entries(n.children||{}).forEach(([k,v],i,a)=>{const last=i===a.length-1;s+=p+(last?"└─ ":"├─ ")+k+(v.type==="dir"?"/":"")+"\n";if(v.type==="dir")s+=treeText(v,p+(last?"   ":"│  "))});return s}
function buildFiles(body){body.innerHTML=`<div class="fileApp"><aside class="fileSide">${["/","/Documents","/Projects","/Pictures","/Music","/Videos","/Downloads"].map(p=>`<button data-path="${p}">${p}</button>`).join("")}</aside><main class="fileMain"><div class="fileToolbar"><button id="fileUp">⬆</button><button id="newFolder">＋ Folder</button><button id="newFile">＋ File</button><button id="uploadFile">Upload</button><button id="openFile">Open</button><button id="deleteFile">Delete</button></div><div id="filePath" class="filePath"></div><div id="fileGrid" class="fileGrid"></div></main></div>`;body.querySelectorAll("[data-path]").forEach(b=>b.onclick=()=>{fileCwd=b.dataset.path;selectedPath=null;renderFiles()});body.querySelector("#fileUp").onclick=()=>{fileCwd=norm("..",fileCwd);renderFiles()};body.querySelector("#newFolder").onclick=()=>{const name=prompt("Folder name");if(name){node(fileCwd).children[name]={type:"dir",children:{}};saveFS()}};body.querySelector("#newFile").onclick=()=>{const name=prompt("File name");if(name){node(fileCwd).children[name]={type:"file",content:""};saveFS()}};body.querySelector("#uploadFile").onclick=()=>$("uploadInput").click();body.querySelector("#openFile").onclick=openSelectedFile;body.querySelector("#deleteFile").onclick=()=>{if(selectedPath&&confirm("Delete?")){const q=parent(selectedPath);delete q.parent.children[q.name];selectedPath=null;saveFS()}};renderFiles()}
function renderFiles(){const grid=document.querySelector("#fileGrid"),path=document.querySelector("#filePath");if(!grid||!path)return;const n=node(fileCwd);path.textContent=fileCwd;grid.innerHTML="";Object.entries(n?.children||{}).forEach(([name,item])=>{const p=norm(name,fileCwd),b=document.createElement("button");b.className="fileItem"+(selectedPath===p?" selected":"");b.innerHTML=`<span class="ico">${item.type==="dir"?"📁":fileIcon(name)}</span><span class="nm">${name}</span>`;b.onclick=()=>{selectedPath=p;renderFiles()};b.ondblclick=()=>{selectedPath=p;openSelectedFile()};grid.appendChild(b)})}
function openSelectedFile(){if(!selectedPath)return;const n=node(selectedPath);if(n.type==="dir"){fileCwd=selectedPath;selectedPath=null;renderFiles()}else if(/\.html?$/i.test(selectedPath))openPreview(selectedPath,n.content);else openEditorPath(selectedPath)}
function buildEditor(body){body.innerHTML=`<div class="editorApp"><div class="editorToolbar"><button id="editorOpen">Open path</button><button id="editorSave">Save</button><button id="editorRun">Run HTML</button><span id="editorPath" class="editorPath">No file</span></div><textarea id="editorText" class="editorText" spellcheck="false"></textarea></div>`;body.querySelector("#editorOpen").onclick=()=>{const p=prompt("Path",editingPath||"/Documents/welcome.txt");if(p)openEditorIn(body,norm(p,"/"))};body.querySelector("#editorSave").onclick=()=>saveEditorBody(body);body.querySelector("#editorRun").onclick=()=>{saveEditorBody(body);const n=node(editingPath);if(n&&/\.html?$/i.test(editingPath))openPreview(editingPath,n.content)};if(editingPath)openEditorIn(body,editingPath)}
function openEditorPath(path){editingPath=path;let w=findOpen("editor");if(!w){openApp("editor");w=findOpen("editor")}focusWindow(w);openEditorIn(w.querySelector(".windowBody"),path)}function openEditorIn(body,path){let n=node(path);if(!n){const q=parent(path);if(!q.parent)return;q.parent.children[q.name]={type:"file",content:""};saveFS();n=node(path)}editingPath=path;body.querySelector("#editorPath").textContent=path;body.querySelector("#editorText").value=n.content||""}function saveEditorBody(body){if(editingPath){node(editingPath).content=body.querySelector("#editorText").value;saveFS()}}
function openPreview(path,content){const w=createWindow("preview","Preview: "+path,"▶️"),f=document.createElement("iframe");f.className="previewFrame";f.sandbox="allow-scripts allow-forms allow-modals";f.srcdoc=content;w.querySelector(".windowBody").appendChild(f)}
function buildSettings(body){body.innerHTML=`<div class="settings"><h2>Appearance</h2><div class="settingGrid"><button class="themeCard" data-theme="dark">🌙<br>Dark</button><button class="themeCard" data-theme="light">☀️<br>Light</button><button class="themeCard" data-theme="hacker">🟢<br>Hacker</button></div><h2>System</h2><button id="exportSettings">Export filesystem</button></div>`;body.querySelectorAll("[data-theme]").forEach(b=>b.onclick=()=>applyTheme(b.dataset.theme));body.querySelector("#exportSettings").onclick=()=>downloadBlob("salp-os-filesystem.json",JSON.stringify({app:"salp OS",version:4,fs},null,2),"application/json")}
function applyTheme(t){document.body.className=t==="light"?"light":t==="hacker"?"hacker":"";localStorage.setItem(THEME_KEY,t)}function buildAbout(body){body.innerHTML=`<div class="aboutApp"><div class="aboutLogo">SO</div><h2>salp OS Preview</h2><p><strong>salp Terminal v4.0</strong></p><p>Terminal、仮想ファイル、Editor、File Manager、salp Toolsをひとつのデスクトップで扱うブラウザOSの試作版です。</p><p>広告なし・登録なし・インストール不要。</p></div>`}
function downloadBlob(name,content,type="text/plain"){const blob=new Blob([content],{type}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove()},1000)}
$("uploadInput").onchange=async()=>{const target=node(fileCwd)||node(cwd);for(const f of [...$("uploadInput").files])target.children[f.name]={type:"file",content:await f.text()};$("uploadInput").value="";saveFS()};$("importInput").onchange=async()=>{try{const d=JSON.parse(await $("importInput").files[0].text());fs=d.fs;saveFS()}catch{alert("Cannot import")}};
function updateClock(){const d=new Date();$("clock").innerHTML=d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})+"<br>"+d.toLocaleDateString()}setInterval(updateClock,1000);updateClock();applyTheme(localStorage.getItem(THEME_KEY)||"dark");renderDesktop();renderStart();openApp("terminal");
})();
</script>
</body></html>
