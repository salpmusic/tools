<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>無料QRコード作成｜広告なし・登録なし｜salp Tools</title>
<meta name="description" content="広告なし・登録なし・無料で使えるQRコード作成ツール。URLを貼るだけでQRコードを作成し、PNG保存できます。">

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  background:#f7f3ea;
  color:#2b2118;
  margin:0;
  padding:24px;
  text-align:center;
}
h1{font-size:32px;margin:20px 0 8px;}
.lead{color:#7b6138;font-weight:bold;margin-bottom:24px;}
.box{
  max-width:560px;
  margin:auto;
  background:#fffaf0;
  border:1px solid #d7bd8a;
  border-radius:18px;
  padding:22px;
  box-shadow:0 4px 16px rgba(0,0,0,.08);
}
input,select{
  width:100%;
  box-sizing:border-box;
  padding:13px;
  font-size:16px;
  border:1px solid #c9b58a;
  border-radius:10px;
  margin:8px 0 14px;
}
button{
  background:#2b2118;
  color:white;
  border:none;
  border-radius:10px;
  padding:13px 18px;
  font-size:16px;
  margin:6px;
}
canvas{
  margin-top:20px;
  background:white;
  padding:12px;
  border-radius:12px;
  max-width:100%;
  height:auto;
  box-sizing:border-box;
}
.small{
  font-size:13px;
  color:#7b6138;
  word-break:break-all;
  margin-top:14px;
}
.footer{
  margin-top:28px;
  font-size:13px;
  color:#8a6a3f;
}
a{color:#2b2118;}
</style>
</head>

<body>

<h1>無料QRコード作成</h1>
<div class="lead">広告なし・登録なし・メール不要</div>

<div class="box">
  <input id="text" type="text" placeholder="URLをここに貼り付け">

  <label>サイズ</label>
  <select id="size">
    <option value="256">256px</option>
    <option value="512" selected>512px</option>
    <option value="1024">1024px</option>
  </select>

  <label>エラー訂正</label>
  <select id="level">
    <option value="L">L：小さめ</option>
    <option value="M">M：標準</option>
    <option value="Q">Q：強め</option>
    <option value="H" selected>H：ロゴ向き</option>
  </select>

  <button onclick="makeQR()">QRコード作成</button>
  <button onclick="downloadQR()">PNG保存</button>
  <button onclick="copyText()">URLコピー</button>

  <br>
  <canvas id="qr"></canvas>

  <div id="resultText" class="small"></div>
</div>

<div class="footer">
  <p><a href="index.html">← salp Tools ホームへ戻る</a></p>
  Made by salp.music 🐱🎵
</div>

<script>
function normalizeUrl(text){
  text = text.trim();

  if(text.includes(" ") || text.includes("\n")){
    return text;
  }

  if(
    text.startsWith("http://") ||
    text.startsWith("https://") ||
    text.startsWith("mailto:") ||
    text.startsWith("tel:") ||
    text.startsWith("sms:")
  ){
    return text;
  }

  if(text.includes(".")){
    return "https://" + text;
  }

  return text;
}

function makeQR(){
  const raw = document.getElementById("text").value;
  const text = normalizeUrl(raw);
  const canvas = document.getElementById("qr");
  const size = Number(document.getElementById("size").value);
  const level = document.getElementById("level").value;

  if(!text){
    alert("URLや文字を入力してください");
    return;
  }

  QRCode.toCanvas(canvas, text, {
    width: size,
    margin: 2,
    errorCorrectionLevel: level
  }, function(error){
    if(error){
      alert("QRコード作成に失敗しました");
      console.error(error);
      return;
    }

    document.getElementById("resultText").textContent = text;
  });
}

function downloadQR(){
  const canvas = document.getElementById("qr");

  if(canvas.width === 0){
    alert("先にQRコードを作成してください");
    return;
  }

  const link = document.createElement("a");
  link.download = "salp-qrcode.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

async function copyText(){
  const text = document.getElementById("resultText").textContent;

  if(!text){
    alert("先にQRコードを作成してください");
    return;
  }

  try{
    await navigator.clipboard.writeText(text);
    alert("URLをコピーしました");
  }catch(e){
    alert("コピーできませんでした");
  }
}
</script>

</body>
</html>
