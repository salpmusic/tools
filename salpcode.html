<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>salpCode Prototype</title>
<style>
body{font-family:sans-serif;background:#f7f3ea;text-align:center;padding:24px}
input{width:90%;max-width:520px;padding:12px;font-size:16px}
button{padding:12px 18px;margin:10px;font-size:16px}
canvas{background:white;border-radius:16px;margin-top:20px;max-width:100%}
</style>
</head>
<body>

<h1>salpCode v0.2 🐱</h1>
<p>猫耳マーカー付きURLコード</p>

<input id="url" placeholder="URLを入力">
<br>
<button onclick="makeSalpCode()">salpCode作成</button>
<button onclick="saveImage()">PNG保存</button>

<br>
<canvas id="canvas" width="600" height="600"></canvas>

<script>
function textToBits(text){
  const bytes = new TextEncoder().encode(text);
  let bits = [];
  for(const b of bytes){
    for(let i=7;i>=0;i--) bits.push((b >> i) & 1);
  }
  return bits;
}

function drawCatCell(ctx,x,y,size,filled){
  ctx.save();
  ctx.translate(x,y);
  ctx.fillStyle = filled ? "#111" : "#fff";
  ctx.strokeStyle = "#111";
  ctx.lineWidth = 2;

  ctx.beginPath();
  ctx.arc(0,3,size*0.32,0,Math.PI*2);
  ctx.fill();
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(-size*.22,-size*.18);
  ctx.lineTo(-size*.08,-size*.48);
  ctx.lineTo(size*.03,-size*.18);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(size*.22,-size*.18);
  ctx.lineTo(size*.08,-size*.48);
  ctx.lineTo(-size*.03,-size*.18);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  ctx.restore();
}

function drawEarMarker(ctx,x,y,size,label){
  ctx.save();

  ctx.fillStyle="#111";
  ctx.fillRect(x,y,size,size);

  ctx.fillStyle="#fff";
  ctx.fillRect(x+12,y+12,size-24,size-24);

  ctx.fillStyle="#111";
  ctx.beginPath();
  ctx.moveTo(x+size*.25,y+12);
  ctx.lineTo(x+size*.38,y-22);
  ctx.lineTo(x+size*.50,y+12);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(x+size*.50,y+12);
  ctx.lineTo(x+size*.63,y-22);
  ctx.lineTo(x+size*.75,y+12);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle="#111";
  ctx.font=`${size*.32}px serif`;
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillText("🐱",x+size/2,y+size/2);

  ctx.font="14px sans-serif";
  ctx.fillText(label,x+size/2,y+size+18);

  ctx.restore();
}

function makeSalpCode(){
  const url=document.getElementById("url").value.trim();
  if(!url){alert("URLを入れてね");return;}

  const canvas=document.getElementById("canvas");
  const ctx=canvas.getContext("2d");

  ctx.clearRect(0,0,600,600);
  ctx.fillStyle="#fff";
  ctx.fillRect(0,0,600,600);

  drawEarMarker(ctx,30,55,80,"TOP");
  drawEarMarker(ctx,490,55,80,"TOP");
  drawEarMarker(ctx,30,465,80,"BOTTOM");

  const bits=textToBits(url);
  const startX=135;
  const startY=135;
  const cols=18;
  const cell=22;

  for(let i=0;i<bits.length && i<324;i++){
    const col=i%cols;
    const row=Math.floor(i/cols);
    drawCatCell(
      ctx,
      startX+col*cell,
      startY+row*cell,
      cell*.9,
      bits[i]===1
    );
  }

  ctx.fillStyle="#111";
  ctx.font="28px serif";
  ctx.textAlign="center";
  ctx.fillText("salpCode",300,565);
}

function saveImage(){
  const canvas=document.getElementById("canvas");
  const a=document.createElement("a");
  a.download="salpcode.png";
  a.href=canvas.toDataURL("image/png");
  a.click();
}
</script>

</body>
</html>
