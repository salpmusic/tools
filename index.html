<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>無料QRコード作成｜広告なし・登録なし｜salp Tools</title>
<meta name="description" content="無料で使えるQRコード作成ツールです。広告なし、登録なし、メールアドレス不要。URLを貼るだけで簡単にQRコードを作成し、PNG保存できます。">
<meta name="keywords" content="QRコード作成,無料QRコード,QRコードメーカー,広告なし,登録なし,PNG保存">

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  background:#f7f3ea;
  color:#2b2118;
  margin:0;
  padding:24px;
  text-align:center;
}
h1{font-size:30px;margin:20px 0 8px;}
.lead{color:#7b6138;font-weight:bold;margin-bottom:12px;}
.note{font-size:14px;color:#6d5a40;margin-bottom:24px;}
.box{
  max-width:520px;
  margin:auto;
  background:#fffaf0;
  border:1px solid #d7bd8a;
  border-radius:18px;
  padding:22px;
  box-shadow:0 4px 16px rgba(0,0,0,.08);
}
input{
  width:100%;
  box-sizing:border-box;
  padding:14px;
  font-size:16px;
  border:1px solid #c9b58a;
  border-radius:10px;
  margin-bottom:14px;
}
button{
  background:#2b2118;
  color:white;
  border:none;
  border-radius:10px;
  padding:13px 18px;
  font-size:16px;
  margin:6px;
}
canvas{
  margin-top:20px;
  background:white;
  padding:12px;
  border-radius:12px;
  max-width:100%;
  height:auto;
  box-sizing:border-box;
}
.info{
  max-width:620px;
  margin:28px auto;
  text-align:left;
  font-size:15px;
  line-height:1.8;
}
.footer{
  margin-top:28px;
  font-size:13px;
  color:#8a6a3f;
}
</style>
</head>

<body>

<h1>無料QRコード作成</h1>
<div class="lead">広告なし・登録なし・メール不要</div>
<div class="note">URLを貼るだけ。PNG保存できます。</div>

<div class="box">
  <h2>QRコードメーカー</h2>

  <input id="text" type="text" placeholder="URLをここに貼り付け">

  <button onclick="makeQR()">QRコード作成</button>
  <button onclick="downloadQR()">PNG保存</button>

  <br>
  <canvas id="qr"></canvas>
</div>

<div class="info">
  <h2>このページについて</h2>
  <p>
    salp Tools のQRコード作成ツールは、本当に無料で使えます。
    広告表示、会員登録、メールアドレス入力、サブスクリプション登録は不要です。
  </p>
  <p>
    Spotify、YouTube、Instagram、ホームページなどのURLを貼り付けるだけで、
    すぐにQRコードを作成できます。
  </p>
</div>

<div class="footer">
  Made by salp.music 🐱🎵
</div>

<script>
function makeQR(){
  const text = document.getElementById("text").value.trim();
  const canvas = document.getElementById("qr");

  if(!text){
    alert("URLや文字を入力してください");
    return;
  }

  QRCode.toCanvas(canvas, text, {
    width: 420,
    margin: 2,
    errorCorrectionLevel: "H"
  }, function(error){
    if(error){
      alert("QRコード作成に失敗しました");
      console.error(error);
    }
  });
}

function downloadQR(){
  const canvas = document.getElementById("qr");

  if(canvas.width === 0){
    alert("先にQRコードを作成してください");
    return;
  }

  const link = document.createElement("a");
  link.download = "salp-qrcode.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>
