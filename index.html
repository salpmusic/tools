<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="theme-color" content="#f7f3ea">

<title>salp Tools | Simple Free Web Tools</title>

<meta name="description"
content="広告なし・登録なし。ブラウザだけですぐ使える無料Webツールとシンプルゲーム。QRコード作成、画像フレーム、ドット絵、番号ぬりえ、HTML Runner、Terminalなど。">

<style>

:root{
    --background:#f7f3ea;
    --card:#ffffff;
    --text:#222222;
    --subtext:#686868;
    --line:#e8e1d5;
    --button:#222222;
    --button-hover:#444444;
    --accent:#ff7eb6;
    --accent-blue:#67dce8;
}

*{
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    margin:0;
    background:var(--background);
    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Helvetica Neue",
        "Hiragino Sans",
        "Yu Gothic",
        sans-serif;
    color:var(--text);
    line-height:1.7;
}

a{
    color:inherit;
}

header{
    text-align:center;
    padding:
        calc(env(safe-area-inset-top) + 46px)
        20px
        34px;
}

.logo{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:12px;
}

.logo-mark{
    width:60px;
    height:60px;
    display:grid;
    place-items:center;
    border-radius:19px;
    background:
        linear-gradient(
            135deg,
            var(--accent),
            var(--accent-blue)
        );
    font-size:32px;
    box-shadow:
        0 8px 24px rgba(0,0,0,.12);
}

h1{
    margin:0;
    font-size:42px;
    line-height:1.15;
    letter-spacing:-1.5px;
}

.subtitle{
    margin-top:14px;
    color:var(--subtext);
    font-size:19px;
    font-weight:700;
}

.catchcopy{
    margin-top:5px;
    color:#999;
    font-size:14px;
    font-weight:600;
}

.intro{
    max-width:650px;
    margin:18px auto 0;
    color:#777;
    font-size:15px;
}

.features{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    margin-top:22px;
}

.feature{
    padding:7px 12px;
    background:rgba(255,255,255,.78);
    border:1px solid var(--line);
    border-radius:999px;
    color:#555;
    font-size:13px;
    font-weight:700;
}

.container{
    width:min(100%, 960px);
    margin:auto;
    padding:0 18px 34px;
}

.section{
    margin-bottom:34px;
}

.section-title{
    display:flex;
    align-items:center;
    gap:9px;
    margin:8px 0 17px;
    font-size:17px;
    font-weight:800;
}

.section-title span{
    color:#888;
    font-size:13px;
    font-weight:600;
}

.tool-grid{
    display:grid;
    grid-template-columns:
        repeat(2, minmax(0, 1fr));
    gap:18px;
}

.card{
    position:relative;
    display:flex;
    flex-direction:column;
    min-height:275px;
    padding:26px;
    overflow:hidden;
    background:var(--card);
    border:1px solid rgba(0,0,0,.04);
    border-radius:24px;
    box-shadow:
        0 8px 28px rgba(50,40,25,.08);
    transition:
        transform .18s ease,
        box-shadow .18s ease;
}

.card:hover{
    transform:translateY(-3px);
    box-shadow:
        0 12px 34px rgba(50,40,25,.13);
}

.card::after{
    content:"";
    position:absolute;
    top:-55px;
    right:-55px;
    width:135px;
    height:135px;
    border-radius:50%;
    background:var(--card-accent, #eeeeee);
    opacity:.18;
    pointer-events:none;
}

.card-top{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:18px;
}

.icon{
    flex:0 0 auto;
    width:55px;
    height:55px;
    display:grid;
    place-items:center;
    border-radius:17px;
    background:var(--icon-background, #f2f2f2);
    font-size:29px;
}

.card h2{
    margin:0;
    font-size:25px;
    line-height:1.25;
    letter-spacing:-.5px;
}

.card p{
    margin:0;
    color:var(--subtext);
    font-size:16px;
}

.tags{
    display:flex;
    flex-wrap:wrap;
    gap:7px;
    margin-top:17px;
}

.tag{
    padding:5px 9px;
    background:#f5f5f5;
    border-radius:8px;
    color:#666;
    font-size:12px;
    font-weight:700;
}

.button{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    align-self:flex-start;
    min-height:48px;
    margin-top:auto;
    padding:12px 22px;
    background:var(--button);
    color:#ffffff;
    text-decoration:none;
    border-radius:13px;
    font-size:16px;
    font-weight:750;
    transition:
        transform .15s ease,
        background .15s ease;
}

.button:hover{
    background:var(--button-hover);
}

.button:active{
    transform:scale(.97);
}

.music{
    --card-accent:#ff8db9;
    --icon-background:#fff0f6;
}

.qr{
    --card-accent:#54d4df;
    --icon-background:#ebfcfd;
}

.frame{
    --card-accent:#d9b77d;
    --icon-background:#fbf3e5;
}

.pixel{
    --card-accent:#d788ff;
    --icon-background:#f8edff;
}

.color{
    --card-accent:#ff91c3;
    --icon-background:#fff0f7;
}

.runner{
    --card-accent:#7ca9ff;
    --icon-background:#eef4ff;
}

.terminal{
    --card-accent:#8b8b8b;
    --icon-background:#f1f1f1;
}

.salpcode{
    --card-accent:#ffb66e;
    --icon-background:#fff3e7;
}

footer{
    text-align:center;
    padding:
        30px
        20px
        calc(env(safe-area-inset-bottom) + 46px);
    color:#777;
}

.footer-main{
    font-size:18px;
    font-weight:700;
}

.footer-sub{
    margin-top:12px;
    font-size:14px;
}

.footer-message{
    max-width:550px;
    margin:18px auto 0;
    color:#999;
    font-size:13px;
    line-height:1.7;
}

@media(max-width:700px){

    header{
        padding-top:
            calc(env(safe-area-inset-top) + 34px);
    }

    h1{
        font-size:36px;
    }
