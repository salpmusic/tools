<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#d7d0bd">
<title>salp BASIC Mini</title>
<style>
:root{
  --body:#d8d1bf;
  --body2:#bcb39e;
  --edge:#857d6c;
  --ink:#1f241f;
  --lcd:#b9c6a5;
  --lcd2:#9faa8f;
  --lcd-ink:#1f2a1d;
  --key:#30342f;
  --key2:#1f221f;
  --cream:#ece6d5;
  --accent:#8b302b;
  --blue:#31566e;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:#242724}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
  color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Sans","Yu Gothic",sans-serif;
}
.machine{
  width:min(100%,980px);
  border:2px solid #7f7766;
  border-radius:24px;
  background:
    linear-gradient(145deg,rgba(255,255,255,.5),transparent 30%),
    linear-gradient(180deg,var(--body),var(--body2));
  box-shadow:
    0 30px 70px rgba(0,0,0,.42),
    inset 0 2px 0 rgba(255,255,255,.55),
    inset 0 -8px 14px rgba(68,60,45,.18);
  overflow:hidden;
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  padding:18px 22px 10px;
}
.brand{
  font-weight:1000;
  letter-spacing:.02em;
  font-size:clamp(24px,4vw,38px);
}
.brand small{
  display:block;
  font-size:10px;
  letter-spacing:.28em;
  color:#5f5a4e;
  margin-top:4px;
}
.badge{
  padding:7px 11px;
  border:1px solid #7f7766;
  border-radius:999px;
  background:#e7dfca;
  color:#5e584c;
  font-size:11px;
  font-weight:900;
}
.displayWrap{
  padding:0 22px 18px;
}
.displayBezel{
  padding:16px;
  border:2px solid #5f5a4f;
  border-radius:15px;
  background:#6e695c;
  box-shadow:inset 0 5px 10px rgba(0,0,0,.25);
}
.display{
  position:relative;
  min-height:170px;
  padding:14px 16px;
  overflow:hidden;
  border:2px solid #445040;
  border-radius:7px;
  background:
    repeating-linear-gradient(0deg,rgba(255,255,255,.025) 0 1px,transparent 1px 3px),
    linear-gradient(180deg,var(--lcd),var(--lcd2));
  box-shadow:
    inset 0 0 24px rgba(35,50,31,.2),
    inset 0 2px 2px rgba(255,255,255,.35);
}
.display::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:linear-gradient(105deg,transparent 0 55%,rgba(255,255,255,.12) 62%,transparent 70%);
}
.statusline{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-bottom:8px;
  font:700 11px/1.2 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  color:#33422f;
}
.screen{
  width:100%;
  height:118px;
  overflow:auto;
  white-space:pre-wrap;
  word-break:break-word;
  font:800 18px/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  color:var(--lcd-ink);
  text-shadow:0 0 1px rgba(31,42,29,.4);
}
.panel{
  display:grid;
  grid-template-columns:minmax(0,1fr) 260px;
  gap:18px;
  padding:0 22px 22px;
}
.editorBox{
  min-width:0;
}
.label{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin:0 0 7px;
  font-size:12px;
  font-weight:950;
  color:#4f4a40;
  letter-spacing:.08em;
}
textarea{
  width:100%;
  min-height:280px;
  resize:vertical;
  padding:14px;
  border:2px solid #746d5d;
  border-radius:12px;
  outline:none;
  background:#eee8d8;
  color:#1f241f;
  box-shadow:inset 0 3px 8px rgba(74,67,50,.15);
  font:700 16px/1.55 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}
textarea:focus{border-color:#4b635e}
.controls{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.memory{
  padding:12px;
  border:1px solid #877f6e;
  border-radius:12px;
  background:rgba(237,230,211,.72);
}
.memory strong{
  display:block;
  font-size:12px;
  letter-spacing:.12em;
  margin-bottom:8px;
}
.meter{
  height:9px;
  overflow:hidden;
  border-radius:999px;
  background:#98917f;
}
.meter span{
  display:block;
  width:0%;
  height:100%;
  background:#485f58;
  transition:width .2s ease;
}
.memory small{
  display:block;
  margin-top:7px;
  color:#645e52;
}
.keys{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:9px;
}
button{
  min-height:54px;
  border:0;
  border-radius:11px;
  cursor:pointer;
  color:#f4f1e7;
  background:linear-gradient(180deg,var(--key),var(--key2));
  box-shadow:
    0 4px 0 #111411,
    inset 0 1px 0 rgba(255,255,255,.12);
  font-weight:1000;
  letter-spacing:.05em;
  touch-action:manipulation;
}
button:active{
  transform:translateY(3px);
  box-shadow:0 1px 0 #111411;
}
button.run{background:linear-gradient(180deg,#9b3c34,#6f251f)}
button.list{background:linear-gradient(180deg,#436a82,#29495c)}
button.save{background:linear-gradient(180deg,#6c6a3b,#4c4b27)}
button.load{background:linear-gradient(180deg,#65527d,#463858)}
button.wide{grid-column:1/-1}
.quick{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:7px;
  margin-top:2px;
}
.quick button{
  min-height:44px;
  background:linear-gradient(180deg,#ece6d5,#cfc5ad);
  color:#2e302d;
  box-shadow:0 3px 0 #7b7464;
  font-size:12px;
}
.help{
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  background:rgba(65,60,49,.12);
  color:#504b41;
  font-size:11px;
  line-height:1.55;
}
footer{
  padding:13px 18px calc(13px + env(safe-area-inset-bottom));
  border-top:1px solid rgba(82,76,63,.35);
  text-align:center;
  color:#5f5a4f;
  font-size:11px;
}
@media(max-width:760px){
  body{padding:0;background:var(--body2)}
  .machine{min-height:100vh;border-radius:0;border:0}
  .panel{grid-template-columns:1fr}
  .controls{order:-1}
  .keys{grid-template-columns:repeat(3,1fr)}
  button.wide{grid-column:auto}
  textarea{min-height:230px}
}
@media(max-width:430px){
  .topbar,.displayWrap,.panel{padding-left:12px;padding-right:12px}
  .topbar{padding-top:14px}
  .display{min-height:150px}
  .screen{height:100px;font-size:16px}
  .keys{grid-template-columns:repeat(2,1fr)}
  .quick{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<main class="machine">
  <header class="topbar">
    <div class="brand">
      salp BASIC Mini
      <small>POCKET STYLE COMPUTER</small>
    </div>
    <div class="badge">BM-01</div>
  </header>

  <section class="displayWrap">
    <div class="displayBezel">
      <div class="display" aria-label="BASIC display">
        <div class="statusline">
          <span id="mode">READY</span>
          <span id="clock">00:00</span>
        </div>
        <div id="screen" class="screen">salp BASIC Mini
Version 0.1.0

READY.</div>
      </div>
    </div>
  </section>

  <section class="panel">
    <div class="editorBox">
      <div class="label">
        <span>PROGRAM MEMORY</span>
        <span id="lineCount">0 LINES</span>
      </div>
      <textarea id="editor" spellcheck="false" autocomplete="off">10 PRINT "HELLO FROM BASIC MINI"
20 FOR I=1 TO 5
30 PRINT I
40 NEXT I
50 END</textarea>
    </div>

    <aside class="controls">
      <div class="memory">
        <strong>MEMORY</strong>
        <div class="meter"><span id="meter"></span></div>
        <small id="memoryText">0 / 4096 chars</small>
      </div>

      <div class="keys">
        <button class="run" id="runBtn">RUN</button>
        <button class="list" id="listBtn">LIST</button>
        <button id="newBtn">NEW</button>
        <button id="clsBtn">CLS</button>
        <button class="save" id="saveBtn">SAVE</button>
        <button class="load" id="loadBtn">LOAD</button>
      </div>

      <div class="quick">
        <button data-insert='PRINT "HELLO"'>PRINT</button>
        <button data-insert='FOR I=1 TO 10'>FOR</button>
        <button data-insert='NEXT I'>NEXT</button>
        <button data-insert='GOTO 10'>GOTO</button>
      </div>

      <div class="help">
        対応命令：PRINT / LET / INPUT / IF...THEN / GOTO / FOR...TO...STEP / NEXT / CLS / END / REM<br>
        保存先：このブラウザ内
      </div>
    </aside>
  </section>

  <footer>salp BASIC Mini v0.1.0 — Original Pocket BASIC Environment</footer>
</main>

<script>
(() => {
  "use strict";

  const editor = document.getElementById("editor");
  const screen = document.getElementById("screen");
  const mode = document.getElementById("mode");
  const clock = document.getElementById("clock");
  const lineCount = document.getElementById("lineCount");
  const meter = document.getElementById("meter");
  const memoryText = document.getElementById("memoryText");
  const MAX_CHARS = 4096;
  const STORAGE_KEY = "salp-basic-mini-program-v01";

  const state = {
    vars: Object.create(null),
    output: [],
    forStack: []
  };

  function setMode(text){ mode.textContent = text; }
  function show(text){
    screen.textContent = String(text);
    screen.scrollTop = screen.scrollHeight;
  }
  function append(text=""){
    state.output.push(String(text));
    screen.textContent = state.output.join("\n");
    screen.scrollTop = screen.scrollHeight;
  }
  function updateStats(){
    const text = editor.value;
    const lines = text.trim() ? text.split(/\r?\n/).filter(Boolean).length : 0;
    lineCount.textContent = `${lines} LINES`;
    const used = text.length;
    memoryText.textContent = `${used} / ${MAX_CHARS} chars`;
    meter.style.width = `${Math.min(100,(used/MAX_CHARS)*100)}%`;
    meter.style.background = used > MAX_CHARS ? "#8b302b" : "#485f58";
  }

  function tokenizeProgram(){
    const rows = editor.value
      .split(/\r?\n/)
      .map(s => s.trim())
      .filter(Boolean)
      .map((raw, index) => {
        const m = raw.match(/^(\d+)\s*(.*)$/);
        if(!m) throw new Error(`LINE ${index+1}: line number required`);
        return { no:Number(m[1]), code:m[2].trim(), raw };
      })
      .sort((a,b)=>a.no-b.no);

    const map = new Map(rows.map((r,i)=>[r.no,i]));
    return { rows, map };
  }

  function normalizeExpr(expr){
    return expr
      .replace(/<>/g,"!=")
      .replace(/\bAND\b/gi,"&&")
      .replace(/\bOR\b/gi,"||")
      .replace(/\bNOT\b/gi,"!")
      .replace(/([^<>=!])=([^=])/g,"$1==$2");
  }

  function evalExpr(expr){
    let js = normalizeExpr(expr);
    js = js.replace(/\b([A-Za-z][A-Za-z0-9]*\$?)\b/g, (m,name) => {
      const upper = name.toUpperCase();
      if(["TRUE","FALSE"].includes(upper)) return upper.toLowerCase();
      if(["Math"].includes(name)) return name;
      return `(V["${upper}"]??0)`;
    });
    try{
      return Function("V",`return (${js});`)(state.vars);
    }catch{
      const quoted = expr.match(/^"(.*)"$/);
      if(quoted) return quoted[1];
      throw new Error(`BAD EXPRESSION: ${expr}`);
    }
  }

  function splitPrintArgs(text){
    const out=[];
    let buf="", quote=false;
    for(const ch of text){
      if(ch === '"') quote=!quote;
      if(ch === "," && !quote){
        out.push(buf.trim()); buf="";
      }else buf+=ch;
    }
    if(buf.trim() || text.endsWith(",")) out.push(buf.trim());
    return out;
  }

  async function runProgram(){
    if(editor.value.length > MAX_CHARS){
      show("MEMORY FULL");
      setMode("ERROR");
      return;
    }

    state.vars = Object.create(null);
    state.output = [];
    state.forStack = [];
    screen.textContent = "";
    setMode("RUN");

    try{
      const {rows,map} = tokenizeProgram();
      let pc=0;
      let guard=0;

      while(pc < rows.length){
        if(++guard > 10000) throw new Error("BREAK: LOOP LIMIT");
        const line = rows[pc];
        const code = line.code.trim();
        const upper = code.toUpperCase();

        if(!code || upper.startsWith("REM") || code.startsWith("'")){
          pc++; continue;
        }

        if(upper === "END" || upper === "STOP"){
          break;
        }

        if(upper === "CLS"){
          state.output = [];
          screen.textContent = "";
          pc++; continue;
        }

        let m;

        if((m = code.match(/^PRINT\s*(.*)$/i))){
          const args = splitPrintArgs(m[1]);
          if(!args.length){ append(""); }
          else{
            const rendered = args.map(arg => {
              const q = arg.match(/^"(.*)"$/);
              return q ? q[1] : evalExpr(arg);
            });
            append(rendered.join(" "));
          }
          pc++; continue;
        }

        if((m = code.match(/^(?:LET\s+)?([A-Za-z][A-Za-z0-9]*\$?)\s*=\s*(.+)$/i))){
          state.vars[m[1].toUpperCase()] = evalExpr(m[2]);
          pc++; continue;
        }

        if((m = code.match(/^INPUT\s+([A-Za-z][A-Za-z0-9]*\$?)$/i))){
          const name = m[1].toUpperCase();
          const answer = prompt(`${name}?`) ?? "";
          state.vars[name] = name.endsWith("$") ? answer : Number(answer);
          append(`${name}? ${answer}`);
          pc++; continue;
        }

        if((m = code.match(/^GOTO\s+(\d+)$/i))){
          const target = Number(m[1]);
          if(!map.has(target)) throw new Error(`UNDEFINED LINE ${target}`);
          pc = map.get(target);
          continue;
        }

        if((m = code.match(/^IF\s+(.+?)\s+THEN\s+(\d+)$/i))){
          if(evalExpr(m[1])){
            const target = Number(m[2]);
            if(!map.has(target)) throw new Error(`UNDEFINED LINE ${target}`);
            pc = map.get(target);
          }else pc++;
          continue;
        }

        if((m = code.match(/^FOR\s+([A-Za-z][A-Za-z0-9]*)\s*=\s*(.+?)\s+TO\s+(.+?)(?:\s+STEP\s+(.+))?$/i))){
          const name = m[1].toUpperCase();
          const start = Number(evalExpr(m[2]));
          const end = Number(evalExpr(m[3]));
          const step = m[4] ? Number(evalExpr(m[4])) : 1;
          state.vars[name] = start;
          state.forStack.push({name,end,step,returnPc:pc+1});
          pc++; continue;
        }

        if((m = code.match(/^NEXT(?:\s+([A-Za-z][A-Za-z0-9]*))?$/i))){
          const loop = state.forStack[state.forStack.length-1];
          if(!loop) throw new Error("NEXT WITHOUT FOR");
          if(m[1] && m[1].toUpperCase() !== loop.name) throw new Error("NEXT VARIABLE MISMATCH");
          state.vars[loop.name] = Number(state.vars[loop.name]) + loop.step;
          const keep = loop.step >= 0
            ? state.vars[loop.name] <= loop.end
            : state.vars[loop.name] >= loop.end;
          if(keep) pc = loop.returnPc;
          else { state.forStack.pop(); pc++; }
          continue;
        }

        throw new Error(`${line.no} ?SYNTAX ERROR`);
      }

      append("");
      append("READY.");
      setMode("READY");
    }catch(err){
      append("");
      append(String(err.message || err));
      setMode("ERROR");
    }
  }

  document.getElementById("runBtn").addEventListener("click", runProgram);
  document.getElementById("listBtn").addEventListener("click", () => {
    show(editor.value || "EMPTY");
    setMode("LIST");
  });
  document.getElementById("newBtn").addEventListener("click", () => {
    if(confirm("プログラムを消去しますか？")){
      editor.value="";
      show("NEW\n\nREADY.");
      setMode("READY");
      updateStats();
    }
  });
  document.getElementById("clsBtn").addEventListener("click", () => {
    show("");
    setMode("READY");
  });
  document.getElementById("saveBtn").addEventListener("click", () => {
    localStorage.setItem(STORAGE_KEY, editor.value);
    show("SAVED.\n\nREADY.");
    setMode("READY");
  });
  document.getElementById("loadBtn").addEventListener("click", () => {
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved === null){
      show("NO SAVED PROGRAM");
      setMode("ERROR");
      return;
    }
    editor.value = saved;
    show("LOADED.\n\nREADY.");
    setMode("READY");
    updateStats();
  });

  document.querySelectorAll("[data-insert]").forEach(btn => {
    btn.addEventListener("click", () => {
      const insert = btn.dataset.insert;
      const start = editor.selectionStart;
      const before = editor.value.slice(0,start);
      const after = editor.value.slice(editor.selectionEnd);
      const prefix = before && !before.endsWith("\n") ? "\n" : "";
      editor.value = before + prefix + insert + after;
      editor.focus();
      const pos = (before + prefix + insert).length;
      editor.setSelectionRange(pos,pos);
      updateStats();
    });
  });

  editor.addEventListener("input", updateStats);
  setInterval(() => {
    const d = new Date();
    clock.textContent = d.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
  },1000);

  updateStats();
})();
</script>
</body>
</html>
