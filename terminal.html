<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1217">
<title>salp Terminal v3</title>
<style>
:root{--bg:#0f1217;--panel:#171b22;--panel2:#202630;--line:#323a46;--text:#e9eef5;--muted:#97a3b3;--green:#72f29a;--blue:#6fd8ff;--danger:#ff7b7b}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:var(--bg);color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}button,input,select,textarea{font:inherit}button{cursor:pointer}.app{max-width:1100px;margin:auto;padding:14px 10px 24px}header{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}.brand{display:flex;align-items:center;gap:10px}.logo{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;background:linear-gradient(135deg,var(--green),var(--blue));color:#111;font-weight:900}h1{font-size:21px;margin:0}.sub{font-size:12px;color:var(--muted)}.top{display:flex;gap:7px;flex-wrap:wrap}button,select{min-height:42px;border:1px solid var(--line);border-radius:10px;background:var(--panel2);color:var(--text);padding:7px 10px}.primary{background:var(--green);color:#111;border-color:transparent;font-weight:900}.layout{display:grid;grid-template-columns:minmax(0,1fr) 290px;gap:10px}.terminal{background:#050708;border:1px solid var(--line);border-radius:16px;overflow:hidden}.termHead{display:flex;justify-content:space-between;padding:9px 12px;background:#15191f;color:var(--muted);font-size:12px}.dots span{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:5px}.dots span:nth-child(1){background:#ff605c}.dots span:nth-child(2){background:#ffbd44}.dots span:nth-child(3){background:#00ca4e}#output{height:60vh;min-height:440px;overflow:auto;padding:14px;white-space:pre-wrap;word-break:break-word;line-height:1.55;font-size:14px;color:var(--green)}.inputRow{display:flex;gap:8px;padding:10px 12px;border-top:1px solid #222831;background:#0b0e12}#prompt{color:var(--blue);font-weight:800}#commandInput{flex:1;min-width:0;border:0;outline:0;background:transparent;color:#fff;font-size:16px}.sidebar{display:flex;flex-direction:column;gap:10px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px}.panel h2{margin:0 0 10px;font-size:13px;color:var(--muted)}.quick,.apps{display:grid;grid-template-columns:1fr 1fr;gap:7px}.quick button,.apps button{font-size:12px}.fs{font-size:12px;color:#c7d0dd;line-height:1.7;max-height:220px;overflow:auto;white-space:pre-wrap}.hint{font-size:12px;color:var(--muted);line-height:1.55}.status{display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--muted)}.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(0,0,0,.72);z-index:20}.modal.show{display:flex}.card{width:min(100%,820px);max-height:92vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:14px}.modalTop{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}#editor{width:100%;min-height:55vh;background:#090c10;color:#fff;border:1px solid var(--line);border-radius:12px;padding:12px}.actions{display:flex;justify-content:flex-end;gap:8px;margin-top:10px}.runFrame{width:100%;height:72vh;border:0;background:#fff;border-radius:10px}.bar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}.path{padding:9px 11px;background:#0e1217;border:1px solid var(--line);border-radius:10px;color:var(--blue);margin-bottom:10px}.fileGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px}.file{min-height:92px;padding:10px;border:1px solid var(--line);border-radius:13px;background:#11161d;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}.file .icon{font-size:30px}.file .name{width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}.context{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:10px}.hidden{display:none!important}@media(max-width:820px){.layout{grid-template-columns:1fr}#output{height:50vh;min-height:370px}.sidebar{display:grid;grid-template-columns:1fr 1fr}.sidebar .wide{grid-column:1/-1}}@media(max-width:600px){.fileGrid{grid-template-columns:repeat(2,1fr)}}@media(max-width:470px){header{align-items:flex-start}.top{flex-direction:column}.sidebar{grid-template-columns:1fr}.sidebar .wide{grid-column:auto}.context{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="app">
<header><div class="brand"><div class="logo">ST</div><div><h1>salp Terminal v3</h1><div class="sub">Terminal + Files + Apps</div></div></div><div class="top"><select id="mode"><option value="linux">Linux</option><option value="dos">MS-DOS</option><option value="jp">日本語</option></select><button id="filesTop">Files</button><button id="reset">初期化</button></div></header>
<div class="layout">
<section class="terminal"><div class="termHead"><div class="dots"><span></span><span></span><span></span></div><span id="modeLabel">Linux Mode</span></div><div id="output"></div><div class="inputRow"><span id="prompt">$</span><input id="commandInput" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="help と入力"></div></section>
<aside class="sidebar">
<section class="panel"><h2>クイック</h2><div class="quick"><button data-cmd="help">help</button><button data-cmd="ls">ls</button><button data-cmd="tree">tree</button><button data-cmd="pwd">pwd</button><button data-cmd="apps">apps</button><button data-cmd="explorer">files</button></div></section>
<section class="panel"><h2>Apps</h2><div id="appGrid" class="apps"></div></section>
<section class="panel"><h2>仮想ファイル</h2><div id="fsView" class="fs"></div></section>
<section class="panel wide"><h2>例</h2><div class="hint">mkdir Projects/demo<br>cd Projects/demo<br>edit index.html<br>run index.html<br><br>open pixel<br>install color<br>explorer</div></section>
</aside></div><div class="status"><span id="pathStatus">/</span><span>localStorage保存</span></div></div>
<input id="uploadInput" type="file" class="hidden" multiple><input id="importInput" type="file" accept=".json,application/json" class="hidden">
<div id="editorModal" class="modal"><div class="card"><div class="modalTop"><strong id="editorTitle">Editor</strong><button id="closeEditor">閉じる</button></div><textarea id="editor"></textarea><div class="actions"><button id="saveEditor" class="primary">保存</button></div></div></div>
<div id="runModal" class="modal"><div class="card"><div class="modalTop"><strong id="runTitle">Run</strong><button id="closeRun">閉じる</button></div><iframe id="runFrame" class="runFrame" sandbox="allow-scripts allow-forms allow-modals"></iframe></div></div>
<div id="explorerModal" class="modal"><div class="card"><div class="modalTop"><strong>salp File Manager</strong><button id="closeExplorer">閉じる</button></div><div class="bar"><button id="up">⬆ 上へ</button><button id="newFolder">＋ フォルダ</button><button id="newFile">＋ ファイル</button><button id="upload">Upload</button><button id="refresh">更新</button></div><div id="explorerPath" class="path">/</div><div id="fileGrid" class="fileGrid"></div><div class="context"><button id="openSel">開く</button><button id="editSel">編集</button><button id="downloadSel">保存</button><button id="renameSel">名前変更</button><button id="deleteSel">削除</button><button id="clearSel">選択解除</button></div></div></div>
<script>
(()=>{"use strict";
const SK="salpTerminalFS_v3",HK="salpTerminalHistory_v3",MK="salpTerminalMode_v3",AK="salpTerminalApps_v3";
const CATALOG={pixel:{name:"salp Pixel",icon:"🎨",url:"Pixel.html"},frame:{name:"salp Frame",icon:"🖼️",url:"Frame.html"},resize:{name:"Batch Resize",icon:"📐",url:"Resize.html"},color:{name:"salp Color",icon:"🎮",url:"Color.html"},qr:{name:"QR Maker",icon:"🔲",url:"qrcode.html"},runner:{name:"HTML Runner",icon:"💻",url:"html-runner.html"},terminal:{name:"salp Terminal",icon:"💾",url:"terminal.html"},salpcode:{name:"salpCode",icon:"🐱",url:"salpcode.html"},music:{name:"salp Music",icon:"🎵",url:"https://linktr.ee/salp"}};
const $=id=>document.getElementById(id),out=$("output"),inp=$("commandInput"),promptEl=$("prompt"),modeSel=$("mode"),modeLabel=$("modeLabel"),fsView=$("fsView"),pathStatus=$("pathStatus"),appGrid=$("appGrid"),editorModal=$("editorModal"),editor=$("editor"),editorTitle=$("editorTitle"),runModal=$("runModal"),runFrame=$("runFrame"),runTitle=$("runTitle"),explorerModal=$("explorerModal"),explorerPath=$("explorerPath"),fileGrid=$("fileGrid"),uploadInput=$("uploadInput"),importInput=$("importInput");
function defaultFS(){return {type:"dir",children:{Documents:{type:"dir",children:{}},Projects:{type:"dir",children:{"hello.html":{type:"file",content:"<!DOCTYPE html><html><body style='font-family:sans-serif;padding:30px'><h1>Hello salp Terminal v3!</h1><p>Terminal + File Manager + Apps</p></body></html>"}}},Music:{type:"dir",children:{}},Pictures:{type:"dir",children:{}},Apps:{type:"dir",children:{}},Downloads:{type:"dir",children:{}},System:{type:"dir",children:{"readme.txt":{type:"file",content:"salp Terminal v3\nType help to see commands."}}}}}}
let fs;try{fs=JSON.parse(localStorage.getItem(SK))||defaultFS()}catch{fs=defaultFS()}let cwd="/",ecwd="/",history=JSON.parse(localStorage.getItem(HK)||"[]"),hi=history.length,mode=localStorage.getItem(MK)||"linux",editing=null,selected=null,apps=JSON.parse(localStorage.getItem(AK)||'["pixel","frame","resize","qr","runner","terminal"]');
function saveFS(){localStorage.setItem(SK,JSON.stringify(fs));renderFS();renderExplorer()}function saveApps(){localStorage.setItem(AK,JSON.stringify(apps));renderApps()}function norm(path,base=cwd){if(!path)return base;const full=path.startsWith("/")?path:(base==="/"?"/"+path:base+"/"+path),a=[];full.split("/").forEach(p=>{if(!p||p===".")return;if(p==="..")a.pop();else a.push(p)});return "/"+a.join("/")}function parts(path){const n=norm(path);return n==="/"?[]:n.slice(1).split("/")}function node(path){let n=fs;for(const p of parts(path)){if(!n||n.type!=="dir"||!n.children[p])return null;n=n.children[p]}return n}function parent(path){const a=parts(path),name=a.pop(),pp="/"+a.join("/");return {parent:node(pp||"/"),name}}function print(t="",c=""){const d=document.createElement("div");d.textContent=t;if(c)d.style.color=c;out.appendChild(d);out.scrollTop=out.scrollHeight}function promptStr(){if(mode==="dos")return (cwd==="/"?"C:\\":"C:\\"+cwd.slice(1).replace(/\//g,"\\"))+">";if(mode==="jp")return "端末:"+cwd+">";return "salp@"+cwd+"$"}function update(){promptEl.textContent=promptStr();pathStatus.textContent=cwd;modeLabel.textContent=mode==="dos"?"MS-DOS Mode":mode==="jp"?"日本語 Mode":"Linux Mode"}function tree(n,p=""){let s="";Object.entries(n.children||{}).forEach(([k,v],i,a)=>{const last=i===a.length-1;s+=p+(last?"└─ ":"├─ ")+k+(v.type==="dir"?"/":"")+"\n";if(v.type==="dir")s+=tree(v,p+(last?"   ":"│  "))});return s}function renderFS(){fsView.textContent="/\n"+tree(fs)}function renderApps(){appGrid.innerHTML="";apps.forEach(k=>{const a=CATALOG[k];if(!a)return;const b=document.createElement("button");b.textContent=a.icon+" "+a.name;b.onclick=()=>openApp(k);appGrid.appendChild(b)});if(!apps.length)appGrid.textContent="No apps"}function openApp(k){const a=CATALOG[k];if(!a){print("app not found: "+k,"#ff8f8f");return}if(k==="terminal"){print("salp Terminal is already open.");return}window.open(a.url,"_blank","noopener");print("open app: "+a.name,"#72f29a")}
function openEditor(path){let n=node(path);if(n&&n.type==="dir")throw Error("cannot edit directory");if(!n){const q=parent(path);if(!q.parent)throw Error("parent not found");q.parent.children[q.name]={type:"file",content:""};saveFS()}editing=path;editorTitle.textContent="Edit: "+path;editor.value=node(path).content||"";editorModal.classList.add("show")}function openExplorer(path=cwd){ecwd=norm(path);selected=null;renderExplorer();explorerModal.classList.add("show")}function icon(name){const e=name.split(".").pop().toLowerCase();if(["html","htm"].includes(e))return "🌐";if(["png","jpg","jpeg","gif","webp"].includes(e))return "🖼️";if(["js","css","json"].includes(e))return "🧩";if(["mp3","wav","m4a"].includes(e))return "🎵";return "📄"}function renderExplorer(){if(!fileGrid)return;const n=node(ecwd);explorerPath.textContent=ecwd;fileGrid.innerHTML="";if(!n||n.type!=="dir"){fileGrid.textContent="Directory not found";return}Object.entries(n.children).forEach(([name,item])=>{const path=norm(name,ecwd),b=document.createElement("button");b.className="file";b.innerHTML='<div class="icon">'+(item.type==="dir"?"📁":icon(name))+'</div><div class="name"></div>';b.querySelector(".name").textContent=name;b.onclick=()=>{selected=path;document.querySelectorAll(".file").forEach(x=>x.style.outline="");b.style.outline="3px solid #72f29a"};b.ondblclick=()=>{if(item.type==="dir"){ecwd=path;selected=null;renderExplorer()}else openSelected()};fileGrid.appendChild(b)})}function openSelected(){if(!selected)return;const n=node(selected);if(!n)return;if(n.type==="dir"){ecwd=selected;selected=null;renderExplorer();return}if(/\.html?$/i.test(selected)){runTitle.textContent="Run: "+selected;runFrame.srcdoc=n.content;runModal.classList.add("show")}else openEditor(selected)}function downloadText(name,content,type="text/plain"){const blob=new Blob([content],{type}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove()},800)}function downloadFile(path){const n=node(path);if(!n||n.type!=="file")throw Error("file not found");const name=parts(path).pop()||"file.txt",type=/\.html?$/i.test(name)?"text/html":/\.json$/i.test(name)?"application/json":"text/plain";downloadText(name,n.content,type)}
const aliases={dir:"ls","一覧":"ls","移動":"cd","作成":"mkdir","削除":"rm","開く":"cat","履歴":"history","木":"tree","消去":"clear","コピー":"copy","ファイル":"explorer"};function run(raw){const line=raw.trim();if(!line)return;print(promptStr()+" "+line,"#6fd8ff");history.push(line);if(history.length>100)history.shift();localStorage.setItem(HK,JSON.stringify(history));hi=history.length;const a=line.match(/(?:[^\s"]+|"[^"]*")+/g)||[];let cmd=(a.shift()||"").toLowerCase();cmd=aliases[cmd]||cmd;const args=a.map(x=>x.replace(/^"|"$/g,""));try{exec(cmd,args)}catch(e){print("Error: "+e.message,"#ff8f8f")}}
function exec(cmd,args){if(cmd==="help"){print("FILE COMMANDS\nls / dir / 一覧\ncd <path>\nmkdir <path>\ntouch <file>\nwrite <file> <text>\nedit <file>\ncat <file>\nrm <path>\ncopy <from> <to>\nmove <from> <to>\ntree\npwd\ndownload <file>\nupload\nexplorer / files\n\nAPP COMMANDS\napps\nlist apps\nopen <app>\ninstall <app>\nuninstall <app>\n\nSYSTEM\nhistory\nclear\nrun <file.html>\nmode linux|dos|jp\nexportfs\nimportfs\nversion");return}if(cmd==="ls"){const n=node(args[0]||cwd);if(!n)throw Error("path not found");if(n.type==="file"){print(args[0]);return}print(Object.entries(n.children).map(([k,v])=>k+(v.type==="dir"?"/":"")).join("  ")||"(empty)");return}if(cmd==="cd"){const p=norm(args[0]||"/"),n=node(p);if(!n||n.type!=="dir")throw Error("directory not found");cwd=p;update();return}if(cmd==="pwd"){print(cwd);return}if(cmd==="mkdir"){if(!args[0])throw Error("usage: mkdir <path>");const q=parent(args[0]);if(!q.parent||q.parent.type!=="dir")throw Error("parent not found");if(q.parent.children[q.name])throw Error("already exists");q.parent.children[q.name]={type:"dir",children:{}};saveFS();return}if(cmd==="touch"){if(!args[0])throw Error("usage: touch <file>");const q=parent(args[0]);if(!q.parent)throw Error("parent not found");if(!q.parent.children[q.name])q.parent.children[q.name]={type:"file",content:""};saveFS();return}if(cmd==="write"){if(!args[0])throw Error("usage: write <file> <text>");const q=parent(args[0]);if(!q.parent)throw Error("parent not found");q.parent.children[q.name]={type:"file",content:args.slice(1).join(" ")};saveFS();return}if(cmd==="cat"){const n=node(args[0]);if(!n||n.type!=="file")throw Error("file not found");print(n.content);return}if(cmd==="edit"){if(!args[0])throw Error("usage: edit <file>");openEditor(norm(args[0]));return}if(cmd==="rm"){if(!args[0])throw Error("usage: rm <path>");const p=norm(args[0]);if(p==="/")throw Error("cannot delete root");const q=parent(p);if(!q.parent||!q.parent.children[q.name])throw Error("not found");delete q.parent.children[q.name];if(cwd===p||cwd.startsWith(p+"/"))cwd="/";saveFS();update();return}if(cmd==="copy"){if(args.length<2)throw Error("usage: copy <from> <to>");const s=node(args[0]);if(!s)throw Error("source not found");const q=parent(args[1]);if(!q.parent)throw Error("target parent not found");q.parent.children[q.name]=JSON.parse(JSON.stringify(s));saveFS();return}if(cmd==="move"){if(args.length<2)throw Error("usage: move <from> <to>");const sp=norm(args[0]),s=node(sp);if(!s)throw Error("source not found");const t=parent(args[1]);if(!t.parent)throw Error("target parent not found");t.parent.children[t.name]=s;const q=parent(sp);delete q.parent.children[q.name];saveFS();return}if(cmd==="tree"){const n=node(args[0]||cwd);if(!n)throw Error("path not found");print((args[0]||cwd)+"\n"+tree(n));return}if(cmd==="download"){if(!args[0])throw Error("usage: download <file>");downloadFile(norm(args[0]));print("download started: "+norm(args[0]),"#72f29a");return}if(cmd==="upload"){uploadInput.click();return}if(cmd==="explorer"||cmd==="files"){openExplorer(args[0]||cwd);return}if(cmd==="apps"||(cmd==="list"&&args[0]==="apps")){apps.forEach(k=>{const a=CATALOG[k];if(a)print(k+" - "+a.name)});return}if(cmd==="open"){if(!args[0])throw Error("usage: open <app>");openApp(args[0].toLowerCase());return}if(cmd==="install"){const k=(args[0]||"").toLowerCase();if(!CATALOG[k])throw Error("unknown app");if(apps.includes(k)){print("already installed: "+k);return}apps.push(k);saveApps();print("installed: "+CATALOG[k].name,"#72f29a");return}if(cmd==="uninstall"){const k=(args[0]||"").toLowerCase();apps=apps.filter(x=>x!==k);saveApps();print("uninstalled: "+k,"#ffca67");return}if(cmd==="run"){if(!args[0])throw Error("usage: run <file.html>");const p=norm(args[0]),n=node(p);if(!n||n.type!=="file")throw Error("file not found");runTitle.textContent="Run: "+p;runFrame.srcdoc=n.content;runModal.classList.add("show");return}if(cmd==="history"){history.forEach((x,i)=>print((i+1)+"  "+x));return}if(cmd==="clear"){out.innerHTML="";return}if(cmd==="mode"){if(!["linux","dos","jp"].includes(args[0]))throw Error("mode linux|dos|jp");mode=args[0];modeSel.value=mode;localStorage.setItem(MK,mode);update();return}if(cmd==="exportfs"){downloadText("salp-terminal-filesystem.json",JSON.stringify({app:"salp Terminal",version:3,fs},null,2),"application/json");print("filesystem exported.","#72f29a");return}if(cmd==="importfs"){importInput.click();return}if(cmd==="version"){print("salp Terminal v3.0.0");return}print("command not found: "+cmd,"#ff8f8f")}
$("saveEditor").onclick=()=>{const n=node(editing);if(n){n.content=editor.value;saveFS();print("saved: "+editing,"#72f29a")}editorModal.classList.remove("show")};$("closeEditor").onclick=()=>editorModal.classList.remove("show");$("closeRun").onclick=()=>{runModal.classList.remove("show");runFrame.srcdoc=""};$("closeExplorer").onclick=()=>explorerModal.classList.remove("show");$("filesTop").onclick=()=>openExplorer(cwd);$("up").onclick=()=>{ecwd=norm("..",ecwd);selected=null;renderExplorer()};$("newFolder").onclick=()=>{const name=prompt("新しいフォルダ名");if(!name)return;const p=node(ecwd);if(p.children[name])return alert("同じ名前があります");p.children[name]={type:"dir",children:{}};saveFS()};$("newFile").onclick=()=>{const name=prompt("新しいファイル名");if(!name)return;const p=node(ecwd);if(p.children[name])return alert("同じ名前があります");p.children[name]={type:"file",content:""};saveFS()};$("upload").onclick=()=>uploadInput.click();$("refresh").onclick=renderExplorer;$("openSel").onclick=openSelected;$("editSel").onclick=()=>{if(selected&&node(selected)?.type==="file")openEditor(selected)};$("downloadSel").onclick=()=>{if(selected)try{downloadFile(selected)}catch(e){alert(e.message)}};$("renameSel").onclick=()=>{if(!selected)return;const nn=prompt("新しい名前",parts(selected).pop());if(!nn)return;const q=parent(selected);if(q.parent.children[nn])return alert("同じ名前があります");q.parent.children[nn]=q.parent.children[q.name];delete q.parent.children[q.name];selected=null;saveFS()};$("deleteSel").onclick=()=>{if(!selected||!confirm("削除しますか？"))return;const q=parent(selected);delete q.parent.children[q.name];selected=null;saveFS()};$("clearSel").onclick=()=>{selected=null;renderExplorer()};uploadInput.onchange=async()=>{const files=[...uploadInput.files],target=node(explorerModal.classList.contains("show")?ecwd:cwd);for(const f of files)target.children[f.name]={type:"file",content:await f.text()};uploadInput.value="";saveFS();print(files.length+" file(s) uploaded.","#72f29a")};importInput.onchange=async()=>{const f=importInput.files[0];if(!f)return;try{const d=JSON.parse(await f.text());if(!d.fs||d.fs.type!=="dir")throw Error("invalid filesystem");fs=d.fs;cwd=ecwd="/";saveFS();update();print("filesystem imported.","#72f29a")}catch(e){alert("読み込めませんでした: "+e.message)}importInput.value=""};modeSel.value=mode;modeSel.onchange=()=>{mode=modeSel.value;localStorage.setItem(MK,mode);update()};$("reset").onclick=()=>{if(confirm("仮想ファイルシステムを初期化しますか？")){fs=defaultFS();cwd=ecwd="/";saveFS();update();print("filesystem reset.","#ffca67")}};document.querySelectorAll("[data-cmd]").forEach(b=>b.onclick=()=>{run(b.dataset.cmd);inp.focus()});inp.addEventListener("keydown",e=>{if(e.key==="Enter"){const v=inp.value;inp.value="";run(v)}else if(e.key==="ArrowUp"){e.preventDefault();if(hi>0)hi--;inp.value=history[hi]||""}else if(e.key==="ArrowDown"){e.preventDefault();if(hi<history.length)hi++;inp.value=history[hi]||""}});print("salp Terminal v3");print("Terminal + File Manager + App Launcher");print("Type help to see commands.");print("");update();renderFS();renderApps();inp.focus();
})();
</script>
