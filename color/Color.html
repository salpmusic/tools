<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f7f3ea">
<title>salp Color v5.0 Alpha</title>
<style>
:root{--bg:#f7f3ea;--panel:#fff;--text:#222;--muted:#777;--line:#ded8ce;--pink:#ff8fbd;--blue:#72dce8}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif}button,input,select{font:inherit}button{cursor:pointer}.app{max-width:1000px;margin:auto;padding:14px 12px 30px}header{text-align:center;padding:10px}h1{margin:0}.sub{color:var(--muted);font-size:14px;margin-top:5px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:20px;box-shadow:0 8px 24px rgba(0,0,0,.07)}nav{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px;margin:10px 0 14px}button,select,input[type=text],.file{min-height:46px;border:1px solid var(--line);border-radius:12px;background:#fff;padding:9px 12px;color:var(--text)}button.primary,.file.primary{background:#222;color:#fff;border-color:#222;font-weight:900}button.accent{border:0;background:linear-gradient(135deg,var(--pink),var(--blue));font-weight:900}.screen{display:none}.screen.active{display:block}.section{padding:14px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}.stat{background:#f5f0e8;border-radius:14px;padding:14px;text-align:center}.stat strong{font-size:24px;display:block}.toolbar{display:grid;grid-template-columns:1fr 180px;gap:8px;margin-bottom:12px}.library{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.card{overflow:hidden;border:1px solid var(--line);border-radius:16px;background:#fff}.thumb{width:100%;aspect-ratio:1;display:block;image-rendering:pixelated}.body{padding:10px}.title{font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{font-size:12px;color:var(--muted);margin:4px 0 8px}.cardActions{display:grid;grid-template-columns:1fr auto;gap:7px}.fav{font-size:20px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.file{display:flex;align-items:center;justify-content:center;cursor:pointer}.file input{display:none}.preview{display:grid;grid-template-columns:190px 1fr;gap:12px;margin-top:12px}.preview img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:14px;background:#eee}.hint{font-size:12px;color:var(--muted);line-height:1.6}.gameTop{display:flex;justify-content:space-between}.progress{height:10px;background:#eee7dd;border-radius:999px;overflow:hidden;margin:10px 0}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--pink),var(--blue))}.selected{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px;background:#f3efe8;border-radius:12px;font-weight:900}.sw{width:34px;height:34px;border-radius:50%;border:3px solid #222}.controls{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.wrap{overflow:auto;max-height:68vh;background:#cfc7bc;border-radius:14px;padding:4px}.canvas{display:block;background:#faf8f4;image-rendering:pixelated;transform-origin:top left}.palette{display:grid;grid-template-columns:repeat(8,1fr);gap:7px;max-height:240px;overflow:auto;margin-top:12px}.color{min-height:62px;border:3px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:900}.color.active{border-color:#222}.dot{width:30px;height:30px;border-radius:50%;border:2px solid #444}.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}.msg{text-align:center;font-weight:900;min-height:28px;padding-top:10px}.empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:35px}.hidden{display:none!important}@media(max-width:760px){nav{grid-template-columns:1fr 1fr}.library{grid-template-columns:1fr 1fr}.preview{grid-template-columns:1fr}.grid3{grid-template-columns:1fr}.palette{grid-template-columns:repeat(4,1fr)}.actions{grid-template-columns:1fr 1fr}}@media(max-width:460px){.library{grid-template-columns:1fr}.stats{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<header><h1>🎨 salp Color v5.0 α</h1><div class="sub">問題ライブラリ・自作問題・進捗保存</div></header>
<nav class="panel"><button data-go="home" class="primary">ホーム</button><button data-go="library">ライブラリ</button><button data-go="creator">画像から作る</button><button data-go="game">プレイ</button></nav>
<section id="home" class="screen active"><div class="panel section"><h2>世界に一つだけの塗り絵を、数秒で。</h2><p>問題を選ぶか、自分の画像から作れます。</p><div class="stats"><div class="stat"><strong id="s1">0</strong>問題</div><div class="stat"><strong id="s2">0</strong>完成</div><div class="stat"><strong id="s3">0</strong>お気に入り</div></div></div></section>
<section id="library" class="screen"><div class="panel section"><div class="toolbar"><input id="search" type="text" placeholder="問題を検索"><select id="filter"><option value="all">すべて</option><option value="builtin">おすすめ</option><option value="my">自分の問題</option><option value="favorite">お気に入り</option><option value="cat">猫</option><option value="sweets">スイーツ</option><option value="flower">花</option></select></div><div id="libraryGrid" class="library"></div></div></section>
<section id="creator" class="screen"><div class="panel section"><div class="grid2"><label class="file primary">画像を選ぶ<input id="imgIn" type="file" accept="image/*"></label><label class="file">問題を開く<input id="jsonIn" type="file" accept=".json,application/json"></label></div><div class="preview"><img id="preview" alt="preview"><div><div class="grid2"><input id="title" type="text" placeholder="作品名"><select id="cat"><option value="my">自分の作品</option><option value="cat">猫</option><option value="sweets">スイーツ</option><option value="flower">花</option></select></div><div class="grid3" style="margin-top:9px"><select id="size"><option>16</option><option>24</option><option selected>32</option><option>64</option><option>96</option><option>128</option></select><select id="colors"><option>4</option><option>6</option><option selected>8</option><option>12</option><option>16</option><option>24</option><option>32</option><option>48</option><option>64</option></select><button id="generate" class="accent" disabled>ぬりえを作る</button></div><p class="hint">生成後にライブラリへ保存できます。最大128×128・64色対応。</p></div></div><div class="grid3" style="margin-top:12px"><button id="saveLib" disabled>自分の問題へ保存</button><button id="saveJson" disabled>問題ファイルを保存</button><button id="deleteMine">自分の問題を全削除</button></div></div></section>
<section id="game" class="screen"><div class="panel section"><div class="gameTop"><strong id="gameTitle">問題を選んでください</strong><span id="pct">0%</span></div><div class="progress"><div id="bar" class="bar"></div></div><div class="selected"><span id="selSw" class="sw"></span><span id="selText">色を選んでください</span></div><div class="controls"><button id="zout">−</button><button id="zreset">100%</button><button id="zin">＋</button><button id="nums">番号 ON</button></div><div id="wrap" class="wrap"><canvas id="canvas" class="canvas"></canvas></div><div id="palette" class="palette"></div><div class="actions"><button id="hint" disabled>ヒント</button><button id="fill" disabled>選択色を全部</button><button id="reset" disabled>リセット</button><button id="png" disabled>PNG保存</button></div><div id="msg" class="msg">ライブラリから問題を選んでください</div></div></section>
</div>
<script>
(()=>{"use strict";const $=id=>document.getElementById(id),K={my:"sc5my",fav:"sc5fav",prog:"sc5prog",done:"sc5done"};let my=load(K.my,[]),fav=load(K.fav,[]),prog=load(K.prog,{}),done=load(K.done,[]),src=null,current=null,filled=[],selected=1,zoom=1,numbers=true;const cv=$("canvas"),ctx=cv.getContext("2d");function load(k,d){try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}}function save(k,v){localStorage.setItem(k,JSON.stringify(v))}function pattern(id,title,cat,size,cols,fn){const colors={};cols.forEach((c,i)=>colors[i+1]=c);const data=[];for(let y=0;y<size;y++)for(let x=0;x<size;x++)data.push(fn(x,y,size));return{id,title,category:cat,source:"builtin",puzzle:{size,colors,data}}}const built=[pattern("cat","三毛猫","cat",24,["#f2a46f","#fff0dc","#5e4034","#ef86a5"],(x,y,s)=>{const d=(x-12)**2+(y-12)**2;if(y<6&&(x<8||x>15))return 1;if(d<80){if(y<11&&(x<10||x>14))return 3;if(y>13&&Math.abs(x-12)<2)return 4;return 2}return 1}),pattern("cake","いちごケーキ","sweets",24,["#f7bfd2","#fff2df","#b67546","#e84d68"],(x,y)=>y<5&&x>8&&x<15?4:y<10&&x>4&&x<19?1:y<14?2:y<18?3:2),pattern("flower","朝顔","flower",24,["#8e73d8","#f7d456","#68b978","#a9def0"],(x,y)=>{const d=(x-12)**2+(y-8)**2;if(d<12)return 2;if(d<55)return 1;if(y>11&&Math.abs(x-12)<3)return 3;return 4})];function all(){return[...built,...my]}function stats(){$("s1").textContent=all().length;$("s2").textContent=done.length;$("s3").textContent=fav.length}document.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>go(b.dataset.go));function go(id){document.querySelectorAll(".screen").forEach(s=>s.classList.toggle("active",s.id===id));document.querySelectorAll("[data-go]").forEach(b=>b.classList.toggle("primary",b.dataset.go===id));if(id==="library")renderLibrary();if(id==="home")stats()}function renderLibrary(){const q=$("search").value.toLowerCase(),f=$("filter").value,g=$("libraryGrid");g.innerHTML="";const list=all().filter(p=>(!q||p.title.toLowerCase().includes(q))&&(f==="all"||f==="builtin"&&p.source==="builtin"||f==="my"&&p.source==="my"||f==="favorite"&&fav.includes(p.id)||p.category===f));if(!list.length){g.innerHTML='<div class="empty">問題がありません</div>';return}list.forEach(p=>{const c=document.createElement("article");c.className="card";const t=document.createElement("canvas");t.className="thumb";thumb(t,p.puzzle);const b=document.createElement("div");b.className="body";b.innerHTML='<div class="title"></div><div class="meta"></div>';b.querySelector(".title").textContent=p.title;b.querySelector(".meta").textContent=`${p.puzzle.size}×${p.puzzle.size}・${Object.keys(p.puzzle.colors).length}色`;const a=document.createElement("div");a.className="cardActions";const play=document.createElement("button");play.className="primary";play.textContent="遊ぶ";play.onclick=()=>start(p);const heart=document.createElement("button");heart.className="fav";heart.textContent=fav.includes(p.id)?"❤️":"♡";heart.onclick=()=>{fav=fav.includes(p.id)?fav.filter(x=>x!==p.id):[...fav,p.id];save(K.fav,fav);renderLibrary();stats()};a.append(play,heart);b.append(a);c.append(t,b);g.append(c)})}function thumb(c,p){c.width=c.height=256;const x=c.getContext("2d"),cell=256/p.size;p.data.forEach((v,i)=>{x.fillStyle=p.colors[v];x.fillRect(i%p.size*cell,Math.floor(i/p.size)*cell,Math.ceil(cell),Math.ceil(cell))})}$("search").oninput=renderLibrary;$("filter").onchange=renderLibrary;$("imgIn").onchange=()=>{const f=$("imgIn").files[0];if(!f)return;const u=URL.createObjectURL(f),im=new Image;im.onload=()=>{src=im;$("preview").src=u;$("generate").disabled=false;$("title").value=f.name.replace(/\.[^.]+$/,"")};im.src=u};function rgb(r,g,b){return"#"+[r,g,b].map(v=>Math.round(v).toString(16).padStart(2,"0")).join("")}function d(a,b){return(a.r-b.r)**2+(a.g-b.g)**2+(a.b-b.b)**2}function centers(sample,k){let c=[];for(let i=0;i<k;i++)c.push({...sample[Math.min(Math.floor(i*sample.length/k),sample.length-1)]});for(let z=0;z<7;z++){const s=Array.from({length:k},()=>({r:0,g:0,b:0,n:0}));sample.forEach(p=>{let bi=0,bd=Infinity;c.forEach((q,i)=>{const v=d(p,q);if(v<bd){bd=v;bi=i}});s[bi].r+=p.r;s[bi].g+=p.g;s[bi].b+=p.b;s[bi].n++});c=c.map((q,i)=>s[i].n?{r:s[i].r/s[i].n,g:s[i].g/s[i].n,b:s[i].b/s[i].n}:q)}return c}$("generate").onclick=async()=>{if(!src)return;$("generate").disabled=true;await new Promise(r=>setTimeout(r,30));const n=+$('size').value,k=+$('colors').value,w=document.createElement('canvas');w.width=w.height=n;const x=w.getContext('2d',{willReadFrequently:true}),sc=Math.max(n/src.width,n/src.height),dw=src.width*sc,dh=src.height*sc;x.drawImage(src,(n-dw)/2,(n-dh)/2,dw,dh);const raw=x.getImageData(0,0,n,n).data,px=[];for(let i=0;i<raw.length;i+=4)px.push({r:raw[i],g:raw[i+1],b:raw[i+2]});const sample=px.filter((_,i)=>i%Math.max(1,Math.floor(px.length/4096))===0),cs=centers(sample,k),data=px.map(p=>{let bi=0,bd=Infinity;cs.forEach((q,i)=>{const v=d(p,q);if(v<bd){bd=v;bi=i}});return bi+1}),colors={};cs.forEach((q,i)=>colors[i+1]=rgb(q.r,q.g,q.b));current={id:"temp"+Date.now(),title:$("title").value||"無題",category:$("cat").value,source:"temp",puzzle:{size:n,colors,data}};filled=new Array(data.length).fill(false);selected=1;enable();render();go("game");$("saveLib").disabled=false;$("saveJson").disabled=false;$("generate").disabled=false};$("saveLib").onclick=()=>{if(!current)return;current={...current,id:"my"+Date.now(),source:"my"};my.unshift(current);save(K.my,my);$("saveLib").disabled=true;stats();alert("保存しました")};$("deleteMine").onclick=()=>{if(confirm("自分の問題を全削除しますか？")){my=[];save(K.my,my);renderLibrary();stats()}};$("saveJson").onclick=()=>current&&download((current.title||"puzzle")+".json",new Blob([JSON.stringify(current)],{type:"application/json"}));$("jsonIn").onchange=async()=>{const f=$("jsonIn").files[0];if(!f)return;const o=JSON.parse(await f.text());start(o.puzzle?o:{id:"imp"+Date.now(),title:f.name,category:"my",source:"temp",puzzle:o})};function start(p){current=p;filled=prog[p.id]||new Array(p.puzzle.data.length).fill(false);selected=1;zoom=1;enable();render();go("game")}function enable(){["hint","fill","reset","png"].forEach(id=>$(id).disabled=false)}function render(){if(!current)return;$("gameTitle").textContent=current.title;draw();pal();$("selSw").style.background=current.puzzle.colors[selected];$("selText").textContent=`${selected}番の色を選択中`;status();applyZoom()}function draw(){const p=current.puzzle,n=p.size,cell=n<=32?24:n<=64?12:n<=96?8:6;cv.width=cv.height=n*cell;ctx.textAlign="center";ctx.textBaseline="middle";ctx.font=`700 ${Math.max(5,cell*.55)}px sans-serif`;p.data.forEach((v,i)=>{const x=i%n*cell,y=Math.floor(i/n)*cell;ctx.fillStyle=filled[i]?p.colors[v]:"#faf8f4";ctx.fillRect(x,y,cell,cell);if(!filled[i]&&numbers&&cell>=8){ctx.fillStyle="#666";ctx.fillText(v,x+cell/2,y+cell/2)}ctx.strokeStyle="rgba(0,0,0,.12)";if(cell>=8)ctx.strokeRect(x,y,cell,cell)})}cv.onpointerdown=e=>{if(!current)return;const r=cv.getBoundingClientRect(),cell=cv.width/current.puzzle.size,col=Math.floor((e.clientX-r.left)/zoom/cell),row=Math.floor((e.clientY-r.top)/zoom/cell),i=row*current.puzzle.size+col;if(i<0||i>=filled.length||filled[i])return;const c=current.puzzle.data[i];if(c!==selected){$("msg").textContent=`ここは${c}番です`;return}filled[i]=true;prog[current.id]=filled;save(K.prog,prog);render();if(filled.every(Boolean)){if(!done.includes(current.id)){done.push(current.id);save(K.done,done);stats()}alert("完成！")}};function pal(){const p=current.puzzle,g=$("palette");g.innerHTML="";Object.entries(p.colors).forEach(([n,c])=>{const b=document.createElement("button");b.className="color"+(+n===selected?" active":"");b.innerHTML='<span class="dot"></span><span></span>';b.querySelector(".dot").style.background=c;b.querySelector("span:last-child").textContent=n+"番";b.onclick=()=>{selected=+n;render()};g.append(b)})}function status(){const d=filled.filter(Boolean).length,p=Math.round(d/filled.length*100);$("pct").textContent=p+"%";$("bar").style.width=p+"%"}$("hint").onclick=()=>{const i=current.puzzle.data.findIndex((v,j)=>v===selected&&!filled[j]);$("msg").textContent=i<0?"この色は完了しています":"まだ塗る場所があります"};$("fill").onclick=()=>{current.puzzle.data.forEach((v,i)=>{if(v===selected)filled[i]=true});prog[current.id]=filled;save(K.prog,prog);render()};$("reset").onclick=()=>{if(confirm("リセットしますか？")){filled=new Array(filled.length).fill(false);render()}};$("zin").onclick=()=>{zoom=Math.min(3,zoom+.25);applyZoom()};$("zout").onclick=()=>{zoom=Math.max(.5,zoom-.25);applyZoom()};$("zreset").onclick=()=>{zoom=1;applyZoom()};function applyZoom(){cv.style.transform=`scale(${zoom})`;$("zreset").textContent=Math.round(zoom*100)+"%"}$("nums").onclick=()=>{numbers=!numbers;$("nums").textContent="番号 "+(numbers?"ON":"OFF");draw()};$("png").onclick=()=>{const p=current.puzzle,o=document.createElement("canvas"),cell=8;o.width=o.height=p.size*cell;const x=o.getContext("2d");p.data.forEach((v,i)=>{x.fillStyle=p.colors[v];x.fillRect(i%p.size*cell,Math.floor(i/p.size)*cell,cell,cell)});o.toBlob(b=>download((current.title||"color")+".png",b),"image/png")};function download(name,blob){const u=URL.createObjectURL(blob),a=document.createElement("a");a.href=u;a.download=name;document.body.append(a);a.click();setTimeout(()=>{URL.revokeObjectURL(u);a.remove()},500)}stats();renderLibrary()})();
</script>
</body>
</html>
