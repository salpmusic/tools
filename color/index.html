<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f7f3ea">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>salp Color v5.1</title>
<meta name="description" content="問題ライブラリ、自作問題、画像から最大128×128・64色の番号ぬりえを作成できる無料ブラウザゲーム。">
<link rel="stylesheet" href="css/style.css?v=5.1.0">
</head>
<body>
<div class="app">
<header>
  <h1>🎨 salp Color v5.1</h1>
  <div class="sub">問題ライブラリ・自作問題・画像生成・進捗保存</div>
  <a class="backHome" href="../index.html">← salp Toolsへ戻る</a>
</header>

<nav class="panel topnav">
  <button data-screen="home" class="primary">ホーム</button>
  <button data-screen="library">問題ライブラリ</button>
  <button data-screen="creator">画像から作る</button>
  <button data-screen="game">プレイ画面</button>
</nav>

<section id="home" class="screen active">
  <div class="panel homeHero">
    <span class="badge">v5.1</span>
    <h2>世界に一つだけの塗り絵を、数秒で。</h2>
    <p>問題を選ぶか、自分の画像から番号ぬりえを作れます。</p>
    <div class="homeStats">
      <div class="stat"><strong id="statPuzzles">0</strong><span>問題</span></div>
      <div class="stat"><strong id="statCompleted">0</strong><span>完成</span></div>
      <div class="stat"><strong id="statFavorites">0</strong><span>お気に入り</span></div>
    </div>
  </div>

  <div class="panel libraryPanel">
    <div class="grid2">
      <button data-screen="library" class="accent">📚 問題を選ぶ</button>
      <button data-screen="creator" class="primary">📷 画像から作る</button>
    </div>
  </div>
</section>

<section id="library" class="screen">
  <div class="panel libraryPanel">
    <div class="toolbar">
      <input id="searchInput" type="text" placeholder="問題を検索">
      <select id="categoryFilter">
        <option value="all">すべて</option>
        <option value="built-in">おすすめ</option>
        <option value="my">自分の問題</option>
        <option value="favorite">お気に入り</option>
        <option value="dog">犬</option>
        <option value="cat">猫</option>
        <option value="sweets">スイーツ</option>
        <option value="flower">花</option>
        <option value="salp">salp Originals</option>
      </select>
      <button id="refreshRemoteBtn">オンライン問題を更新</button>
    </div>
    <div id="libraryGrid" class="libraryGrid"></div>
  </div>
</section>

<section id="creator" class="screen">
  <div class="panel creatorPanel">
    <div class="section">
      <div class="label">画像・問題を開く</div>
      <div class="grid2">
        <label class="fileLabel primary">
          写真・イラストを選ぶ
          <input id="imageInput" type="file" accept="image/*">
        </label>
        <label class="fileLabel">
          保存した問題を開く
          <input id="jsonInput" type="file" accept=".json,application/json">
        </label>
      </div>
    </div>

    <div class="section previewRow">
      <img id="sourcePreview" alt="画像プレビュー">
      <div>
        <div class="label">作品情報</div>
        <div class="grid2">
          <input id="titleInput" type="text" placeholder="作品名">
          <select id="creatorCategory">
            <option value="my">自分の作品</option>
            <option value="dog">犬</option>
            <option value="cat">猫</option>
            <option value="sweets">スイーツ</option>
            <option value="flower">花</option>
            <option value="salp">salp Originals</option>
          </select>
        </div>

        <div class="label gapTop">変換設定</div>
        <div class="grid3">
          <select id="gridSize">
            <option value="16">16 × 16</option>
            <option value="24">24 × 24</option>
            <option value="32" selected>32 × 32</option>
            <option value="64">64 × 64</option>
            <option value="96">96 × 96</option>
            <option value="128">128 × 128</option>
          </select>

          <select id="colorCount">
            <option value="4">4色</option>
            <option value="6">6色</option>
            <option value="8" selected>8色</option>
            <option value="12">12色</option>
            <option value="16">16色</option>
            <option value="24">24色</option>
            <option value="32">32色</option>
            <option value="48">48色</option>
            <option value="64">64色</option>
          </select>

          <button id="generateBtn" class="accent" disabled>ぬりえを作る</button>
        </div>

        <div class="hint gapTop">
          生成後に「自分の問題へ保存」を押すと、このブラウザ内のライブラリへ保存されます。
        </div>
      </div>
    </div>

    <div class="section">
      <div class="grid3">
        <button id="saveToLibraryBtn" disabled>自分の問題へ保存</button>
        <button id="saveJsonBtn" disabled>問題ファイルを保存</button>
        <button id="deleteMyPuzzlesBtn">自分の問題を全削除</button>
      </div>
    </div>
  </div>
</section>

<section id="game" class="screen">
  <div class="panel gamePanel">
    <div class="gameTop">
      <strong id="gameTitle">問題を選んでください</strong>
      <span id="percentText">0%</span>
    </div>

    <div class="progress"><div id="progressBar"></div></div>

    <div class="selected">
      <div id="selectedSwatch" class="selectedSwatch"></div>
      <span id="selectedText">色を選んでください</span>
    </div>

    <div class="zoomRow">
      <button id="zoomOutBtn">− 縮小</button>
      <button id="zoomResetBtn">100%</button>
      <button id="zoomInBtn">＋ 拡大</button>
      <button id="numbersBtn">番号表示 ON</button>
    </div>

    <div class="canvasWrap" id="canvasWrap">
      <canvas id="gameCanvas"></canvas>
    </div>

    <div id="palette" class="palette"></div>

    <div class="actions">
      <button id="hintBtn" disabled>💡 ヒント</button>
      <button id="fillColorBtn" disabled>🎯 選択色を全部</button>
      <button id="resetBtn" disabled>↺ リセット</button>
      <button id="savePngBtn" disabled>PNG保存</button>
    </div>

    <div id="message" class="message">ライブラリから問題を選んでください</div>
  </div>
</section>
</div>

<div id="completeOverlay" class="overlay">
  <div class="dialog">
    <div class="celebrate">🎉</div>
    <h2>完成！</h2>
    <p>問題を完成しました。</p>
    <button id="closeCompleteBtn" class="primary full">閉じる</button>
  </div>
</div>

<script src="js/storage.js?v=5.1.0"></script>
<script src="js/library.js?v=5.1.0"></script>
<script src="js/image.js?v=5.1.0"></script>
<script src="js/game.js?v=5.1.0"></script>
<script src="js/app.js?v=5.1.0"></script>
</body>
</html>
