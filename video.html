<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f7f3ea">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<title>salp Simple Video v3.2</title>
<style>
:root{--bg:#f7f3ea;--panel:#fff;--text:#222;--muted:#777;--line:#ddd6ca;--accent1:#70dce9;--accent2:#ff8fbd}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Sans",sans-serif}
button,input,select{font:inherit}button{cursor:pointer}
.app{width:min(100%,820px);margin:auto;padding:calc(env(safe-area-inset-top) + 14px) 12px calc(env(safe-area-inset-bottom) + 30px)}
header{text-align:center;padding:12px 8px 20px}h1{margin:0;font-size:34px;letter-spacing:-1px}
.sub{margin-top:7px;color:var(--muted);font-size:14px}.back{display:inline-block;margin-top:13px;color:#777;font-size:13px}
.panel{margin-bottom:14px;padding:16px;background:var(--panel);border:1px solid var(--line);border-radius:22px;box-shadow:0 8px 24px rgba(0,0,0,.07)}
h2{margin:0 0 12px;font-size:19px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
label{display:block;margin:0 0 7px;color:#666;font-size:12px;font-weight:900}
select,input[type=number],input[type=range],input[type=color]{width:100%;min-height:46px;padding:10px;border:1px solid var(--line);border-radius:13px;background:#fff}
.fileLabel,button,.saveLink{min-height:50px;padding:12px 15px;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--text);font-weight:900}
.fileLabel{display:flex;align-items:center;justify-content:center;cursor:pointer}input[type=file]{display:none}
.primary{background:#222;color:#fff;border-color:#222}.accent{border:0;background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#111}
button:disabled{opacity:.4}.fileInfo{min-height:22px;margin-top:8px;color:#777;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stage{display:flex;align-items:center;justify-content:center;min-height:420px;padding:12px;border-radius:18px;background:#111;overflow:auto}
#previewCanvas{display:block;max-width:100%;max-height:68vh;background:#000}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.status{min-height:28px;margin-top:12px;color:#666;text-align:center;font-size:13px;font-weight:900;white-space:pre-line}
.progress{height:10px;margin-top:10px;overflow:hidden;border-radius:999px;background:#e4ddd3}#progressBar{width:0;height:100%;background:linear-gradient(90deg,var(--accent1),var(--accent2))}
.note{margin:10px 0 0;color:#888;font-size:12px;line-height:1.65}.hidden{display:none!important}.result{display:none}.result.show{display:block}
#resultVideo{width:100%;max-height:58vh;background:#000;border-radius:16px}.resultMeta{margin:10px 0;padding:10px;border-radius:12px;background:#f4f0e9;color:#666;font-size:12px;word-break:break-all}
.saveLink{display:flex;align-items:center;justify-content:center;text-decoration:none}
.modeTabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}.modeTabs button.active{background:#222;color:#fff;border-color:#222}
.rangeRow{display:grid;grid-template-columns:1fr 62px;gap:10px;align-items:center}.value{text-align:right;font-weight:900;font-size:13px}

.audioTimelineBox{
  margin-top:14px;
  padding:14px;
  border:1px solid var(--line);
  border-radius:16px;
  background:#f4f0e9;
}
.audioTimelineHead{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:9px;
  color:#666;
  font-size:12px;
  font-weight:900;
}
.audioTimeline{
  position:relative;
  height:72px;
  overflow:hidden;
  border-radius:13px;
  background:#d8d1c7;
  touch-action:none;
}
.videoTrackBar{
  position:absolute;
  left:0;
  right:0;
  top:10px;
  height:20px;
  border-radius:8px;
  background:linear-gradient(90deg,#6fd8ff,#77ecb1);
}
.videoTrackBar::before{
  content:"VIDEO";
  position:absolute;
  left:8px;
  top:2px;
  color:#102018;
  font-size:10px;
  font-weight:900;
}
.audioClipBar{
  position:absolute;
  top:40px;
  height:22px;
  min-width:18px;
  border:2px solid #fff;
  border-radius:8px;
  background:linear-gradient(90deg,#ff8fbd,#ffb26c);
  box-shadow:0 3px 10px rgba(0,0,0,.22);
  touch-action:none;
}
.audioClipBar::before{
  content:"AUDIO";
  position:absolute;
  left:7px;
  top:1px;
  color:#40202c;
  font-size:10px;
  font-weight:900;
}
.audioClipHandle{
  position:absolute;
  left:-8px;
  top:-5px;
  width:16px;
  height:32px;
  border-radius:7px;
  background:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.32);
}
.audioTimelineMarks{
  display:flex;
  justify-content:space-between;
  margin-top:6px;
  color:#888;
  font-size:10px;
}
.audioPositionButtons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:7px;
  margin-top:10px;
}
.audioPositionButtons button{
  min-height:38px;
  padding:7px;
  font-size:12px;
}

@media(max-width:620px){.grid2,.grid3,.actions{grid-template-columns:1fr}h1{font-size:29px}.stage{min-height:320px}}
</style>
</head>
<body>
<div class="app">
<header>
  <h1>🎬 salp Simple Video v3.2</h1>
  <div class="sub">追加音声をタイムライン上で移動・個別音量調整</div>
  <a class="back" href="index.html">← salp Toolsへ戻る</a>
</header>

<section class="panel">
  <div class="modeTabs">
    <button id="imageModeBtn" class="active">静止画＋音声</button>
    <button id="videoModeBtn">動画を切り出す</button>
  </div>

  <div id="imageMode">
    <h2>静止画＋音声からMP4</h2>
    <div class="grid2">
      <label class="fileLabel accent">静止画を選ぶ<input id="imageInput" type="file" accept="image/*"></label>
      <label class="fileLabel">音声を選ぶ<input id="audioInput" type="file" accept="audio/*,.wav,.wave,.mp3,.m4a,.aac,.flac,.ogg,.opus"></label>
    </div>
    <div id="imageInfo" class="fileInfo">静止画は未選択です</div>
    <div id="audioInfo" class="fileInfo">音声は未選択です</div>
    <div class="grid3" style="margin-top:12px">
      <div><label for="stillDuration">動画の長さ</label><input id="stillDuration" type="number" min="1" max="600" step="0.1" value="10"></div>
      <div><label for="audioStart">音声開始位置</label><input id="audioStart" type="number" min="0" step="0.1" value="0"></div>
      <div>
        <label for="audioVolume">音声音量</label>
        <div class="rangeRow"><input id="audioVolume" type="range" min="0" max="200" value="100"><span id="audioVolumeValue" class="value">100%</span></div>
      </div>
    </div>
  </div>

  <div id="videoMode" class="hidden">
    <h2>動画＋追加音声</h2>

    <label class="fileLabel accent">
      動画を選ぶ
      <input id="videoInput" type="file" accept="video/*">
    </label>
    <div id="videoInfo" class="fileInfo">動画は未選択です</div>

    <div class="grid2" style="margin-top:12px">
      <div>
        <label for="trimStart">動画の開始（秒）</label>
        <input id="trimStart" type="number" min="0" step="0.1" value="0">
      </div>
      <div>
        <label for="trimEnd">動画の終了（秒）</label>
        <input id="trimEnd" type="number" min="0" step="0.1" value="0">
      </div>
    </div>

    <div style="margin-top:14px">
      <label for="originalVolume">元動画の音量</label>
      <div class="rangeRow">
        <input id="originalVolume" type="range" min="0" max="200" value="100">
        <span id="originalVolumeValue" class="value">100%</span>
      </div>
    </div>

    <label style="display:flex;align-items:center;gap:9px;margin-top:10px;font-size:14px">
      <input id="discardAudio" type="checkbox" style="width:20px;height:20px">
      元動画の音を完全に消す
    </label>

    <hr style="margin:18px 0;border:0;border-top:1px solid #eee8de">

    <label class="fileLabel">
      追加する音声・音楽を選ぶ
      <input id="videoAudioInput" type="file"
        accept="audio/*,.wav,.wave,.mp3,.m4a,.aac,.flac,.ogg,.opus">
    </label>
    <div id="videoAudioInfo" class="fileInfo">追加音声は未選択です</div>

    <div class="grid2" style="margin-top:12px">
      <div>
        <label for="videoAudioStart">追加音声の開始位置（秒）</label>
        <input id="videoAudioStart" type="number" min="0" step="0.1" value="0">
      </div>
      <div>
        <label for="videoAudioVolume">追加音声の音量</label>
        <div class="rangeRow">
          <input id="videoAudioVolume" type="range" min="0" max="200" value="100">
          <span id="videoAudioVolumeValue" class="value">100%</span>
        </div>
      </div>
    </div>

    <div class="audioTimelineBox">
      <div class="audioTimelineHead">
        <span>🎵 追加音声の位置</span>
        <span id="audioPositionLabel">0.0秒から開始</span>
      </div>

      <div id="audioTimeline" class="audioTimeline">
        <div class="videoTrackBar"></div>
        <div id="audioClipBar" class="audioClipBar">
          <div class="audioClipHandle"></div>
        </div>
      </div>

      <div class="audioTimelineMarks">
        <span>0秒</span>
        <span id="audioTimelineEnd">0秒</span>
      </div>

      <div class="audioPositionButtons">
        <button data-audio-shift="-5">−5秒</button>
        <button data-audio-shift="-1">−1秒</button>
        <button data-audio-shift="1">＋1秒</button>
        <button data-audio-shift="5">＋5秒</button>
      </div>
    </div>
  </div>
</section>

<section class="panel">
  <h2>出力設定</h2>
  <div class="grid3">
    <div><label for="format">画面サイズ</label><select id="format"><option value="720x1280" selected>縦長 720p</option><option value="1280x720">横長 720p</option><option value="1080x1080">正方形</option><option value="1080x1920">縦長 1080p</option><option value="1920x1080">横長 1080p</option></select></div>
    <div><label for="fit">表示方法</label><select id="fit"><option value="contain" selected>全体を表示</option><option value="cover">画面いっぱい</option><option value="fill">引き伸ばす</option></select></div>
    <div><label for="background">余白色</label><input id="background" type="color" value="#000000"></div>
  </div>
</section>

<section class="panel">
  <h2>プレビュー</h2>
  <div class="stage"><canvas id="previewCanvas" width="720" height="1280"></canvas></div>
  <div class="actions"><button id="previewBtn" class="accent">▶ プレビュー</button><button id="exportBtn" class="primary">MP4を書き出す</button></div>
  <div class="progress"><div id="progressBar"></div></div>
  <div id="status" class="status">素材を選んでください</div>
  <p class="note">v3.2では、追加音声をタイムライン上で左右に動かし、開始位置と音量を調整できます。</p>
</section>

<section id="resultPanel" class="panel result">
  <h2>✅ MP4が完成しました</h2>
  <video id="resultVideo" controls playsinline></video>
  <div id="resultMeta" class="resultMeta"></div>
  <div class="actions"><button id="shareBtn" class="accent">📤 共有・保存</button><a id="downloadLink" class="saveLink primary" href="#" download>📁 ファイルに保存</a></div>
</section>
</div>

<video id="sourceVideo" playsinline muted preload="metadata" style="display:none"></video>

<script type="module">
const $=id=>document.getElementById(id);
let mode="image",imageFile=null,audioFile=null,videoFile=null,videoAudioFile=null,imageBitmap=null,videoUrl="",resultUrl="",resultFile=null,mediabunnyModule=null,videoAudioDuration=0,audioDragging=false;
const canvas=$("previewCanvas"),ctx=canvas.getContext("2d"),sourceVideo=$("sourceVideo");

function setMode(next){
  mode=next;
  $("imageMode").classList.toggle("hidden",mode!=="image");
  $("videoMode").classList.toggle("hidden",mode!=="video");
  $("imageModeBtn").classList.toggle("active",mode==="image");
  $("videoModeBtn").classList.toggle("active",mode==="video");
  drawPreview();
}
$("imageModeBtn").onclick=()=>setMode("image");
$("videoModeBtn").onclick=()=>setMode("video");

function setCanvasSize(){
  const [w,h]=$("format").value.split("x").map(Number);
  canvas.width=w;canvas.height=h;drawPreview();
}
$("format").onchange=setCanvasSize;$("fit").onchange=drawPreview;$("background").oninput=drawPreview;setCanvasSize();

function drawFitted(source,sw,sh){
  const cw=canvas.width,ch=canvas.height,fit=$("fit").value;
  ctx.fillStyle=$("background").value;ctx.fillRect(0,0,cw,ch);
  let dw=cw,dh=ch;
  if(fit!=="fill"){const scale=fit==="cover"?Math.max(cw/sw,ch/sh):Math.min(cw/sw,ch/sh);dw=sw*scale;dh=sh*scale}
  ctx.drawImage(source,(cw-dw)/2,(ch-dh)/2,dw,dh);
}
function drawPreview(){
  ctx.fillStyle=$("background").value;ctx.fillRect(0,0,canvas.width,canvas.height);
  if(mode==="image"&&imageBitmap)drawFitted(imageBitmap,imageBitmap.width,imageBitmap.height);
  else if(mode==="video"&&sourceVideo.readyState>=2)drawFitted(sourceVideo,sourceVideo.videoWidth,sourceVideo.videoHeight);
  else{ctx.fillStyle="#777";ctx.textAlign="center";ctx.textBaseline="middle";ctx.font=Math.max(22,canvas.width/24)+"px sans-serif";ctx.fillText("素材を選択してください",canvas.width/2,canvas.height/2)}
}

$("imageInput").onchange=async e=>{imageFile=e.target.files[0]||null;if(!imageFile)return;if(imageBitmap)imageBitmap.close();imageBitmap=await createImageBitmap(imageFile);$("imageInfo").textContent=imageFile.name;drawPreview()};
$("audioInput").onchange=e=>{audioFile=e.target.files[0]||null;$("audioInfo").textContent=audioFile?audioFile.name:"音声は未選択です"};
$("videoInput").onchange=e=>{videoFile=e.target.files[0]||null;if(!videoFile)return;if(videoUrl)URL.revokeObjectURL(videoUrl);videoUrl=URL.createObjectURL(videoFile);sourceVideo.src=videoUrl;$("videoInfo").textContent=videoFile.name;sourceVideo.onloadedmetadata=()=>{$("trimStart").value="0";$("trimEnd").value=sourceVideo.duration.toFixed(1);sourceVideo.currentTime=0};sourceVideo.onloadeddata=drawPreview};
$("audioVolume").oninput=()=>{
  $("audioVolumeValue").textContent=$("audioVolume").value+"%";
};

$("originalVolume").oninput=()=>{
  $("originalVolumeValue").textContent=$("originalVolume").value+"%";
};

$("videoAudioVolume").oninput=()=>{
  $("videoAudioVolumeValue").textContent=$("videoAudioVolume").value+"%";
};

$("videoAudioInput").onchange=async e=>{
  videoAudioFile=e.target.files[0]||null;
  $("videoAudioInfo").textContent=
    videoAudioFile?videoAudioFile.name:"追加音声は未選択です";

  videoAudioDuration=0;

  if(videoAudioFile){
    try{
      const tempAudio=document.createElement("audio");
      const tempUrl=URL.createObjectURL(videoAudioFile);

      await new Promise((resolve,reject)=>{
        tempAudio.preload="metadata";
        tempAudio.onloadedmetadata=resolve;
        tempAudio.onerror=reject;
        tempAudio.src=tempUrl;
      });

      videoAudioDuration=Number.isFinite(tempAudio.duration)
        ?tempAudio.duration
        :0;

      URL.revokeObjectURL(tempUrl);
    }catch(error){
      console.warn("追加音声の長さを取得できませんでした",error);
    }
  }

  updateAudioTimeline();
};

$("previewBtn").onclick=async()=>{
  if(mode==="video"&&videoFile){
    sourceVideo.muted=$("discardAudio").checked;
    sourceVideo.currentTime=Math.max(0,Number($("trimStart").value)||0);
    await sourceVideo.play();
    const loop=()=>{if(sourceVideo.paused)return;drawPreview();const end=Number($("trimEnd").value)||sourceVideo.duration;if(sourceVideo.currentTime>=end){sourceVideo.pause();return}requestAnimationFrame(loop)};loop();
  }else drawPreview();
};

async function loadMediabunny(){
  if(mediabunnyModule)return mediabunnyModule;
  $("status").textContent="軽量変換エンジンを読み込み中…";$("progressBar").style.width="10%";
  mediabunnyModule=await import("https://cdn.jsdelivr.net/npm/mediabunny@1.50.8/+esm");
  $("progressBar").style.width="20%";
  return mediabunnyModule;
}

function cropAudioBuffer(buffer,start,duration,volume){
  const sampleRate=buffer.sampleRate,startFrame=Math.max(0,Math.floor(start*sampleRate)),maxFrames=Math.max(0,buffer.length-startFrame),frames=Math.min(maxFrames,Math.floor(duration*sampleRate));
  const context=new AudioContext(),output=context.createBuffer(buffer.numberOfChannels,frames,sampleRate);
  for(let channel=0;channel<buffer.numberOfChannels;channel++){const src=buffer.getChannelData(channel),dst=output.getChannelData(channel);for(let i=0;i<frames;i++)dst[i]=src[startFrame+i]*volume}
  context.close();return output;
}



function currentVideoDuration(){
  const start=Math.max(0,Number($("trimStart").value)||0);
  const end=Math.max(
    start,
    Number($("trimEnd").value)||
    sourceVideo.duration||
    0
  );

  return Math.max(0,end-start);
}

function clampAudioStart(value){
  const videoDuration=currentVideoDuration();
  return Math.max(0,Math.min(videoDuration,value));
}

function setAudioStart(value){
  const next=clampAudioStart(Number(value)||0);
  $("videoAudioStart").value=next.toFixed(1);
  updateAudioTimeline();
}

function updateAudioTimeline(){
  const videoDuration=currentVideoDuration();
  const audioStart=clampAudioStart(
    Number($("videoAudioStart").value)||0
  );

  const visibleAudioDuration=Math.max(
    .1,
    Math.min(
      videoAudioDuration||videoDuration||1,
      Math.max(0,videoDuration-audioStart)
    )
  );

  const startPercent=videoDuration
    ?audioStart/videoDuration*100
    :0;

  const widthPercent=videoDuration
    ?visibleAudioDuration/videoDuration*100
    :0;

  $("audioClipBar").style.left=startPercent+"%";
  $("audioClipBar").style.width=
    Math.max(3,Math.min(100-startPercent,widthPercent))+"%";

  $("audioPositionLabel").textContent=
    audioStart.toFixed(1)+"秒から開始";

  $("audioTimelineEnd").textContent=
    videoDuration.toFixed(1)+"秒";

  if(Number($("videoAudioStart").value)!==audioStart){
    $("videoAudioStart").value=audioStart.toFixed(1);
  }
}

$("videoAudioStart").addEventListener("input",updateAudioTimeline);
$("trimStart").addEventListener("input",updateAudioTimeline);
$("trimEnd").addEventListener("input",updateAudioTimeline);

document.querySelectorAll("[data-audio-shift]").forEach(button=>{
  button.addEventListener("click",()=>{
    const delta=Number(button.dataset.audioShift)||0;
    setAudioStart(
      (Number($("videoAudioStart").value)||0)+delta
    );
  });
});

const audioTimeline=$("audioTimeline");
const audioClipBar=$("audioClipBar");

function pointerToAudioStart(event){
  const rect=audioTimeline.getBoundingClientRect();
  const videoDuration=currentVideoDuration();

  if(!videoDuration)return 0;

  const percent=Math.max(
    0,
    Math.min(1,(event.clientX-rect.left)/rect.width)
  );

  return percent*videoDuration;
}

audioClipBar.addEventListener("pointerdown",event=>{
  event.preventDefault();
  audioDragging=true;
  audioClipBar.setPointerCapture(event.pointerId);
  setAudioStart(pointerToAudioStart(event));
});

audioClipBar.addEventListener("pointermove",event=>{
  if(!audioDragging)return;
  setAudioStart(pointerToAudioStart(event));
});

audioClipBar.addEventListener("pointerup",event=>{
  audioDragging=false;
  audioClipBar.releasePointerCapture(event.pointerId);
});

audioClipBar.addEventListener("pointercancel",()=>{
  audioDragging=false;
});

audioTimeline.addEventListener("pointerdown",event=>{
  if(event.target.closest("#audioClipBar"))return;
  setAudioStart(pointerToAudioStart(event));
});
async function decodeAudioFile(file){
  if(!file)return null;

  const context=new AudioContext();

  try{
    return await context.decodeAudioData(
      await file.arrayBuffer()
    );
  }finally{
    await context.close();
  }
}

function createSilentAudioBuffer(duration,sampleRate=44100,channels=2){
  const context=new AudioContext({sampleRate});
  const buffer=context.createBuffer(
    channels,
    Math.max(1,Math.ceil(duration*sampleRate)),
    sampleRate
  );
  context.close();
  return buffer;
}

function sampleAt(buffer,channel,time){
  if(!buffer||time<0||time>=buffer.duration)return 0;

  const sourceChannel=Math.min(
    channel,
    buffer.numberOfChannels-1
  );

  const data=buffer.getChannelData(sourceChannel);
  const position=time*buffer.sampleRate;
  const index=Math.floor(position);
  const fraction=position-index;

  const a=data[index]||0;
  const b=data[Math.min(index+1,data.length-1)]||a;

  return a+(b-a)*fraction;
}

function mixAudioBuffers({
  duration,
  originalBuffer=null,
  originalStart=0,
  originalVolume=1,
  extraBuffer=null,
  extraStart=0,
  extraVolume=1
}){
  const sampleRate=Math.max(
    originalBuffer?.sampleRate||0,
    extraBuffer?.sampleRate||0,
    44100
  );

  const channels=Math.max(
    originalBuffer?.numberOfChannels||0,
    extraBuffer?.numberOfChannels||0,
    2
  );

  const context=new AudioContext({sampleRate});
  const output=context.createBuffer(
    channels,
    Math.max(1,Math.ceil(duration*sampleRate)),
    sampleRate
  );

  for(let channel=0;channel<channels;channel++){
    const destination=output.getChannelData(channel);

    for(let frame=0;frame<destination.length;frame++){
      const outputTime=frame/sampleRate;

      const originalValue=sampleAt(
        originalBuffer,
        channel,
        originalStart+outputTime
      )*originalVolume;

      const extraValue=sampleAt(
        extraBuffer,
        channel,
        outputTime-extraStart
      )*extraVolume;

      destination[frame]=Math.max(
        -1,
        Math.min(1,originalValue+extraValue)
      );
    }
  }

  context.close();
  return output;
}

async function renderVideoFrames({
  M,
  videoFile,
  output,
  videoSource,
  start,
  end,
  width,
  height,
  fit
}){
  const {
    Input,BlobSource,ALL_FORMATS,VideoSampleSink
  }=M;

  const input=new Input({
    source:new BlobSource(videoFile,{useStreamReader:false}),
    formats:ALL_FORMATS
  });

  const videoTrack=await input.getPrimaryVideoTrack();

  if(!videoTrack){
    throw new Error("動画トラックが見つかりません");
  }

  const sink=new VideoSampleSink(videoTrack,{
    hardwareAcceleration:"prefer-hardware"
  });

  const work=document.createElement("canvas");
  work.width=width;
  work.height=height;
  const workContext=work.getContext("2d");

  const bg=$("background").value;
  let frameCount=0;

  for await(
    const sample of sink.samples(start,end)
  ){
    const frame=sample.toVideoFrame();

    workContext.fillStyle=bg;
    workContext.fillRect(0,0,width,height);

    const sourceWidth=frame.displayWidth||frame.codedWidth;
    const sourceHeight=frame.displayHeight||frame.codedHeight;

    let drawWidth=width;
    let drawHeight=height;

    if(fit!=="fill"){
      const scale=fit==="cover"
        ?Math.max(width/sourceWidth,height/sourceHeight)
        :Math.min(width/sourceWidth,height/sourceHeight);

      drawWidth=sourceWidth*scale;
      drawHeight=sourceHeight*scale;
    }

    workContext.drawImage(
      frame,
      (width-drawWidth)/2,
      (height-drawHeight)/2,
      drawWidth,
      drawHeight
    );

    const timestamp=Math.max(0,sample.timestamp-start);
    const duration=Math.max(
      1/60,
      sample.duration||1/30
    );

    await videoSource.add(
      timestamp,
      duration,
      {keyFrame:frameCount%60===0}
    );

    frame.close();
    sample.close();
    frameCount++;

    if(frameCount%15===0){
      const progress=Math.min(
        1,
        timestamp/Math.max(.001,end-start)
      );
      $("progressBar").style.width=
        (20+progress*55)+"%";

      $("status").textContent=
        "映像を変換中… "+
        Math.round(progress*100)+"%";
    }
  }

  videoSource.close();
}

  const target=new BufferTarget(),output=new Output({format:new Mp4OutputFormat({fastStart:"in-memory"}),target});

  await audioSource.add(cropped);$("progressBar").style.width="85%";

async function exportTrimmedVideo(M){
  if(!videoFile){
    throw new Error("動画を選んでください");
  }

  const {
    Output,Mp4OutputFormat,BufferTarget,
    CanvasSource,AudioBufferSource
  }=M;

  const start=Math.max(
    0,
    Number($("trimStart").value)||0
  );

  const end=Math.max(
    start+0.1,
    Number($("trimEnd").value)||
    sourceVideo.duration
  );

  const duration=end-start;
  const [width,height]=$("format")
    .value
    .split("x")
    .map(Number);

  const originalVolume=$("discardAudio").checked
    ?0
    :Number($("originalVolume").value)/100;

  const extraVolume=
    Number($("videoAudioVolume").value)/100;

  const extraStart=Math.max(
    0,
    Number($("videoAudioStart").value)||0
  );

  $("status").textContent="音声を準備中…";
  $("progressBar").style.width="22%";

  let originalBuffer=null;

  if(originalVolume>0){
    try{
      originalBuffer=await decodeAudioFile(videoFile);
    }catch(error){
      console.warn("元動画の音声を読めませんでした",error);
    }
  }

  let extraBuffer=null;

  if(videoAudioFile&&extraVolume>0){
    extraBuffer=await decodeAudioFile(videoAudioFile);
  }

  const mixedBuffer=mixAudioBuffers({
    duration,
    originalBuffer,
    originalStart:start,
    originalVolume,
    extraBuffer,
    extraStart,
    extraVolume
  });

  const target=new BufferTarget();

  const output=new Output({
    format:new Mp4OutputFormat({
      fastStart:"in-memory"
    }),
    target
  });

  const renderCanvas=document.createElement("canvas");
  renderCanvas.width=width;
  renderCanvas.height=height;

  const videoSource=new CanvasSource(
    renderCanvas,
    {
      codec:"avc",
      bitrate:3_000_000,
      hardwareAcceleration:"prefer-hardware"
    }
  );

  const audioSource=new AudioBufferSource({
    codec:"aac",
    bitrate:192_000
  });

  output.addVideoTrack(
    videoSource,
    {frameRate:30}
  );
  output.addAudioTrack(audioSource);

  await output.start();

  // CanvasSourceは固定Canvasを参照するため、
  // renderVideoFrames内で同じCanvasへ描画する。
  const originalCanvas=canvas;
  const originalContext=ctx;

  const input=new M.Input({
    source:new M.BlobSource(
      videoFile,
      {useStreamReader:false}
    ),
    formats:M.ALL_FORMATS
  });

  const videoTrack=
    await input.getPrimaryVideoTrack();

  if(!videoTrack){
    throw new Error("動画トラックが見つかりません");
  }

  const sink=new M.VideoSampleSink(
    videoTrack,
    {hardwareAcceleration:"prefer-hardware"}
  );

  const renderContext=
    renderCanvas.getContext("2d");

  let frameCount=0;

  for await(
    const sample of sink.samples(start,end)
  ){
    const frame=sample.toVideoFrame();

    renderContext.fillStyle=$("background").value;
    renderContext.fillRect(0,0,width,height);

    const sourceWidth=
      frame.displayWidth||frame.codedWidth;

    const sourceHeight=
      frame.displayHeight||frame.codedHeight;

    let drawWidth=width;
    let drawHeight=height;

    if($("fit").value!=="fill"){
      const scale=$("fit").value==="cover"
        ?Math.max(
            width/sourceWidth,
            height/sourceHeight
          )
        :Math.min(
            width/sourceWidth,
            height/sourceHeight
          );

      drawWidth=sourceWidth*scale;
      drawHeight=sourceHeight*scale;
    }

    renderContext.drawImage(
      frame,
      (width-drawWidth)/2,
      (height-drawHeight)/2,
      drawWidth,
      drawHeight
    );

    const timestamp=Math.max(
      0,
      sample.timestamp-start
    );

    const frameDuration=Math.max(
      1/60,
      sample.duration||1/30
    );

    await videoSource.add(
      timestamp,
      frameDuration,
      {keyFrame:frameCount%60===0}
    );

    frame.close();
    sample.close();
    frameCount++;

    if(frameCount%15===0){
      const progress=Math.min(
        1,
        timestamp/Math.max(.001,duration)
      );

      $("progressBar").style.width=
        (25+progress*55)+"%";

      $("status").textContent=
        "映像を変換中… "+
        Math.round(progress*100)+"%";
    }
  }

  videoSource.close();

  $("status").textContent="音声をMP4へ追加中…";
  $("progressBar").style.width="84%";

  await audioSource.add(mixedBuffer);
  audioSource.close();

  await output.finalize();

  $("progressBar").style.width="95%";

  return new Uint8Array(target.buffer);
}

$("exportBtn").onclick=async()=>{
  $("exportBtn").disabled=true;$("progressBar").style.width="0%";$("status").textContent="準備中…";
  try{
    if(!("VideoEncoder" in window))throw new Error("このブラウザはWebCodecsの映像エンコードに対応していません");
    const M=await loadMediabunny(),bytes=mode==="image"?await exportImageVideo(M):await exportTrimmedVideo(M);

    const blob=new Blob([bytes],{type:"video/mp4"});if(resultUrl)URL.revokeObjectURL(resultUrl);resultUrl=URL.createObjectURL(blob);

};
