<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f7f3ea">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<title>salp Simple Video v3.0</title>
<style>
:root{--bg:#f7f3ea;--panel:#fff;--text:#222;--muted:#777;--line:#ddd6ca;--accent1:#70dce9;--accent2:#ff8fbd}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Sans",sans-serif}
button,input,select{font:inherit}button{cursor:pointer}
.app{width:min(100%,820px);margin:auto;padding:calc(env(safe-area-inset-top) + 14px) 12px calc(env(safe-area-inset-bottom) + 30px)}
header{text-align:center;padding:12px 8px 20px}h1{margin:0;font-size:34px;letter-spacing:-1px}
.sub{margin-top:7px;color:var(--muted);font-size:14px}.back{display:inline-block;margin-top:13px;color:#777;font-size:13px}
.panel{margin-bottom:14px;padding:16px;background:var(--panel);border:1px solid var(--line);border-radius:22px;box-shadow:0 8px 24px rgba(0,0,0,.07)}
h2{margin:0 0 12px;font-size:19px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
label{display:block;margin:0 0 7px;color:#666;font-size:12px;font-weight:900}
select,input[type=number],input[type=range],input[type=color]{width:100%;min-height:46px;padding:10px;border:1px solid var(--line);border-radius:13px;background:#fff}
.fileLabel,button,.saveLink{min-height:50px;padding:12px 15px;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--text);font-weight:900}
.fileLabel{display:flex;align-items:center;justify-content:center;cursor:pointer}input[type=file]{display:none}
.primary{background:#222;color:#fff;border-color:#222}.accent{border:0;background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#111}
button:disabled{opacity:.4}.fileInfo{min-height:22px;margin-top:8px;color:#777;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stage{display:flex;align-items:center;justify-content:center;min-height:420px;padding:12px;border-radius:18px;background:#111;overflow:auto}
#previewCanvas{display:block;max-width:100%;max-height:68vh;background:#000}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.status{min-height:28px;margin-top:12px;color:#666;text-align:center;font-size:13px;font-weight:900;white-space:pre-line}
.progress{height:10px;margin-top:10px;overflow:hidden;border-radius:999px;background:#e4ddd3}#progressBar{width:0;height:100%;background:linear-gradient(90deg,var(--accent1),var(--accent2))}
.note{margin:10px 0 0;color:#888;font-size:12px;line-height:1.65}.hidden{display:none!important}.result{display:none}.result.show{display:block}
#resultVideo{width:100%;max-height:58vh;background:#000;border-radius:16px}.resultMeta{margin:10px 0;padding:10px;border-radius:12px;background:#f4f0e9;color:#666;font-size:12px;word-break:break-all}
.saveLink{display:flex;align-items:center;justify-content:center;text-decoration:none}
.modeTabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}.modeTabs button.active{background:#222;color:#fff;border-color:#222}
.rangeRow{display:grid;grid-template-columns:1fr 62px;gap:10px;align-items:center}.value{text-align:right;font-weight:900;font-size:13px}
@media(max-width:620px){.grid2,.grid3,.actions{grid-template-columns:1fr}h1{font-size:29px}.stage{min-height:320px}}
</style>
</head>
<body>
<div class="app">
<header>
  <h1>🎬 salp Simple Video v3.0</h1>
  <div class="sub">Mediabunny版・軽量MP4書き出しテスト</div>
  <a class="back" href="index.html">← salp Toolsへ戻る</a>
</header>

<section class="panel">
  <div class="modeTabs">
    <button id="imageModeBtn" class="active">静止画＋音声</button>
    <button id="videoModeBtn">動画を切り出す</button>
  </div>

  <div id="imageMode">
    <h2>静止画＋音声からMP4</h2>
    <div class="grid2">
      <label class="fileLabel accent">静止画を選ぶ<input id="imageInput" type="file" accept="image/*"></label>
      <label class="fileLabel">音声を選ぶ<input id="audioInput" type="file" accept="audio/*,.wav,.wave,.mp3,.m4a,.aac,.flac,.ogg,.opus"></label>
    </div>
    <div id="imageInfo" class="fileInfo">静止画は未選択です</div>
    <div id="audioInfo" class="fileInfo">音声は未選択です</div>
    <div class="grid3" style="margin-top:12px">
      <div><label for="stillDuration">動画の長さ</label><input id="stillDuration" type="number" min="1" max="600" step="0.1" value="10"></div>
      <div><label for="audioStart">音声開始位置</label><input id="audioStart" type="number" min="0" step="0.1" value="0"></div>
      <div>
        <label for="audioVolume">音声音量</label>
        <div class="rangeRow"><input id="audioVolume" type="range" min="0" max="200" value="100"><span id="audioVolumeValue" class="value">100%</span></div>
      </div>
    </div>
  </div>

  <div id="videoMode" class="hidden">
    <h2>動画の開始・終了を切り出す</h2>
    <label class="fileLabel accent">動画を選ぶ<input id="videoInput" type="file" accept="video/*"></label>
    <div id="videoInfo" class="fileInfo">動画は未選択です</div>
    <div class="grid2" style="margin-top:12px">
      <div><label for="trimStart">開始（秒）</label><input id="trimStart" type="number" min="0" step="0.1" value="0"></div>
      <div><label for="trimEnd">終了（秒）</label><input id="trimEnd" type="number" min="0" step="0.1" value="0"></div>
    </div>
    <label style="display:flex;align-items:center;gap:9px;margin-top:12px;font-size:14px">
      <input id="discardAudio" type="checkbox" style="width:20px;height:20px">元動画の音を消す
    </label>
  </div>
</section>

<section class="panel">
  <h2>出力設定</h2>
  <div class="grid3">
    <div><label for="format">画面サイズ</label><select id="format"><option value="720x1280" selected>縦長 720p</option><option value="1280x720">横長 720p</option><option value="1080x1080">正方形</option><option value="1080x1920">縦長 1080p</option><option value="1920x1080">横長 1080p</option></select></div>
    <div><label for="fit">表示方法</label><select id="fit"><option value="contain" selected>全体を表示</option><option value="cover">画面いっぱい</option><option value="fill">引き伸ばす</option></select></div>
    <div><label for="background">余白色</label><input id="background" type="color" value="#000000"></div>
  </div>
</section>

<section class="panel">
  <h2>プレビュー</h2>
  <div class="stage"><canvas id="previewCanvas" width="720" height="1280"></canvas></div>
  <div class="actions"><button id="previewBtn" class="accent">▶ プレビュー</button><button id="exportBtn" class="primary">MP4を書き出す</button></div>
  <div class="progress"><div id="progressBar"></div></div>
  <div id="status" class="status">素材を選んでください</div>
  <p class="note">v3.0は保存方式の確認を最優先にした版です。分割削除・別音声ミックスは、iPhoneでMP4保存が成功したあとに戻します。</p>
</section>

<section id="resultPanel" class="panel result">
  <h2>✅ MP4が完成しました</h2>
  <video id="resultVideo" controls playsinline></video>
  <div id="resultMeta" class="resultMeta"></div>
  <div class="actions"><button id="shareBtn" class="accent">📤 共有・保存</button><a id="downloadLink" class="saveLink primary" href="#" download>📁 ファイルに保存</a></div>
</section>
</div>

<video id="sourceVideo" playsinline muted preload="metadata" style="display:none"></video>

<script type="module">
const $=id=>document.getElementById(id);
let mode="image",imageFile=null,audioFile=null,videoFile=null,imageBitmap=null,videoUrl="",resultUrl="",resultFile=null,mediabunnyModule=null;
const canvas=$("previewCanvas"),ctx=canvas.getContext("2d"),sourceVideo=$("sourceVideo");

function setMode(next){
  mode=next;
  $("imageMode").classList.toggle("hidden",mode!=="image");
  $("videoMode").classList.toggle("hidden",mode!=="video");
  $("imageModeBtn").classList.toggle("active",mode==="image");
  $("videoModeBtn").classList.toggle("active",mode==="video");
  drawPreview();
}
$("imageModeBtn").onclick=()=>setMode("image");
$("videoModeBtn").onclick=()=>setMode("video");

function setCanvasSize(){
  const [w,h]=$("format").value.split("x").map(Number);
  canvas.width=w;canvas.height=h;drawPreview();
}
$("format").onchange=setCanvasSize;$("fit").onchange=drawPreview;$("background").oninput=drawPreview;setCanvasSize();

function drawFitted(source,sw,sh){
  const cw=canvas.width,ch=canvas.height,fit=$("fit").value;
  ctx.fillStyle=$("background").value;ctx.fillRect(0,0,cw,ch);
  let dw=cw,dh=ch;
  if(fit!=="fill"){const scale=fit==="cover"?Math.max(cw/sw,ch/sh):Math.min(cw/sw,ch/sh);dw=sw*scale;dh=sh*scale}
  ctx.drawImage(source,(cw-dw)/2,(ch-dh)/2,dw,dh);
}
function drawPreview(){
  ctx.fillStyle=$("background").value;ctx.fillRect(0,0,canvas.width,canvas.height);
  if(mode==="image"&&imageBitmap)drawFitted(imageBitmap,imageBitmap.width,imageBitmap.height);
  else if(mode==="video"&&sourceVideo.readyState>=2)drawFitted(sourceVideo,sourceVideo.videoWidth,sourceVideo.videoHeight);
  else{ctx.fillStyle="#777";ctx.textAlign="center";ctx.textBaseline="middle";ctx.font=Math.max(22,canvas.width/24)+"px sans-serif";ctx.fillText("素材を選択してください",canvas.width/2,canvas.height/2)}
}

$("imageInput").onchange=async e=>{imageFile=e.target.files[0]||null;if(!imageFile)return;if(imageBitmap)imageBitmap.close();imageBitmap=await createImageBitmap(imageFile);$("imageInfo").textContent=imageFile.name;drawPreview()};
$("audioInput").onchange=e=>{audioFile=e.target.files[0]||null;$("audioInfo").textContent=audioFile?audioFile.name:"音声は未選択です"};
$("videoInput").onchange=e=>{videoFile=e.target.files[0]||null;if(!videoFile)return;if(videoUrl)URL.revokeObjectURL(videoUrl);videoUrl=URL.createObjectURL(videoFile);sourceVideo.src=videoUrl;$("videoInfo").textContent=videoFile.name;sourceVideo.onloadedmetadata=()=>{$("trimStart").value="0";$("trimEnd").value=sourceVideo.duration.toFixed(1);sourceVideo.currentTime=0};sourceVideo.onloadeddata=drawPreview};
$("audioVolume").oninput=()=>{$("audioVolumeValue").textContent=$("audioVolume").value+"%"};

$("previewBtn").onclick=async()=>{
  if(mode==="video"&&videoFile){
    sourceVideo.muted=$("discardAudio").checked;
    sourceVideo.currentTime=Math.max(0,Number($("trimStart").value)||0);
    await sourceVideo.play();
    const loop=()=>{if(sourceVideo.paused)return;drawPreview();const end=Number($("trimEnd").value)||sourceVideo.duration;if(sourceVideo.currentTime>=end){sourceVideo.pause();return}requestAnimationFrame(loop)};loop();
  }else drawPreview();
};

async function loadMediabunny(){
  if(mediabunnyModule)return mediabunnyModule;
  $("status").textContent="軽量変換エンジンを読み込み中…";$("progressBar").style.width="10%";
  mediabunnyModule=await import("https://cdn.jsdelivr.net/npm/mediabunny@1.50.8/+esm");
  $("progressBar").style.width="20%";
  return mediabunnyModule;
}

function cropAudioBuffer(buffer,start,duration,volume){
  const sampleRate=buffer.sampleRate,startFrame=Math.max(0,Math.floor(start*sampleRate)),maxFrames=Math.max(0,buffer.length-startFrame),frames=Math.min(maxFrames,Math.floor(duration*sampleRate));
  const context=new AudioContext(),output=context.createBuffer(buffer.numberOfChannels,frames,sampleRate);
  for(let channel=0;channel<buffer.numberOfChannels;channel++){const src=buffer.getChannelData(channel),dst=output.getChannelData(channel);for(let i=0;i<frames;i++)dst[i]=src[startFrame+i]*volume}
  context.close();return output;
}

async function exportImageVideo(M){
  if(!imageFile||!audioFile)throw new Error("静止画と音声を両方選んでください");
  const {Output,Mp4OutputFormat,BufferTarget,CanvasSource,AudioBufferSource}=M;
  const duration=Math.max(1,Number($("stillDuration").value)||10),audioStart=Math.max(0,Number($("audioStart").value)||0),volume=Number($("audioVolume").value)/100;
  const audioContext=new AudioContext(),decoded=await audioContext.decodeAudioData(await audioFile.arrayBuffer()),cropped=cropAudioBuffer(decoded,audioStart,duration,volume);
  const target=new BufferTarget(),output=new Output({format:new Mp4OutputFormat({fastStart:"in-memory"}),target});
  const videoSource=new CanvasSource(canvas,{codec:"avc",bitrate:3000000});
  const audioSource=new AudioBufferSource({codec:"aac",bitrate:192000});
  output.addVideoTrack(videoSource,{frameRate:30});output.addAudioTrack(audioSource);await output.start();
  drawPreview();await videoSource.add(0,duration,{keyFrame:true});$("progressBar").style.width="65%";
  await audioSource.add(cropped);$("progressBar").style.width="85%";
  await output.finalize();await audioContext.close();
  return new Uint8Array(target.buffer);
}

async function exportTrimmedVideo(M){
  if(!videoFile)throw new Error("動画を選んでください");
  const {Input,Output,BlobSource,ALL_FORMATS,Mp4OutputFormat,BufferTarget,Conversion}=M;
  const start=Math.max(0,Number($("trimStart").value)||0),end=Math.max(start+0.1,Number($("trimEnd").value)||sourceVideo.duration),[width,height]=$("format").value.split("x").map(Number);
  const input=new Input({source:new BlobSource(videoFile),formats:ALL_FORMATS});
  const target=new BufferTarget(),output=new Output({format:new Mp4OutputFormat({fastStart:"in-memory"}),target});
  const conversion=await Conversion.init({
    input,output,trim:{start,end},tracks:"primary",
    video:{width,height,fit:$("fit").value,codec:"avc",bitrate:3000000,frameRate:30,forceTranscode:true,hardwareAcceleration:"prefer-hardware"},
    audio:$("discardAudio").checked?{discard:true}:{codec:"aac",bitrate:192000,forceTranscode:true}
  });
  if(!conversion.isValid){const reasons=conversion.discardedTracks.map(item=>item.reason).join(", ");throw new Error("変換できません: "+reasons)}
  conversion.onProgress=progress=>{$("progressBar").style.width=(20+progress*75)+"%";$("status").textContent="MP4変換中… "+Math.round(progress*100)+"%"};
  await conversion.execute();return new Uint8Array(target.buffer);
}

$("exportBtn").onclick=async()=>{
  $("exportBtn").disabled=true;$("progressBar").style.width="0%";$("status").textContent="準備中…";
  try{
    if(!("VideoEncoder" in window))throw new Error("このブラウザはWebCodecsの映像エンコードに対応していません");
    const M=await loadMediabunny(),bytes=mode==="image"?await exportImageVideo(M):await exportTrimmedVideo(M);
    if(!bytes.byteLength)throw new Error("完成ファイルが空です");
    const blob=new Blob([bytes],{type:"video/mp4"});if(resultUrl)URL.revokeObjectURL(resultUrl);resultUrl=URL.createObjectURL(blob);
    const filename="salp-simple-video-"+Date.now()+".mp4";resultFile=new File([blob],filename,{type:"video/mp4"});
    $("resultVideo").src=resultUrl;$("downloadLink").href=resultUrl;$("downloadLink").download=filename;$("resultMeta").textContent=filename+" ｜ "+(blob.size/1024/1024).toFixed(2)+" MB";
    $("resultPanel").classList.add("show");$("resultPanel").scrollIntoView({behavior:"smooth"});$("progressBar").style.width="100%";$("status").textContent="編集済みMP4が完成しました";
  }catch(error){console.error(error);$("status").textContent="書き出しに失敗しました";alert(String(error.message||error))}
  finally{$("exportBtn").disabled=false}
};

$("shareBtn").onclick=async()=>{
  if(!resultFile)return;
  try{
    if(navigator.canShare?.({files:[resultFile]}))await navigator.share({files:[resultFile],title:"salp Simple Video"});
    else alert("このブラウザでは共有できません。「ファイルに保存」を使ってください。");
  }catch(error){if(error.name!=="AbortError")alert("共有できませんでした")}
};

window.addEventListener("beforeunload",()=>{if(videoUrl)URL.revokeObjectURL(videoUrl);if(resultUrl)URL.revokeObjectURL(resultUrl);if(imageBitmap)imageBitmap.close()});
drawPreview();
</script>
</body>
</html>
