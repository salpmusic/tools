<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0e17">
<title>salp N88 BASIC Studio v1.5.2.1</title>
<style>
:root{
  --bg:#0a0e17;
  --panel:#121826;
  --panel2:#0c111b;
  --line:#1e2a3d;
  --text:#e8eef7;
  --muted:#7d8da6;
  --green:#6ef2a0;
  --cyan:#5ee7f0;
  --pink:#ff7eb3;
  --accent:linear-gradient(135deg,#5ee7f0,#ff7eb3);
  --danger:#ff6b81;
  --warning:#ffd166;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  background:radial-gradient(ellipse at 10% 0%,#152238 0%,transparent 50%),
             radial-gradient(ellipse at 90% 0%,#2a1530 0%,transparent 45%),
             var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Segoe UI",sans-serif;
  overflow:hidden;
}
button,input,textarea,select{font:inherit;color:inherit}
button{
  min-height:34px;border:1px solid var(--line);border-radius:8px;
  padding:6px 12px;background:#1a2336;color:var(--text);
  font-weight:700;cursor:pointer;transition:background .15s,border-color .15s;
}
button:hover{background:#243049;border-color:#3a4d6e}
button.primary{border:0;background:var(--accent);color:#0a1018}
button.primary:hover{filter:brightness(1.08)}
button:disabled{opacity:.4;cursor:not-allowed}
button.ghost{background:transparent}
button.danger{border-color:#5a2a35;background:#2a1520;color:#ffb3c1}
input,select,textarea{
  border:1px solid var(--line);border-radius:8px;
  background:#0b101a;color:var(--text);padding:7px 10px;
}
.app{
  display:grid;
  grid-template-rows:92px 1fr;
  height:100vh;height:100dvh;
  max-width:1600px;margin:0 auto;
}

/* ===== TOP BAR ===== */
.topbar{
  display:grid;
  grid-template-columns:minmax(330px,auto) 1fr minmax(330px,auto);
  grid-template-rows:44px 40px;
  align-items:center;
  gap:4px 14px;
  padding:4px 12px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,#141c2c,#0f1522);
}
.runArea{
  grid-column:1;
  grid-row:1;
  display:flex;
  align-items:center;
  gap:8px;
}
.runMain{
  min-width:118px;
  min-height:38px;
  border:1px solid #2c7b49!important;
  background:linear-gradient(180deg,#234f34,#183824)!important;
  color:#8cffad!important;
  font-size:14px!important;
  box-shadow:0 0 0 1px #0b2114 inset;
}
.runMain:hover{filter:brightness(1.15)}
.stopMain{
  min-width:104px;
  min-height:38px;
  border:1px solid #7a3340!important;
  background:linear-gradient(180deg,#4b2029,#32171e)!important;
  color:#ff9aaa!important;
  font-size:14px!important;
}
.bootMain{
  min-width:94px;
  min-height:38px;
  font-size:13px!important;
}
.brand{
  grid-column:2;
  grid-row:1;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  min-width:0;
  text-align:center;
}
.logo{
  width:34px;height:34px;border-radius:10px;
  background:var(--accent);display:grid;place-items:center;
  font-size:18px;color:#0a1018;flex-shrink:0;
}
.brand h1{margin:0;font-size:15px;font-weight:800;letter-spacing:.02em;white-space:nowrap}
.brand .sub{font-size:10px;color:var(--muted);margin-top:1px}
.version{
  grid-column:3;
  grid-row:1;
  justify-self:end;
  padding:3px 8px;border:1px solid var(--line);border-radius:999px;
  color:var(--cyan);font-size:10px;font-weight:800;
}
.topActions{
  grid-column:1 / 4;
  grid-row:2;
  display:flex;
  gap:6px;
  align-items:center;
  flex-wrap:nowrap;
  overflow-x:auto;
  scrollbar-width:thin;
}
.topActions button{min-height:32px;font-size:12px;padding:5px 10px;white-space:nowrap}
.runArea.running .runMain{opacity:.65}
.runArea.running .stopMain{
  box-shadow:0 0 12px rgba(255,107,129,.35);
}
@media(max-width:900px){
  .topbar{
    grid-template-columns:1fr auto;
    grid-template-rows:44px 40px;
    padding:4px 8px;
  }
  .runArea{grid-column:1;grid-row:1}
  .brand{display:none}
  .version{grid-column:2;grid-row:1}
  .topActions{grid-column:1/3;grid-row:2}
  .runMain{min-width:102px}
  .stopMain{min-width:88px}
}


/* ===== MOBILE VIEW SWITCHER ===== */
.mobileViewTabs{
  display:none;
  gap:6px;
  padding:7px 8px;
  border-bottom:1px solid var(--line);
  background:#0b111c;
}
.mobileViewTabs button{
  flex:1;
  min-height:38px;
  font-size:12px;
  padding:5px 6px;
}
.mobileViewTabs button.active{
  border-color:#4fa9ba;
  background:#183044;
  color:var(--cyan);
}
.keypadToggleBtn{
  min-height:28px;
  padding:3px 8px;
  font-size:10px;
}

/* ===== MAIN IDE GRID ===== */
.ide{
  display:grid;
  grid-template-columns:220px 1fr 340px;
  grid-template-rows:1fr;
  min-height:0;height:100%;
  gap:0;
}
@media(max-width:1100px){
  .ide{grid-template-columns:200px 1fr 300px}
}
@media(max-width:900px){
  body{overflow:hidden}
  .app{grid-template-rows:92px 44px 1fr}
  .mobileViewTabs{display:flex}
  .ide{
    grid-template-columns:1fr;
    grid-template-rows:1fr;
    min-height:0;
    overflow:hidden;
  }
  .sidebar,.center,.rightPanel{
    grid-column:1;
    grid-row:1;
    width:100%;
    height:100%;
    min-height:0;
    max-height:none;
    border-left:0;
    border-right:0;
    display:none;
  }
  .ide[data-mobile-view="project"] .sidebar{display:flex}
  .ide[data-mobile-view="editor"] .center{display:grid}
  .ide[data-mobile-view="screen"] .rightPanel{display:flex}
  .center{grid-template-rows:auto 1fr auto 140px}
  #editor{
    min-height:0;
    font-size:15px;
    line-height:1.55;
    padding:12px;
  }
  .editorToolbar{
    overflow-x:auto;
    flex-wrap:nowrap;
  }
  .editorToolbar button{white-space:nowrap}
  .consolePanel{min-height:120px}
  .rightPanel{overflow:auto;background:#0b111c}
  .displayWrap{padding:8px 8px 4px}
  .displayFrame{
    width:100%;
    max-height:none;
    aspect-ratio:8/5;
  }
  .screenHead{position:sticky;top:0;z-index:5;background:#111a2a}
  .machineMini{grid-template-columns:1fr 1fr}
  .keypadPanel{padding:10px}
  .keypadBody{padding-bottom:12px}
  .dpad{
    grid-template-columns:58px 58px 58px;
    grid-template-rows:50px 50px 50px;
    gap:7px;
  }
  .vkey{min-width:54px;min-height:48px;font-size:17px}
  .sideFoot{position:sticky;bottom:0;background:var(--panel)}
}
@media(max-width:520px){
  .topbar{
    grid-template-columns:1fr auto;
    grid-template-rows:44px 40px;
  }
  .runArea{gap:5px}
  .runMain{min-width:92px;padding:4px 7px!important;font-size:12px!important}
  .stopMain{min-width:78px;padding:4px 7px!important;font-size:12px!important}
  .bootMain{min-width:70px;padding:4px 7px!important;font-size:11px!important}
  .topActions button{font-size:11px;padding:4px 8px}
  .machineMini{grid-template-columns:1fr}
  .screenStatus{font-size:10px}
}

/* ===== LEFT: Project Explorer ===== */
.sidebar{
  border-right:1px solid var(--line);
  background:var(--panel);
  display:flex;flex-direction:column;min-height:0;
}
.sideHead{
  padding:10px 12px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
  font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.06em;
}
.sideHead .tools{display:flex;gap:4px}
.sideHead button{min-height:26px;padding:3px 7px;font-size:11px}
.projectName{
  padding:8px 12px;font-size:13px;font-weight:800;
  color:var(--cyan);border-bottom:1px solid var(--line);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.fileList{flex:1;overflow:auto;padding:6px}
.fileItem{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:8px;cursor:pointer;
  font:13px ui-monospace,Menlo,Consolas,monospace;
  color:var(--muted);
}
.fileItem:hover{background:#1a2438;color:var(--text)}
.fileItem.active{background:#1e2d48;color:var(--green);font-weight:700}
.fileItem .icon{font-size:14px;opacity:.8}
.fileItem .name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.sideFoot{
  padding:8px;border-top:1px solid var(--line);
  display:flex;gap:6px;flex-wrap:wrap;
}
.sideFoot button{flex:1;min-height:30px;font-size:11px}

/* ===== CENTER: Editor + Console ===== */
.center{
  display:grid;
  grid-template-rows:auto 1fr auto 180px;
  min-height:0;min-width:0;
  background:var(--panel2);
}
.editorTabs{
  display:flex;align-items:center;gap:0;
  border-bottom:1px solid var(--line);
  background:#0e1522;padding:0 6px;min-height:36px;
}
.tab{
  padding:8px 14px;font-size:12px;font-weight:700;
  color:var(--muted);border-bottom:2px solid transparent;
  cursor:pointer;display:flex;align-items:center;gap:6px;
}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab .close{opacity:.5;font-size:11px}
.tab .close:hover{opacity:1;color:var(--danger)}
.editorArea{position:relative;min-height:0;display:flex;flex-direction:column}
.editorToolbar{
  display:flex;gap:6px;align-items:center;flex-wrap:wrap;
  padding:6px 10px;border-bottom:1px solid var(--line);
  background:#0f1624;
}
.editorToolbar button{min-height:28px;padding:4px 9px;font-size:11px}
.editorWrap{position:relative;flex:1;min-height:0}
#editor{
  width:100%;height:100%;min-height:200px;
  border:0;outline:0;resize:none;padding:12px 14px;
  background:transparent;color:var(--green);
  font:13.5px/1.55 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  tab-size:2;
}
.currentLineHighlight{
  position:absolute;left:0;right:0;height:21px;
  background:rgba(94,231,240,0.06);pointer-events:none;z-index:1;
  border-left:3px solid var(--cyan);display:none;
}
.currentLineHighlight.errorLine{
  background:rgba(255,80,80,0.16);border-left-color:#ff6b6b;
}
.editorStatus{
  display:flex;justify-content:space-between;gap:10px;
  padding:5px 12px;border-top:1px solid var(--line);
  background:#0a101c;font:11px ui-monospace,monospace;color:var(--muted);
}
#editorSaveState.modified{color:var(--warning)}
#editorSaveState.saved{color:var(--green)}
#editorSaveState.error{color:var(--danger)}

/* Console */
.consolePanel{
  border-top:1px solid var(--line);
  display:flex;flex-direction:column;min-height:0;
  background:#080d16;
}
.consoleHead{
  padding:6px 12px;font-size:11px;font-weight:800;color:var(--muted);
  border-bottom:1px solid var(--line);display:flex;justify-content:space-between;
}
#consoleOut{
  flex:1;overflow:auto;padding:8px 12px;
  font:12.5px/1.45 ui-monospace,Menlo,Consolas,monospace;
  color:var(--green);white-space:pre-wrap;word-break:break-all;
}
.consolePrompt{
  display:flex;align-items:center;gap:8px;
  padding:6px 10px;border-top:1px solid var(--line);
}
.consolePrompt .mark{color:var(--green);font-weight:800;font-family:ui-monospace,monospace}
#prompt{
  flex:1;min-width:0;border:0;outline:0;background:transparent;
  color:var(--green);font:13px ui-monospace,monospace;padding:4px 0;
}

/* ===== RIGHT: Screen + Machine ===== */
.rightPanel{
  border-left:1px solid var(--line);
  background:var(--panel);
  display:flex;flex-direction:column;min-height:0;overflow:auto;
}
.screenHead{
  padding:8px 12px;border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;
  font-size:11px;font-weight:800;color:var(--muted);
}
.displayWrap{padding:8px;background:#03060c}
.displayFrame{
  position:relative;width:100%;aspect-ratio:8/5;
  overflow:hidden;border:2px solid #2a364c;border-radius:6px;
  background:#000;box-shadow:inset 0 0 24px #000;
}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated}
.scanlines{
  position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,#0002 3px);
  mix-blend-mode:multiply;
}
.screenStatus{
  padding:6px 10px;font:11px ui-monospace,monospace;color:var(--muted);
  display:flex;justify-content:space-between;
}

/* Machine mini panel */
.machineMini{
  padding:10px;border-top:1px solid var(--line);
  display:grid;gap:8px;
}
.machineMini label{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.05em}
.machineMini select{width:100%;min-height:32px;font-size:12px}
.machineBadges{display:flex;gap:5px;flex-wrap:wrap}
.machineBadge{
  padding:3px 7px;border:1px solid var(--line);border-radius:999px;
  background:#0a101a;color:var(--cyan);font-size:10px;font-weight:800;
}

/* Keypad (collapsible) */
.keypadPanel{border-top:1px solid var(--line);padding:8px}
.keypadPanel summary{
  cursor:pointer;font-size:11px;font-weight:800;color:var(--muted);
  list-style:none;padding:4px 0;
}
.keypadBody{padding-top:8px}
.dpad{
  display:grid;grid-template-columns:48px 48px 48px;
  grid-template-rows:42px 42px 42px;gap:5px;justify-content:center;
}
.vkey{
  min-width:44px;min-height:40px;border:1px solid #3a4d6e;border-radius:10px;
  background:linear-gradient(180deg,#2a3854,#172135);color:#fff;
  font-size:14px;font-weight:900;box-shadow:0 3px 0 #080d18;
  touch-action:none;user-select:none;
}
.vkey:active,.vkey.pressed{transform:translateY(2px);box-shadow:0 1px 0 #080d18;background:#38527c}
.actionKeys{display:flex;gap:6px;justify-content:center;margin-top:8px}
.vkey.zkey{background:linear-gradient(180deg,#315078,#1a2b44)}
.vkey.xkey{background:linear-gradient(180deg,#71425d,#3b2332)}

/* Completion popup */
.completionPopup{
  position:absolute;z-index:50;min-width:160px;max-height:200px;overflow-y:auto;
  border:1px solid var(--line);border-radius:8px;background:#0d1524;
  box-shadow:0 10px 28px #000a;display:none;font:12.5px ui-monospace,Menlo,Consolas,monospace;
}
.completionPopup.show{display:block}
.completionPopup .item{padding:6px 10px;color:var(--green);cursor:pointer}
.completionPopup .item:hover,.completionPopup .item.active{
  background:#1a2a44;color:var(--cyan)
}
.completionPopup .item .hint{color:var(--muted);font-size:10px;margin-left:6px}

/* Find bar */
.findBar{
  display:none;align-items:center;gap:6px;flex-wrap:wrap;
  padding:6px 10px;border-bottom:1px solid var(--line);background:#121c2e;
}
.findBar.show{display:flex}
.findBar input{min-height:28px;flex:1;min-width:100px;font-size:12px}
.findBar button{min-height:28px;padding:3px 8px;font-size:11px}


.keypadControls{
  display:grid;
  gap:7px;
  padding:8px 0 4px;
}
.keypadControls select,
.keypadControls button{
  width:100%;
  min-height:34px;
}
.keyCustom{
  display:none;
  padding:6px;
  border:1px solid var(--line);
  border-radius:8px;
  background:#0a101a;
}
.keyCustom.show{display:block}
.keyChecks{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
}
.keyChecks label{
  display:flex;
  align-items:center;
  gap:4px;
  font-size:11px;
  color:var(--muted);
}
.keyChecks input{width:auto}
.vkey.keyHidden{display:none!important}
.sampleMenu{
  display:grid;
  gap:6px;
  padding:8px;
  border-top:1px solid var(--line);
}
.sampleMenu button{
  width:100%;
  text-align:left;
  font-size:11px;
}

/* Utility */
.hidden{display:none!important}
.mhLed{
  display:inline-block;width:7px;height:7px;border-radius:50%;
  margin-right:4px;background:#50fa7b;box-shadow:0 0 6px #50fa7b;
}
</style>
</head>
<body>
<div class="app">
  <!-- TOP BAR -->
  <header class="topbar">
    <div class="runArea" id="runArea">
      <button class="runMain" id="runBtn">▶ RUN (F5)</button>
      <button class="stopMain" id="stopBtn">■ STOP</button>
      <button class="bootMain" id="bootBtn">⏻ BOOT</button>
    </div>

    <div class="brand">
      <div class="logo">⌨️</div>
      <div>
        <h1>salp N88 BASIC Studio</h1>
        <div class="sub">PC-8801MH Compatible · BASIC Studio</div>
      </div>
    </div>

    <div class="version">v1.5.2</div>

    <div class="topActions">
      <button id="newProjectBtn">📁 NEW PROJECT</button>
      <button id="saveProjectBtn">💾 SAVE PROJECT</button>
      <button id="loadBtn">📂 LOAD</button>
      <button id="exportBasBtn">⬇ .BAS</button>
      <input id="fileInput" type="file" accept=".bas,.txt,text/plain,.json" hidden>
    </div>
  </header>

  <nav class="mobileViewTabs" id="mobileViewTabs" aria-label="Mobile view">
    <button type="button" data-mobile-view="editor" class="active">✍️ EDITOR</button>
    <button type="button" data-mobile-view="screen">🖥 CRT</button>
    <button type="button" data-mobile-view="project">📁 PROJECT</button>
  </nav>

  <!-- IDE -->
  <div class="ide" id="ide" data-mobile-view="editor">
    <!-- LEFT: Project Explorer -->
    <aside class="sidebar">
      <div class="sideHead">
        <span>PROJECT</span>
        <div class="tools">
          <button id="addFileBtn" title="Add file">＋</button>
          <button id="renameFileBtn" title="Rename">✎</button>
          <button id="deleteFileBtn" title="Delete" class="danger">✕</button>
        </div>
      </div>
      <div class="projectName" id="projectName">Untitled Project</div>
      <div class="fileList" id="fileList"></div>
      <div class="sampleMenu">
        <button id="arpeggioSampleBtn">🎹 アルペジオ</button>
        <button id="toccataSampleBtn">⛪ トッカータ風</button>
        <button id="gameSampleBtn">🎮 ゲーム</button>
      </div>
      <div class="sideFoot">
        <button id="sampleProjectBtn">📦 SAMPLE</button>
        <button id="clearConsoleBtn">CLR CONSOLE</button>
      </div>
    </aside>

    <!-- CENTER: Editor + Console -->
    <main class="center">
      <div class="editorTabs" id="editorTabs"></div>
      <div class="editorArea">
        <div class="editorToolbar">
          <button id="findBtn">🔍 FIND</button>
          <button id="replaceBtn">🔁 REPLACE</button>
          <button id="gotoBtn">⤵ GOTO</button>
          <button id="undoBtn">↶</button>
          <button id="redoBtn">↷</button>
          <button id="saveLocalBtn">💾</button>
          <span style="flex:1"></span>
          <span id="editorDocStatus" style="font-size:11px;color:var(--cyan)">Ready</span>
        </div>
        <div id="findBar" class="findBar">
          <input type="text" id="findInput" placeholder="検索…">
          <input type="text" id="replaceInput" placeholder="置換後…" style="display:none">
          <button id="findPrevBtn">↑</button>
          <button id="findNextBtn">↓</button>
          <button id="replaceOneBtn" style="display:none">Replace</button>
          <button id="replaceAllBtn" style="display:none">All</button>
          <button id="closeFindBtn">✕</button>
          <span id="findStatus" style="font-size:11px;color:var(--muted)"></span>
        </div>
        <div class="editorWrap">
          <div id="currentLineHighlight" class="currentLineHighlight"></div>
          <textarea id="editor" spellcheck="false"></textarea>
          <div id="completionPopup" class="completionPopup"></div>
        </div>
        <div class="editorStatus">
          <span id="editorCursor">Ln 1 · Col 1</span>
          <span id="editorStats">Lines 1 · Chars 0</span>
          <span id="editorSaveState">Saved</span>
        </div>
      </div>

      <!-- Console -->
      <div class="consolePanel">
        <div class="consoleHead">
          <span>CONSOLE</span>
          <span id="status">Ready</span>
        </div>
        <div id="consoleOut"></div>
        <div class="consolePrompt">
          <span class="mark">Ok</span>
          <input id="prompt" autocomplete="off" spellcheck="false" placeholder='PRINT "HELLO"  or  RUN'>
          <button id="enterBtn" style="min-height:28px;padding:3px 10px;font-size:11px">ENTER</button>
        </div>
      </div>
    </main>

    <!-- RIGHT: CRT + Settings -->
    <aside class="rightPanel">
      <div class="screenHead">
        <span><span class="mhLed"></span>N88 SCREEN 640×400</span>
        <span style="display:flex;gap:6px;align-items:center">
          <button type="button" id="keypadToggleBtn" class="keypadToggleBtn">🎮 KEYPAD</button>
          <span id="clockBadge" class="machineBadge">8MHz</span>
        </span>
      </div>
      <div class="displayWrap">
        <div class="displayFrame" id="displayFrame">

function resetText(){ textGrid=Array.from({length:ROWS},()=>Array(COLS).fill(" ")); cursorX=0; cursorY=0; }

function renderText(){
  ctx.save(); ctx.font="15px ui-monospace,Menlo,Consolas,monospace"; ctx.textBaseline="top";
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
    const ch=textGrid[y][x]; if(ch!==" "){ ctx.fillStyle=palette[fg]; ctx.fillText(ch,x*CW,y*CH+1); }
  }
  ctx.restore();
  $("cursorInfo").textContent=`LOCATE ${cursorX},${cursorY}`;
}
function scrollText(){ textGrid.shift(); textGrid.push(Array(COLS).fill(" ")); cursorY=ROWS-1; }
function putChar(ch){
  if(ch==="\n"){ cursorX=0; cursorY++; if(cursorY>=ROWS) scrollText(); return; }
  if(ch==="\r") return;
  textGrid[cursorY][cursorX]=ch; cursorX++;
  if(cursorX>=COLS){ cursorX=0; cursorY++; if(cursorY>=ROWS) scrollText(); }
}
function printText(s="", newline=true){

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function splitOutside(text,delimiter){
  const out=[]; let b="",q=false,d=0;
  for(let i=0;i<text.length;i++){
    const c=text[i]; if(c==='"') q=!q;
    if(!q){ if(c==="(")d++; if(c===")")d--;
      if(d===0 && text.slice(i,i+delimiter.length).toUpperCase()===delimiter.toUpperCase()){
        out.push(b); b=""; i+=delimiter.length-1; continue;
      }
    }
    b+=c;
  }
  out.push(b); return out;
}
function splitStatements(s){ return splitOutside(s,":").map(x=>x.trim()).filter(Boolean); }
function stripBasicComment(s){
  let q=false;
  for(let i=0;i<s.length;i++){
    if(s[i]==='"') q=!q;
    else if(!q && s[i]==="'") return s.slice(0,i).trim();
  }

}
function splitCSV(s){ return splitOutside(s,",").map(x=>x.trim()); }
function tokens(expr){
  const a=[], r=/\s*(?:(\d+(?:\.\d*)?|\.\d+)|("([^"]|"")*")|([A-Za-z][A-Za-z0-9]*\$?)|(<=|>=|<>|=|<|>|\+|-|\*|\/|\^|\(|\)|,))\s*/gy;

}

function evaluate(expr,state){
  const vars=state.vars, arrays=state.arrays, t=tokens(expr);

  function fn(n,a){
    switch(n){
      case"INT":return Math.floor(+a[0]||0); case"FIX":return Math.trunc(+a[0]||0);
      case"ABS":return Math.abs(+a[0]||0); case"SGN":return Math.sign(+a[0]||0);
      case"SQR":return Math.sqrt(+a[0]||0); case"RND":return Math.random();
      case"LEN":return String(a[0]??"").length; case"STR$":return String(a[0]??"");
      case"VAL":return Number(a[0]||0); case"CHR$":return String.fromCharCode(+a[0]||0);
      case"ASC":return String(a[0]??"").charCodeAt(0)||0;
      case"SIN":return Math.sin(+a[0]||0); case"COS":return Math.cos(+a[0]||0);
      case"TAN":return Math.tan(+a[0]||0); case"ATN":return Math.atan(+a[0]||0);
      case"LOG":return Math.log(+a[0]||0); case"EXP":return Math.exp(+a[0]||0);
      case"LEFT$":return String(a[0]??"").slice(0,Math.max(0,+a[1]||0));
      case"RIGHT$":{const s=String(a[0]??""); return s.slice(Math.max(0,s.length-(+a[1]||0)));}
      case"MID$":return String(a[0]??"").substr(Math.max(0,(+a[1]||1)-1), a[2]==null?undefined:Math.max(0,+a[2]||0));
      case"SPACE$":return " ".repeat(Math.max(0,+a[0]||0));
      case"STRING$":return String.fromCharCode(+a[1]||32).repeat(Math.max(0,+a[0]||0));
      case"INKEY$":{const k=keyQueue.length?keyQueue.shift():""; lastKey=k; return k;}
      case"STICK":{
        const u=heldKeys.has("UP"),d=heldKeys.has("DOWN"),l=heldKeys.has("LEFT"),r=heldKeys.has("RIGHT");
        if(u&&r)return 2; if(r&&d)return 4; if(d&&l)return 6; if(l&&u)return 8;
        if(u)return 1; if(r)return 3; if(d)return 5; if(l)return 7; return 0;
      }
      case"STRIG":return (heldKeys.has("Z")||heldKeys.has("SPACE"))?-1:0;
      case"MOUSEX":return mouseX; case"MOUSEY":return mouseY; case"MOUSEB":return mouseButton;
      default: throw Error("Unknown function "+n);
    }
  }
  function pri(){
    const x=take(); if(!x) throw Error("Missing expression");
    if(x.t==="n"||x.t==="s") return x.v;
    if(x.t==="i"){
      if(x.v==="NOT") return ~Math.trunc(+pri());
      if(x.v==="INKEY$") return fn("INKEY$",[]);
      if(peek()?.v==="("){
        take(); const a=[];
        if(peek()?.v!==")"){ a.push(logic()); while(peek()?.v===","){ take(); a.push(logic()); } }
        if(take()?.v!==")") throw Error("Missing )");
        if(knownFns.has(x.v)) return fn(x.v,a);
        const arr=arrays[x.v];
        return arr?.values[arrayKey(a)] ?? (x.v.endsWith("$")?"":0);
      }
      return Object.hasOwn(vars,x.v) ? vars[x.v] : (x.v.endsWith("$")?"":0);
    }
    if(x.v==="("){ const v=logic(); if(take()?.v!==")") throw Error("Missing )"); return v; }
    if(x.v==="+") return +pri(); if(x.v==="-") return -pri();
    throw Error("Invalid expression");
  }
  function pow(){ let v=pri(); while(peek()?.v==="^"){ take(); v=Math.pow(+v,+pri()); } return v; }
  function mul(){ let v=pow(); while(["*","/"].includes(peek()?.v)||peek()?.v==="MOD"){ const o=take().v, r=pow(); v=o==="*"?+v*+r:o==="/"?+v/+r:Math.trunc(+v)%Math.trunc(+r); } return v; }
  function add(){ let v=mul(); while(["+","-"].includes(peek()?.v)){ const o=take().v, r=mul(); v=o==="+"?(typeof v==="string"||typeof r==="string"?String(v)+String(r):+v+ +r):+v- +r; } return v; }
  function cmp(){ let v=add(); if(["=","<>","<",">","<=",">="].includes(peek()?.v)){ const o=take().v, r=add(); const z=o==="="?v==r:o==="<>"?v!=r:o==="<"?v<r:o===">"?v>r:o==="<="?v<=r:v>=r; return z?-1:0; } return v; }
  function logic(){ let v=cmp(); while(["AND","OR"].includes(peek()?.v)){ const o=take().v, r=cmp(); v=o==="AND"?(Math.trunc(+v)&Math.trunc(+r)):(Math.trunc(+v)|Math.trunc(+r)); } return v; }
  const v=logic(); if(p<t.length) throw Error("Extra expression"); return v;
}
function parseProgram(){
  const m=new Map();
  for(const raw of editor.value.replace(/\r/g,"").split("\n")){
    if(!raw.trim()) continue;
    const x=raw.match(/^\s*(\d+)\s*(.*)$/);
    if(!x) throw Error("Line number required: "+raw);
    m.set(+x[1], x[2]);
  }
  return [...m.entries()].sort((a,b)=>a[0]-b[0]).map(([number,text])=>({number,text}));
}
function lineIndex(lines,n){ return lines.findIndex(x=>x.number===+n); }
function coords(s,state){
  const m=s.match(/^\(\s*(.+?)\s*,\s*(.+?)\s*\)$/);
  if(!m) throw Error("Coordinate syntax");
  return [+evaluate(m[1],state), +evaluate(m[2],state)];
}

// ===== Crystal FM Engine (from Phoenix, upgraded for Studio v1.5.2) =====
async function ensureAudio(){
  audioCtx ||= new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==="suspended") await audioCtx.resume();
  return audioCtx;
}
async function tone(freq=880,dur=.12){
  const ac=await ensureAudio(), now=ac.currentTime;
  const o=ac.createOscillator(), g=ac.createGain();
  o.frequency.value=freq; o.type="square";
  g.gain.setValueAtTime(.06,now); g.gain.exponentialRampToValueAtTime(.001,now+dur);
  o.connect(g).connect(ac.destination); o.start(now); o.stop(now+dur);
}

function parseMml(source){
 const s=String(source||"").toUpperCase();
 let i=0,tempo=120,octave=4,defaultLength=4,instrument=13,volume=12,gate=8,eventIndex=0;
 const events=[];
 const noteIndex={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
 const readNumber=()=>{
  let z="";while(i<s.length&&/\d/.test(s[i]))z+=s[i++];
  return z?Number(z):null
 };
 while(i<s.length){
  const c=s[i++];
  if(/\s|,/.test(c))continue;
  if(c==="T"){const n=readNumber();if(n)tempo=Math.max(20,Math.min(400,n));continue}
  if(c==="O"){const n=readNumber();if(n!=null)octave=Math.max(0,Math.min(8,n));continue}
  if(c==="L"){const n=readNumber();if(n)defaultLength=Math.max(1,Math.min(128,n));continue}
  if(c==="@"){const n=readNumber();if(n!=null)instrument=n;continue}
  if(c==="V"){const n=readNumber();if(n!=null)volume=Math.max(0,Math.min(15,n));continue}
  if(c==="Q"){const n=readNumber();if(n!=null)gate=Math.max(1,Math.min(8,n));continue}
  if(c===">"){octave=Math.min(8,octave+1);continue}
  if(c==="<"){octave=Math.max(0,octave-1);continue}
  if(c==="R"||Object.hasOwn(noteIndex,c)){
   let accidental=0;
   if(s[i]==="+"||s[i]==="#"){accidental=1;i++}
   else if(s[i]==="-"){accidental=-1;i++}
   const length=readNumber()||defaultLength;
   let dotted=false;
   if(s[i]==="."){dotted=true;i++}
   let beats=4/length;
   if(dotted)beats*=1.5;
   const seconds=beats*60/tempo;
   let freq=0;
   if(c!=="R"){
    const midi=12*(octave+1)+noteIndex[c]+accidental;
    freq=440*Math.pow(2,(midi-69)/12)
   }
   events.push({
    freq,seconds,instrument,
    velocity:Math.pow(volume/15,1.35),
    gate:gate/8,
    index:eventIndex++
   });
   continue
  }
 }
 return events
}
function createCrystalOutput(ac,session){
 const input=ac.createGain(),dry=ac.createGain(),wet=ac.createGain();
 const compressor=ac.createDynamicsCompressor();
 compressor.threshold.value=-18;
 compressor.knee.value=16;
 compressor.ratio.value=3.2;
 compressor.attack.value=.004;
 compressor.release.value=.22;
 dry.gain.value=.88;
 wet.gain.value=soundMode==="real"?.12:soundMode==="enhanced"?.24:.30;

 const delayL=ac.createDelay(1),delayR=ac.createDelay(1);
 const feedbackL=ac.createGain(),feedbackR=ac.createGain();
 const panL=ac.createStereoPanner(),panR=ac.createStereoPanner();
 delayL.delayTime.value=.145;
 delayR.delayTime.value=.225;
 feedbackL.gain.value=.18;
 feedbackR.gain.value=.14;
 panL.pan.value=-.58;
 panR.pan.value=.58;

 input.connect(dry).connect(compressor);
 input.connect(wet);
 wet.connect(delayL);wet.connect(delayR);
 delayL.connect(feedbackL).connect(delayR);
 delayR.connect(feedbackR).connect(delayL);
 delayL.connect(panL).connect(compressor);
 delayR.connect(panR).connect(compressor);
 compressor.connect(ac.destination);
 session.nodes.push(input,dry,wet,compressor,delayL,delayR,feedbackL,feedbackR,panL,panR);
 return input
}
async function scheduleFmNote(ac,start,freq,duration,preset,session,event){
 if(soundMode==="silent")return;
 const meter=$("soundMeterBar");
 if(meter){
  meter.style.width=Math.min(100,24+freq/20)+"%";
  setTimeout(()=>meter.style.width="18%",150)
 }
 const noteBus=ac.createGain();
 const filter=ac.createBiquadFilter();
 const panner=ac.createStereoPanner();
 filter.type="lowpass";
 filter.frequency.setValueAtTime(Math.min(14000,preset.filter+freq*1.6),start);
 filter.Q.value=.55;
 const spread=[-.42,.18,.44,-.16,.31,-.34];
 panner.pan.setValueAtTime(spread[event.index%spread.length],start);
 noteBus.connect(filter).connect(panner).connect(session.output);

 const a=Math.max(.0015,preset.attack);
 const d=Math.max(.018,preset.decay);
 const musicalLength=Math.max(.04,duration*event.gate);
 const tail=Math.max(.08,preset.release);
 const noteEnd=start+musicalLength+tail;
 const peak=preset.gain*event.velocity;
 noteBus.gain.setValueAtTime(.0001,start);
 noteBus.gain.exponentialRampToValueAtTime(Math.max(.001,peak),start+a);
 noteBus.gain.exponentialRampToValueAtTime(Math.max(.0008,peak*preset.sustain),start+a+d);
 noteBus.gain.exponentialRampToValueAtTime(.0001,noteEnd);

 preset.ops.forEach((op,opIndex)=>{
  const carrier=ac.createOscillator();
  const mod=ac.createOscillator();
  const modGain=ac.createGain();
  const opGain=ac.createGain();
  carrier.type=op.wave;
  mod.type="sine";
  const tinyDetune=(opIndex-1.5)*1.7;
  carrier.frequency.setValueAtTime(freq*op.ratio,start);
  carrier.detune.setValueAtTime(tinyDetune,start);
  mod.frequency.setValueAtTime(freq*op.modRatio,start);
  modGain.gain.setValueAtTime(op.index,start);
  modGain.gain.exponentialRampToValueAtTime(Math.max(.3,op.index*.12),start+Math.max(.12,d*.9));
  opGain.gain.setValueAtTime(Math.max(.001,op.level),start);
  opGain.gain.exponentialRampToValueAtTime(Math.max(.0004,op.level*.20),noteEnd);
  mod.connect(modGain).connect(carrier.frequency);
  carrier.connect(opGain).connect(noteBus);
  carrier.start(start);mod.start(start);
  carrier.stop(noteEnd+.04);mod.stop(noteEnd+.04);
  session.nodes.push(carrier,mod,modGain,opGain)
 });

 // Soft octave shimmer for the crystal preset.
 if((preset.name.includes("Crystal")||soundMode==="crystal")&&freq>0){
  const shimmer=ac.createOscillator(),sg=ac.createGain();
  shimmer.type="sine";
  shimmer.frequency.setValueAtTime(freq*2.005,start);
  sg.gain.setValueAtTime(Math.max(.0001,peak*.055),start);
  sg.gain.exponentialRampToValueAtTime(.0001,noteEnd);
  shimmer.connect(sg).connect(noteBus);
  shimmer.start(start);shimmer.stop(noteEnd+.03);
  session.nodes.push(shimmer,sg)
 }
 session.nodes.push(noteBus,filter,panner)
}
async function playMml(source,{background=false}={}){
 const mml=String(source||"");
 if(mmlSession&&!mmlSession.cancelled){
  if(mmlLastSource===mml)return mmlSession.promise;
  stopMml()
 }
 const events=parseMml(mml);
 if(!events.length)return;
 const ac=await ensureAudio(),session={cancelled:false,nodes:[],promise:null,output:null};
 session.output=createCrystalOutput(ac,session);
 mmlSession=session;mmlLastSource=mml;
 const begin=ac.currentTime+.04;
 let cursor=begin;
 for(const ev of events){
  if(ev.freq>0){
   const preset=mmlInstrumentPreset(ev.instrument);
   await scheduleFmNote(ac,cursor,ev.freq,Math.max(.035,ev.seconds*.92),preset,session,ev)
  }
  cursor+=ev.seconds
 }
 const longestTail=Math.max(...events.map(e=>mmlInstrumentPreset(e.instrument).release),.3);
 const totalMs=Math.max(0,(cursor+longestTail-ac.currentTime)*1000);
 session.promise=new Promise(resolve=>setTimeout(()=>{
  if(mmlSession===session){
   for(const n of session.nodes){try{n.disconnect()}catch{}}
   mmlSession=null;mmlLastSource="";
   setStatus(stopped?"Stopped":"Ready")
  }
  resolve()
 },totalMs+80));
 setStatus("Crystal FM Playing");
 if(!background)await session.promise;
 return session.promise
}


function setVariable(target,value,state){
  const m=target.match(/^([A-Za-z][A-Za-z0-9]*\$?)\s*(?:\((.*)\))?$/);
  if(!m) throw Error("Invalid variable "+target);
  const name=m[1].toUpperCase();
  if(m[2]!=null){
    const args=splitCSV(m[2]).map(x=>evaluate(x,state));
    state.arrays[name] ||= {dims:[],values:{}};
    state.arrays[name].values[arrayKey(args)] = name.endsWith("$")?String(value):Number(value);
  } else {
    state.vars[name] = name.endsWith("$")?String(value):Number(value);
  }
}
function collectData(lines){
  const data=[];
  for(const line of lines) for(const s of splitStatements(line.text)){
    const m=s.match(/^DATA\s*(.*)$/i);
    if(m) for(const item of splitCSV(m[1])){
      if(/^".*"$/.test(item)) data.push(item.slice(1,-1).replace(/""/g,'"'));
      else data.push(Number(item));
    }
  }
  return data;
}
function floodFill(x,y,newColor){
  x=Math.floor(x); y=Math.floor(y);
  if(x<0||x>=640||y<0||y>=400) return;
  const img=ctx.getImageData(0,0,640,400), d=img.data;
  const idx=(x,y)=>(y*640+x)*4;
  const start=idx(x,y), target=[d[start],d[start+1],d[start+2],d[start+3]];
  const tmp=document.createElement("canvas").getContext("2d");
  tmp.fillStyle=newColor; tmp.fillRect(0,0,1,1);
  const nc=tmp.getImageData(0,0,1,1).data;
  if(target[0]===nc[0]&&target[1]===nc[1]&&target[2]===nc[2]) return;
  const q=[[x,y]];
  while(q.length){
    const [px,py]=q.pop();
    if(px<0||px>=640||py<0||py>=400) continue;
    const i=idx(px,py);
    if(d[i]!==target[0]||d[i+1]!==target[1]||d[i+2]!==target[2]) continue;
    d[i]=nc[0]; d[i+1]=nc[1]; d[i+2]=nc[2]; d[i+3]=255;
    q.push([px+1,py],[px-1,py],[px,py+1],[px,py-1]);
    if(q.length>200000) break;
  }
  ctx.putImageData(img,0,0);
}

async function execStmt(s,state,idx){
  s=stripBasicComment(s); const u=s.toUpperCase();
  if(!s||u.startsWith("REM")||s.startsWith("'")||u.startsWith("DATA")) return {};
  if(u==="END"||u==="STOP") return {end:true};
  let m;
  if(u==="CLS"){ resetScreen(); return {}; }
  if(u==="CLEAR"){ state.vars={}; state.arrays={}; state.forStack=[]; state.gosub=[]; return {}; }
  if((m=s.match(/^COLOR\s+(.+?)(?:\s*,\s*(.+))?$/i))){
    fg=Math.floor(evaluate(m[1],state))&15;
    if(m[2]!=null) bg=Math.floor(evaluate(m[2],state))&15;
    renderText(); return {};
  }
  if((m=s.match(/^LOCATE\s+(.+?)\s*,\s*(.+)$/i))){
    cursorX=Math.max(0,Math.min(79,Math.floor(evaluate(m[1],state))));
    cursorY=Math.max(0,Math.min(24,Math.floor(evaluate(m[2],state))));
    renderText(); return {};
  }
  if((m=s.match(/^DIM\s+(.+)$/i))){
    for(const spec of splitCSV(m[1])){
      const a=spec.match(/^([A-Za-z][A-Za-z0-9]*\$?)\((.*)\)$/);
      if(!a) throw Error("Bad DIM");
      const name=a[1].toUpperCase(), dims=splitCSV(a[2]).map(x=>Math.floor(evaluate(x,state)));
      state.arrays[name]={dims,values:{}};
    }
    return {};
  }
  if((m=s.match(/^READ\s+(.+)$/i))){
    for(const target of splitCSV(m[1])){
      if(state.dataPtr>=state.data.length) throw Error("Out of DATA");
      setVariable(target, state.data[state.dataPtr++], state);
    }
    return {};
  }
  if((m=s.match(/^PSET\s*(\(.+?\))(?:\s*,\s*(.+))?$/i))){
    const[x,y]=coords(m[1],state), c=m[2]!=null?evaluate(m[2],state):fg;
    ctx.fillStyle=color(c); ctx.fillRect(Math.round(x),Math.round(y),1,1); renderText(); return {};
  }
  if((m=s.match(/^LINE\s*(\(.+?\))\s*-\s*(\(.+?\))(?:\s*,\s*(.+?))?(?:\s*,\s*(B|BF))?$/i))){
    const[x1,y1]=coords(m[1],state),[x2,y2]=coords(m[2],state);
    const c=m[3]!=null?evaluate(m[3],state):fg, mode=(m[4]||"").toUpperCase();
    ctx.strokeStyle=color(c); ctx.fillStyle=color(c);
    if(mode==="BF") ctx.fillRect(x1,y1,x2-x1,y2-y1);
    else if(mode==="B") ctx.strokeRect(x1,y1,x2-x1,y2-y1);
    else { ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }
    renderText(); return {};
  }
  if((m=s.match(/^CIRCLE\s*(\(.+?\))\s*,\s*(.+?)(?:\s*,\s*(.+))?$/i))){
    const[x,y]=coords(m[1],state), r=+evaluate(m[2],state), c=m[3]!=null?evaluate(m[3],state):fg;
    ctx.strokeStyle=color(c); ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke(); renderText(); return {};
  }
  if((m=s.match(/^PAINT\s*(\(.+?\))(?:\s*,\s*(.+))?$/i))){
    const[x,y]=coords(m[1],state), c=m[2]!=null?evaluate(m[2],state):fg;
    floodFill(x,y,color(c)); renderText(); return {};
  }
  if(/^BEEP$/i.test(s)){ await tone(); return {}; }
  if((m=s.match(/^PLAY\s+(.+)$/i))){ await playMml(String(evaluate(m[1],state))); return {}; }
  if((m=s.match(/^(?:PRINT|\?)\s*(.*)$/i))){
    const b=m[1]; if(!b){ printText(); return {}; }
    let out="", buf="", q=false, d=0; const parts=[];
    for(let i=0;i<b.length;i++){
      const c=b[i]; if(c==='"') q=!q;
      if(!q){ if(c==="(")d++; if(c===")")d--;
        if(d===0&&(c===";"||c===",")){ parts.push([buf.trim(),c]); buf=""; continue; }
      }
      buf+=c;
    }
    parts.push([buf.trim(),""]);
    for(const[e,sep] of parts){ if(e) out+=String(evaluate(e,state)); if(sep===",") out+="        "; }
    printText(out, !/[;,]\s*$/.test(b)); return {};
  }
  if((m=s.match(/^INPUT\s*(?:(["].*?["])\s*[,;])?\s*(.+)$/i))){
    const msg=m[1]?m[1].slice(1,-1):"? ", targets=splitCSV(m[2]);
    printText(msg, false);
    const raw=await inputValue(msg), values=splitCSV(raw);
    targets.forEach((t,i)=>setVariable(t, values[i]??"", state));
    printText(raw); return {};
  }
  if((m=s.match(/^IF\s+(.+?)\s+THEN\s+(.+?)(?:\s+ELSE\s+(.+))?$/i))){
    const chosen=evaluate(m[1],state)?m[2]:m[3];
    if(chosen){ const t=chosen.trim(); if(/^\d+$/.test(t)) return {jump:+t}; return execStmt(t,state,idx); }
    return {};
  }
  if((m=s.match(/^ON\s+(.+?)\s+GO(TO|SUB)\s+(.+)$/i))){
    const n=Math.floor(evaluate(m[1],state)), targets=splitCSV(m[3]).map(Number);
    if(n>=1&&n<=targets.length){
      if(m[2].toUpperCase()==="SUB") state.gosub.push(idx+1);
      return {jump:targets[n-1]};
    }
    return {};
  }
  if((m=s.match(/^GOTO\s+(\d+)$/i))) return {jump:+m[1]};
  if((m=s.match(/^GOSUB\s+(\d+)$/i))){ state.gosub.push(idx+1); return {jump:+m[1]}; }
  if(/^RETURN$/i.test(s)){ if(!state.gosub.length) throw Error("RETURN without GOSUB"); return {index:state.gosub.pop()}; }
  if((m=s.match(/^FOR\s+([A-Za-z][A-Za-z0-9]*)\s*=\s*(.+?)\s+TO\s+(.+?)(?:\s+STEP\s+(.+))?$/i))){
    const n=m[1].toUpperCase();
    state.vars[n]=+evaluate(m[2],state);
    state.forStack.push({n, lim:+evaluate(m[3],state), step:m[4]?+evaluate(m[4],state):1, ret:idx});
    return {};
  }
  if((m=s.match(/^NEXT(?:\s+([A-Za-z][A-Za-z0-9]*))?$/i))){
    const f=state.forStack.at(-1); if(!f) throw Error("NEXT without FOR");
    state.vars[f.n]+=f.step;
    const again=f.step>=0 ? state.vars[f.n]<=f.lim : state.vars[f.n]>=f.lim;
    if(again) return {index:f.ret+1};
    state.forStack.pop(); return {};
  }
  if((m=s.match(/^(?:LET\s+)?([A-Za-z][A-Za-z0-9]*\$?(?:\s*\(.*\))?)\s*=\s*(.+)$/i))){
    setVariable(m[1], evaluate(m[2],state), state); return {};
  }
  throw Error("Syntax error: "+s);
}

async function runProgram(){
  stopped=false; setRunUi(true); setStatus(`Running ${cpuClock}MHz`);
  let lines;
  try{ lines=parseProgram(); } catch(e){ e.basicLine=null; throw e; }
  const state={vars:{},arrays:{},gosub:[],forStack:[],data:collectData(lines),dataPtr:0};
  let i=0, ops=0;
  const frameOps=cpuClock===4?55:150;
  while(i<lines.length && !stopped){
    let moved=false;
    const currentBasicLine=lines[i].number;
    try{
      for(const s of splitStatements(lines[i].text)){
        const r=await execStmt(s,state,i);
        if(++ops%frameOps===0) await new Promise(requestAnimationFrame);
        if(ops>500000){ const err=Error("Too many operations"); err.basicLine=currentBasicLine; throw err; }
        if(r.end){ i=lines.length; moved=true; break; }
        if(r.jump!=null){
          const n=lineIndex(lines,r.jump);
          if(n<0){ const err=Error("Undefined line "+r.jump); err.basicLine=currentBasicLine; throw err; }
          i=n; moved=true; break;
        }
        if(r.index!=null){ i=r.index; moved=true; break; }
      }
    }catch(e){
      if(e.basicLine==null) e.basicLine=currentBasicLine;
      throw e;
    }
    if(!moved) i++;
  }
  setStatus(stopped?"Stopped":"Ready");
  setRunUi(false);
  if(!stopped){ printText("Ok"); consola("Ok"); }
}

async function direct(raw){
  raw=raw.trim(); if(!raw) return;
  history.push(raw); historyIndex=history.length;
  const n=raw.match(/^(\d+)\s*(.*)$/);
  if(n){
    const map=new Map();
    try{ for(const x of parseProgram()) map.set(x.number,x.text); }catch{}
    if(n[2].trim()) map.set(+n[1],n[2]); else map.delete(+n[1]);
    editor.value=[...map].sort((a,b)=>a[0]-b[0]).map(x=>x[0]+" "+x[1]).join("\n");
    fileDirty=true; setSaveState("modified","Modified");
    return;
  }
  const u=raw.toUpperCase();
  if(u==="RUN") return runProgram();
  if(u==="LIST"){ consola(editor.value); return; }
  if(u==="NEW"){ editor.value=""; resetScreen(); directVars={}; directArrays={}; return; }
  if(u.startsWith("RENUM")){
    // simple renumber omitted for brevity in v1.1
    consola("RENUM not fully ported in v1.1 yet");
    return;
  }
  const state={vars:directVars,arrays:directArrays,gosub:[],forStack:[],data:[],dataPtr:0};
  await execStmt(raw,state,0);
  directVars=state.vars; directArrays=state.arrays;
  consola("Ok");
}

async function safe(fn){
  try{ await fn(); }
  catch(e){
    setRunUi(false);
    setStatus("Error");
    consola("? "+e.message);
    if(e.basicLine!=null) jumpToBasicLine(e.basicLine, true);
  }
}

let phoenixUndoStack=[], phoenixRedoStack=[], phoenixLastValue="";
let findMatches=[], findIndex=-1;

function updateEditorInfo(){
  const before=editor.value.slice(0,editor.selectionStart);
  const line=before.split("\n").length;
  const lastBreak=before.lastIndexOf("\n");
  const col=editor.selectionStart-(lastBreak+1)+1;
  const lines=editor.value?editor.value.split("\n").length:1;
  $("editorCursor").textContent=`Ln ${line} · Col ${col}`;
  $("editorStats").textContent=`Lines ${lines} · Chars ${editor.value.length}`;
  updateCurrentLineHighlight(line);
}
function updateCurrentLineHighlight(line,isError=false){
  const hl=$("currentLineHighlight");
  if(!hl) return;
  const top=EDITOR_PADDING_TOP+(line-1)*EDITOR_LINE_HEIGHT-editor.scrollTop;
  hl.style.display="block"; hl.style.top=top+"px"; hl.style.height=EDITOR_LINE_HEIGHT+"px";
  hl.classList.toggle("errorLine",!!isError);
}
function jumpToBasicLine(basicLineNum,isError=false){
  const lines=editor.value.split("\n");
  let target=0, found=false;
  for(let i=0;i<lines.length;i++){
    const m=lines[i].match(/^\s*(\d+)/);
    if(m && +m[1]===basicLineNum){ target=i; found=true; break; }
  }
  if(!found) target=Math.max(0,Math.min(lines.length-1,basicLineNum-1));
  let pos=0; for(let i=0;i<target;i++) pos+=lines[i].length+1;
  editor.focus();
  editor.setSelectionRange(pos, pos+lines[target].length);
  editor.scrollTop=Math.max(0, EDITOR_PADDING_TOP+target*EDITOR_LINE_HEIGHT-editor.clientHeight/3);
  updateCurrentLineHighlight(target+1, isError);
  updateEditorInfo();
}

// Find
function openFindBar(mode="find"){
  $("findBar").classList.add("show");
  $("replaceInput").style.display=mode==="replace"?"block":"none";
  $("replaceOneBtn").style.display=mode==="replace"?"":"none";
  $("replaceAllBtn").style.display=mode==="replace"?"":"none";
  $("findInput").focus();
}
function closeFindBar(){ $("findBar").classList.remove("show"); }
function collectFindMatches(q){
  findMatches=[]; if(!q) return;
  let pos=0, text=editor.value;
  while(true){ const i=text.indexOf(q,pos); if(i<0) break; findMatches.push(i); pos=i+Math.max(1,q.length); }
}
function runFind(fromStart=false){
  const q=$("findInput").value; collectFindMatches(q);
  if(!findMatches.length){ findIndex=-1; $("findStatus").textContent=q?"0/0":""; return; }
  if(fromStart||findIndex<0){
    const caret=editor.selectionStart;
    findIndex=findMatches.findIndex(m=>m>=caret); if(findIndex<0) findIndex=0;
  }
  selectFindMatch();
}
function selectFindMatch(){
  if(findIndex<0||!findMatches.length) return;
  const start=findMatches[findIndex], end=start+$("findInput").value.length;
  editor.focus(); editor.setSelectionRange(start,end);
  $("findStatus").textContent=`${findIndex+1}/${findMatches.length}`;
}
function findNext(){ if(!findMatches.length){runFind(true);return;} findIndex=(findIndex+1)%findMatches.length; selectFindMatch(); }
function findPrev(){ if(!findMatches.length){runFind(true);return;} findIndex=(findIndex-1+findMatches.length)%findMatches.length; selectFindMatch(); }

// Completion
const BASIC_KEYWORDS=[
  {kw:"PRINT"},{kw:"INPUT"},{kw:"IF"},{kw:"THEN"},{kw:"ELSE"},{kw:"FOR"},{kw:"TO"},{kw:"NEXT"},
  {kw:"GOTO"},{kw:"GOSUB"},{kw:"RETURN"},{kw:"END"},{kw:"CLS"},{kw:"LOCATE"},{kw:"COLOR"},
  {kw:"LINE"},{kw:"CIRCLE"},{kw:"PAINT"},{kw:"PSET"},{kw:"BEEP"},{kw:"PLAY"},{kw:"DIM"},
  {kw:"DATA"},{kw:"READ"},{kw:"INKEY$"},{kw:"STICK"},{kw:"LEFT$"},{kw:"RIGHT$"},{kw:"MID$"},
  {kw:"INT"},{kw:"RND"},{kw:"ABS"},{kw:"AND"},{kw:"OR"}
];
let completionItems=[], completionIndex=0, completionActive=false;
function getCurrentWord(){
  const pos=editor.selectionStart, text=editor.value;
  let start=pos; while(start>0 && /[A-Za-z0-9$]/.test(text[start-1])) start--;
  return {word:text.slice(start,pos), start, end:pos};
}
function showCompletion(){
  const {word,start}=getCurrentWord();
  const q=word.toUpperCase();
  completionItems=BASIC_KEYWORDS.filter(k=>k.kw.startsWith(q)&&k.kw!==q);
  if(!completionItems.length){ hideCompletion(); return; }
  completionIndex=0;
  const popup=$("completionPopup");
  popup.innerHTML=completionItems.map((item,i)=>
    `<div class="item${i===0?" active":""}" data-idx="${i}"><span class="kw">${item.kw}</span></div>`
  ).join("");
  const before=editor.value.slice(0,start);
  const line=before.split("\n").length;
  const top=EDITOR_PADDING_TOP+(line-1)*EDITOR_LINE_HEIGHT-editor.scrollTop+EDITOR_LINE_HEIGHT+2;
  popup.style.top=Math.max(4,top)+"px";
  popup.style.left="20px";
  popup.classList.add("show");
  completionActive=true;
  popup.querySelectorAll(".item").forEach(el=>{
    el.onmousedown=e=>{ e.preventDefault(); applyCompletion(+el.dataset.idx); };
  });
}
function hideCompletion(){ $("completionPopup").classList.remove("show"); completionActive=false; }
function applyCompletion(idx){
  if(idx<0||idx>=completionItems.length) return;
  const item=completionItems[idx];
  const {start,end}=getCurrentWord();
  editor.setRangeText(item.kw, start, end, "end");
  hideCompletion(); updateEditorInfo(); fileDirty=true; setSaveState("modified","Modified");
}
function moveCompletion(delta){
  if(!completionActive||!completionItems.length) return;
  completionIndex=(completionIndex+delta+completionItems.length)%completionItems.length;
  $("completionPopup").querySelectorAll(".item").forEach((el,i)=>el.classList.toggle("active",i===completionIndex));
}


function setVisibleKeys(keys){
  const allowed = new Set(keys);
  document.querySelectorAll("[data-vkey]").forEach(btn=>{
    btn.classList.toggle("keyHidden", !allowed.has(btn.dataset.vkey));
  });
}
function applyKeyMode(){
  const keyModeEl = $("keyMode");
  if(!keyModeEl) return;
  const mode = keyModeEl.value;
  const custom = $("keyCustom");
  custom?.classList.toggle("show", mode === "custom");

  if(mode === "game") setVisibleKeys(["UP","DOWN","LEFT","RIGHT","Z","X"]);
  else if(mode === "full") setVisibleKeys(["UP","DOWN","LEFT","RIGHT","Z","X","SPACE","ENTER"]);
  else if(mode === "cursorEnter") setVisibleKeys(["UP","DOWN","LEFT","RIGHT","ENTER"]);
  else if(mode === "cursor") setVisibleKeys(["UP","DOWN","LEFT","RIGHT"]);
  else if(mode === "zx") setVisibleKeys(["Z","X"]);
  else {
    const selected = [...document.querySelectorAll("#keyCustom input:checked")].map(x=>x.value);
    setVisibleKeys(selected);
  }
  localStorage.setItem("salpN88KeyMode", mode);
}
function setupKeypadControls(){
  const keyModeEl = $("keyMode");
  const keyToggleEl = $("keyToggle");
  const keypadBodyEl = $("keypadBody");
  if(!keyModeEl || !keyToggleEl || !keypadBodyEl) return;

  const savedMode = localStorage.getItem("salpN88KeyMode");
  if(savedMode && [...keyModeEl.options].some(o=>o.value===savedMode)){
    keyModeEl.value = savedMode;
  }
  keyModeEl.onchange = applyKeyMode;

  document.querySelectorAll("#keyCustom input").forEach(cb=>{
    cb.onchange = ()=>{
      if(keyModeEl.value === "custom") applyKeyMode();
    };
  });

  keyToggleEl.onclick = ()=>{
    const hidden = keypadBodyEl.style.display === "none";
    keypadBodyEl.style.display = hidden ? "" : "none";
    keyToggleEl.textContent = hidden ? "キーパッドを隠す" : "キーパッドを表示";
    localStorage.setItem("salpN88KeypadHidden", hidden ? "0" : "1");
  };

  if(localStorage.getItem("salpN88KeypadHidden")==="1"){
    keypadBodyEl.style.display="none";
    keyToggleEl.textContent="キーパッドを表示";
  }
  applyKeyMode();
}


// ---------- Input / Keys ----------
const virtualMap={UP:String.fromCharCode(30),DOWN:String.fromCharCode(31),LEFT:String.fromCharCode(28),RIGHT:String.fromCharCode(29),ENTER:"\r",SPACE:" ",Z:"Z",X:"X"};
function pushGameKey(name){
  const value=virtualMap[name]??name;
  keyQueue.push(value); if(keyQueue.length>32) keyQueue.shift();
  lastKey=value;
}
function pressGameKey(name,button){ heldKeys.add(name); pushGameKey(name); button?.classList.add("pressed"); }
function releaseGameKey(name,button){ heldKeys.delete(name); button?.classList.remove("pressed"); }

document.querySelectorAll("[data-vkey]").forEach(btn=>{
  const name=btn.dataset.vkey;
  btn.addEventListener("pointerdown", e=>{ e.preventDefault(); pressGameKey(name,btn); });
  btn.addEventListener("pointerup", e=>{ e.preventDefault(); releaseGameKey(name,btn); });
  btn.addEventListener("pointercancel", ()=>releaseGameKey(name,btn));
});

window.addEventListener("keydown", e=>{
  if(["INPUT","TEXTAREA","SELECT"].includes(document.activeElement?.tagName) && document.activeElement!==canvas) return;
  const name = e.key==="ArrowUp"?"UP":e.key==="ArrowDown"?"DOWN":e.key==="ArrowLeft"?"LEFT":e.key==="ArrowRight"?"RIGHT":
               e.key==="Enter"?"ENTER":e.key===" "?"SPACE":e.key.toUpperCase()==="Z"?"Z":e.key.toUpperCase()==="X"?"X":null;
  if(name){ if(!heldKeys.has(name)) pushGameKey(name); heldKeys.add(name); if(["UP","DOWN","LEFT","RIGHT","SPACE"].includes(name)) e.preventDefault(); }
});
window.addEventListener("keyup", e=>{
  const name = e.key==="ArrowUp"?"UP":e.key==="ArrowDown"?"DOWN":e.key==="ArrowLeft"?"LEFT":e.key==="ArrowRight"?"RIGHT":
               e.key==="Enter"?"ENTER":e.key===" "?"SPACE":e.key.toUpperCase()==="Z"?"Z":e.key.toUpperCase()==="X"?"X":null;
  if(name) heldKeys.delete(name);
});

// Display modes

  displayMode=$("displayMode").value;
  const themes={
    color:{fg:"#f5f7fb",palette:["#000000","#0046d5","#ef304f","#a834e3","#22bd68","#22c4d6","#f2dc3f","#f5f7fb"],label:"COLOR"},
    green:{fg:"#75ff98",palette:["#001407","#0b451d","#138833","#25b949","#53dd70","#70ed88","#9bf7aa","#d3ffdc"],label:"GREEN"},
    amber:{fg:"#ffc45f",palette:["#180c00","#4b2400","#7c3f04","#a95b0b","#cf7c1d","#e89b34","#ffc467","#ffe0a5"],label:"AMBER"},
    white:{fg:"#f1f1f1",palette:["#050505","#222","#444","#666","#888","#aaa","#ccc","#f4f4f4"],label:"WHITE"},
    lcd:{fg:"#e9f1ff",palette:["#020814","#1645a7","#df3151","#9a42d2","#24ad61","#2bb7c7","#d5c64a","#e9f1ff"],label:"LCD"}
  };
  const t=themes[displayMode]||themes.color;

  $("displayBadge").textContent=t.label;
  renderText();
}
$("cpuClock").onchange=()=>{ cpuClock=Number($("cpuClock").value); $("clockBadge").textContent=cpuClock+"MHz"; };
$("displayMode").onchange=applyDisplayMode;
$("soundMode").onchange=()=>{
  soundMode=$("soundMode").value;
  const labels={crystal:"CRYSTAL FM",enhanced:"ENHANCED FM",real:"MH FM",silent:"SILENT"};
  $("soundBadge").textContent=labels[soundMode]||soundMode.toUpperCase();
};


// ---------- Mobile layout / keypad ----------
const ideEl = $("ide");
const mobileTabs = [...document.querySelectorAll("[data-mobile-view]")];

function setMobileView(view){
  if(!ideEl) return;
  ideEl.dataset.mobileView = view;
  mobileTabs.forEach(btn=>btn.classList.toggle("active", btn.dataset.mobileView===view));
  if(view==="screen"){
    requestAnimationFrame(()=>renderText());
  }
}
mobileTabs.forEach(btn=>{
  btn.addEventListener("click", ()=>setMobileView(btn.dataset.mobileView));
});

const keypadPanel = $("keypadPanel");
const keypadToggleBtn = $("keypadToggleBtn");
function updateKeypadButton(){
  if(!keypadPanel || !keypadToggleBtn) return;
  keypadToggleBtn.textContent = keypadPanel.open ? "🎮 CLOSE" : "🎮 KEYPAD";
}
if(keypadToggleBtn && keypadPanel){
  keypadToggleBtn.addEventListener("click", ()=>{
    if(window.matchMedia("(max-width:900px)").matches) setMobileView("screen");
    keypadPanel.open = true;
    keypadPanel.scrollIntoView({behavior:"smooth",block:"nearest"});
  });
  keypadPanel.addEventListener("toggle", updateKeypadButton);
  updateKeypadButton();
}

// ---------- Wire UI ----------
$("runBtn").onclick=()=>safe(async()=>{ await ensureAudio(); await runProgram(); });
$("stopBtn").onclick=()=>{ stopped=true; stopMml(); if(waitingInput){ waitingInput.resolve(""); waitingInput=null; } setRunUi(false); setStatus("Stopped"); };
$("bootBtn").onclick=async()=>{
  stopped=true; stopMml();
  resetScreen();
  printText("N88-BASIC Compatible Mode");
  printText("salp N88 BASIC Studio v1.5.2");
  printText(""); printText("Ok");
  consola("MH BOOT complete");
  stopped=false; setStatus("Ready");
};
$("enterBtn").onclick=()=>{
  const v=promptInput.value; promptInput.value="";
  if(waitingInput){ const r=waitingInput.resolve; waitingInput=null; promptInput.placeholder='PRINT "HELLO"  or  RUN'; r(v); }
  else safe(()=>direct(v));
};
promptInput.onkeydown=e=>{
  if(e.key==="Enter"){ e.preventDefault(); $("enterBtn").click(); }
  else if(!waitingInput && e.key==="ArrowUp"){ e.preventDefault(); if(historyIndex>0) promptInput.value=history[--historyIndex]||""; }
  else if(!waitingInput && e.key==="ArrowDown"){ e.preventDefault(); if(historyIndex<history.length-1) promptInput.value=history[++historyIndex]||""; else { historyIndex=history.length; promptInput.value=""; } }
};

$("newProjectBtn").onclick=newProject;
$("saveProjectBtn").onclick=()=>{ saveProjectToStorage(); consola("Project saved: "+project.name); };
$("sampleProjectBtn").onclick=loadSampleProject;
$("arpeggioSampleBtn").onclick=()=>loadProgramIntoEditor(ARPEGGIO_SAMPLE,"Arpeggio sample");
$("toccataSampleBtn").onclick=()=>loadProgramIntoEditor(TOCCATA_SAMPLE,"Toccata sample");
$("gameSampleBtn").onclick=()=>loadProgramIntoEditor(GAME_SAMPLE,"Game sample");
$("addFileBtn").onclick=addFile;
$("renameFileBtn").onclick=renameFile;
$("deleteFileBtn").onclick=deleteFile;
$("clearConsoleBtn").onclick=clearConsole;
$("exportBasBtn").onclick=()=>{
  const b=new Blob([editor.value],{type:"text/plain;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download=project.active||"PROGRAM.BAS"; a.click();
};
$("loadBtn").onclick=()=>$("fileInput").click();
$("fileInput").onchange=async e=>{
  const f=e.target.files[0]; if(!f) return;
  const text=await f.text();
  if(f.name.endsWith(".json")){
    try{ project=JSON.parse(text); openFile(project.active||Object.keys(project.files)[0]); saveProjectToStorage(); consola("Project loaded from JSON"); }
    catch{ consola("Invalid project JSON"); }
  } else {
    editor.value=text; fileDirty=true; setSaveState("modified","Modified");
    if(project.active) project.files[project.active]=text;
  }
  e.target.value="";
};

$("findBtn").onclick=()=>openFindBar("find");
$("replaceBtn").onclick=()=>openFindBar("replace");
$("gotoBtn").onclick=()=>{
  const lines=editor.value?editor.value.split("\n").length:1;
  const n=parseInt(prompt(`行番号 (1〜${lines})`,""),10);
  if(!isNaN(n)) jumpToBasicLine(n);
};
$("closeFindBtn").onclick=closeFindBar;
$("findNextBtn").onclick=findNext;
$("findPrevBtn").onclick=findPrev;
$("findInput").oninput=()=>runFind(true);
$("undoBtn").onclick=()=>{ /* simple: reload from project */ if(project.active) editor.value=project.files[project.active]||""; updateEditorInfo(); };
$("redoBtn").onclick=()=>{};
$("saveLocalBtn").onclick=()=>{ if(project.active) project.files[project.active]=editor.value; saveProjectToStorage(); };

editor.addEventListener("input",()=>{
  fileDirty=true; setSaveState("modified","Modified");
  if(project.active) project.files[project.active]=editor.value;
  updateEditorInfo();
  if(completionActive) hideCompletion();
});
["keyup","click","select","scroll"].forEach(t=>editor.addEventListener(t, updateEditorInfo));

document.addEventListener("keydown", e=>{
  const ctrl=e.ctrlKey||e.metaKey;
  if(completionActive && document.activeElement===editor){
    if(e.key==="ArrowDown"){ e.preventDefault(); moveCompletion(1); return; }
    if(e.key==="ArrowUp"){ e.preventDefault(); moveCompletion(-1); return; }
    if(e.key==="Enter"||e.key==="Tab"){ e.preventDefault(); applyCompletion(completionIndex); return; }
    if(e.key==="Escape"){ e.preventDefault(); hideCompletion(); return; }
  }
  if(!ctrl) return;
  const key=e.key.toLowerCase();
  if(key==="s"){ e.preventDefault(); saveProjectToStorage(); }
  else if(key==="f"){ e.preventDefault(); openFindBar("find"); }
  else if(key==="h"){ e.preventDefault(); openFindBar("replace"); }
  else if(key==="g"){ e.preventDefault(); $("gotoBtn").click(); }
  else if(key===" "||key==="space"){ if(document.activeElement===editor){ e.preventDefault(); showCompletion(); } }
});


// F5 = RUN / Shift+F5 = STOP
document.addEventListener("keydown", e=>{
  if(e.key==="F5"){
    e.preventDefault();
    if(e.shiftKey) $("stopBtn").click();
    else if(!$("runBtn").disabled) $("runBtn").click();
  }
});

  // first launch
}
openFile(project.active);
applyDisplayMode();
resetScreen();
printText("salp N88 BASIC Studio v1.5.2");
printText("Crystal FM Engine restored");
printText("");
printText("Ok");

consola("Crystal FM (4-op style) · Stereo delay · MML ready");
consola("Ready.");
updateEditorInfo();
